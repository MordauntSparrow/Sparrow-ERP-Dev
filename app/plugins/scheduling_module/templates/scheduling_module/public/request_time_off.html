{% extends "scheduling_module/base_public.html" %}
{% block content %}
<h1 class="h5 mb-3">Request time off</h1>
<form method="post" action="{{ url_for('public_scheduling.request_time_off_submit') }}" class="card card-module p-3">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Start date</label>
    <input type="date" name="start_date" class="form-control form-control-dark bg-dark text-light" required>
  </div>
  <div class="mb-3">
    <label class="form-label">End date</label>
    <input type="date" name="end_date" class="form-control form-control-dark bg-dark text-light" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Reason (optional)</label>
    <input type="text" name="reason" class="form-control form-control-dark bg-dark text-light" placeholder="e.g. Holiday">
  </div>
  <button type="submit" class="btn btn-primary">Submit request</button>
  <a href="{{ url_for('public_scheduling.my_requests') }}" class="btn btn-outline-light ms-2">Cancel</a>
</form>
{% endblock %}
