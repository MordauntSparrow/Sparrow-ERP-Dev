<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Scheduling{% endblock %} – {{ config.site_settings.company_name if config and config.site_settings and config.site_settings.company_name else 'Admin' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">{{ config.site_settings.company_name if config and config.site_settings and config.site_settings.company_name else 'Sparrow ERP' }}</a>
      <span class="navbar-text text-white">Scheduling</span>
      <a href="{{ url_for('internal_scheduling.admin_index') }}" class="btn btn-outline-light btn-sm">Dashboard</a>
      <a href="{{ url_for('internal_scheduling.admin_schedule_week') }}" class="btn btn-outline-light btn-sm">Week</a>
      <a href="{{ url_for('internal_scheduling.admin_schedule_month') }}" class="btn btn-outline-light btn-sm">Month</a>
      <a href="{{ url_for('internal_scheduling.admin_shifts') }}" class="btn btn-outline-light btn-sm">Shifts</a>
      <a href="{{ url_for('internal_scheduling.admin_templates') }}" class="btn btn-outline-light btn-sm">Templates</a>
      <a href="{{ url_for('internal_scheduling.admin_time_off') }}" class="btn btn-outline-light btn-sm">Time off</a>
      <a href="{{ url_for('internal_scheduling.admin_swaps') }}" class="btn btn-outline-light btn-sm">Swaps</a>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
