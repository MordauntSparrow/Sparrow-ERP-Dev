{% extends "scheduling_module/admin/base_admin.html" %}
{% block title %}Apply template – Scheduling{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Apply template: {{ template.name }}</h1>
<p class="text-muted small mb-3">Creates draft shifts for the chosen week. One contractor is assigned to all slots.</p>
<form method="post" action="{{ url_for('internal_scheduling.admin_template_apply', template_id=template.id) }}" class="card card-body">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Week (Monday) <span class="text-danger">*</span></label>
    <input type="date" name="week_monday" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Contractor <span class="text-danger">*</span></label>
    <select name="contractor_id" class="form-select" required>
      <option value="">Select…</option>
      {% for c in contractors %}
      <option value="{{ c.id }}">{{ c.name or c.email }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Create draft shifts</button>
  <a href="{{ url_for('internal_scheduling.admin_templates') }}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
