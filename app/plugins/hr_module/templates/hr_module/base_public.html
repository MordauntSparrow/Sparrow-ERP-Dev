<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}HR{% endblock %} – {{ config.site_settings.company_name if config and config.site_settings and config.site_settings.company_name else 'Employee Portal' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    .navbar-module { background: #1e293b !important; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .card-module { background: #1e293b; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.08); }
    a { color: #38bdf8; }
    a:hover { color: #7dd3fc; }
    .form-control.bg-dark, .form-control:focus { background: #1e293b !important; color: #f1f5f9 !important; border-color: #334155 !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark navbar-module">
    <div class="container">
      <a class="navbar-brand" href="/employee-portal/"><i class="bi bi-arrow-left me-2"></i>Portal</a>
      <a class="nav-link text-light" href="{{ url_for('public_hr.profile') }}">My details</a>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
