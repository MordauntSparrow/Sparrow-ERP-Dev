{% extends "cad/ventus_admin_base.html" %}

{% block content %}
<div class="map-wrap">
  <div id="map"></div>
</div>

<!-- Panels container: allows multiple open sidebar panels and popouts -->
<div class="cad-panels" id="panelsContainer" aria-live="polite"></div>

<!-- KPI is opened as a panel from the rail (moveable, popout, close like other panels) -->

<!-- Toast notifications -->
<div id="toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:none;z-index:5000;"></div>

<!-- Notification stack (bottom-right) -->
<div id="notifications" class="notifications-container" aria-live="polite"></div>

<style>
.leaflet-tooltip.unit-map-label {
  background: rgba(15, 23, 42, 0.88);
  color: #e2e8f0;
  border: 1px solid rgba(148, 163, 184, 0.45);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(2, 6, 23, 0.35);
  pointer-events: none;
}
:root[data-theme="light"] .leaflet-tooltip.unit-map-label {
  background: rgba(248, 250, 252, 0.95);
  color: #0f172a;
  border-color: rgba(100, 116, 139, 0.45);
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.15);
}
.drop-target-job,
.job-detail-drop-target {
  position: relative;
}
.drop-target-job.drag-over,
.job-detail-drop-target.drag-over {
  background: rgba(59, 130, 246, 0.15);
  border-left-color: var(--primary-light);
  outline: 2px dashed var(--primary-light);
  outline-offset: -2px;
}
.drop-target-job-hint {
  display: none;
  position: absolute;
  left: 50%;
  top: 8px;
  transform: translateX(-50%);
  padding: 4px 10px;
  background: rgba(59, 130, 246, 0.95);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
  box-shadow: 0 1px 6px rgba(0,0,0,0.2);
}
.drop-target-job.drag-over .drop-target-job-hint {
  display: block;
}
.drop-target-unit.drag-over .drop-target-job-hint {
  display: block;
}
.job-detail-drop-target {
  min-height: 120px;
  border-radius: 8px;
  transition: background 0.15s ease, outline 0.15s ease;
  position: relative;
}
.job-detail-drop-hint {
  display: none;
  position: absolute;
  left: 50%;
  top: 12px;
  transform: translateX(-50%);
  padding: 8px 14px;
  background: rgba(59, 130, 246, 0.95);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.job-detail-drop-target.drag-over .job-detail-drop-hint {
  display: block;
}
.draggable-unit:active {
  cursor: grabbing;
}

/* Allow reverse drag: drop a CAD job onto a unit to assign it. */
.drop-target-unit {
  position: relative;
}
.drop-target-unit.drag-over {
  background: rgba(16, 185, 129, 0.12);
  outline: 2px dashed var(--accent-success);
  outline-offset: -2px;
}
@keyframes cad-alert-pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55); }
  70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== GLOBALS =====
let map, jobsLayer, unitsLayer, unitLinksLayer;
let jobsData = [], unitsData = [];
let jobCoordByCad = new Map();
let openPanels = {};
let currentMsgCallsign = null;
let activeJobCad = null;
let jobSnapshot = new Map();
let jobSnapshotInitialized = false;
let seenCommIds = new Set();
let commSnapshotInitialized = false;
let unitsSnapshot = new Set();
let unitsSnapshotInitialized = false;
let panelZCounter = 560;
let pendingDivisionRecenter = false;
let lastAlertScopeKey = '';
// Optional sounds disabled by default to avoid CDN/autoplay errors in console.
let soundNewJob = null;
let soundUrgent = null;
let audioCtx = null;
let mapPickSession = null;
let mapPickMarker = null;
let selectedDivision = 'general';
let showExternalDivisions = true;
let divisionMeta = new Map();
let isPopoutMode = false;
let assignModalLoading = false;
let unitLinesVisible = true;
let messageAlertCount = 0;
const CAD_USER_SCOPE = {{ (current_user.username if current_user and current_user.is_authenticated else 'anon')|tojson }};
function cadScopedKey(key) {
  return `cad:${String(CAD_USER_SCOPE || 'anon')}:${String(key || '')}`;
}
function cadLsGet(key, legacyKey = null) {
  try {
    const scoped = localStorage.getItem(cadScopedKey(key));
    if (scoped !== null && scoped !== undefined) return scoped;
    if (legacyKey) return localStorage.getItem(legacyKey);
  } catch (e) {}
  return null;
}
function cadLsSet(key, value) {
  try { localStorage.setItem(cadScopedKey(key), value); } catch (e) {}
}
function cadLsRemove(key, legacyKey = null) {
  try {
    localStorage.removeItem(cadScopedKey(key));
    if (legacyKey) localStorage.removeItem(legacyKey);
  } catch (e) {}
}
let cadLockedLayout = (function(){
  try { return cadLsGet('locked_layout', 'cad_locked_layout') === '1'; } catch (e) { return false; }
})();

// BroadcastChannel / Socket.IO
let socket = null;
let bc = null;
try {
  if (typeof io !== 'undefined') socket = io();
} catch (e) { console.warn('Socket.IO failed', e); }
try { bc = new BroadcastChannel('ventus_cad'); } catch (e) { console.warn('BroadcastChannel unavailable', e); }

function normalizeStatus(status) {
  return String(status || '').trim().toLowerCase();
}

function prettyStatus(status) {
  const raw = String(status || '').trim();
  if (!raw) return 'Unknown';
  return raw
    .replaceAll('_', ' ')
    .replace(/\s+/g, ' ')
    .toLowerCase()
    .replace(/\b\w/g, (m) => m.toUpperCase());
}

function parseTime(value) {
  if (!value) return null;
  const d = new Date(value);
  return Number.isNaN(d.getTime()) ? null : d;
}

function calcAgeFromDateString(value) {
  const d = parseTime(value);
  if (!d) return null;
  const now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const md = now.getMonth() - d.getMonth();
  if (md < 0 || (md === 0 && now.getDate() < d.getDate())) age -= 1;
  return age >= 0 ? age : null;
}

function formatDuration(ms) {
  if (!Number.isFinite(ms) || ms < 0) return null;
  const totalMinutes = Math.floor(ms / 60000);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  if (hours > 0) return `${hours}h ${minutes}m`;
  return `${minutes}m`;
}

function formatOngoing(createdAt) {
  if (!createdAt) return null;
  const d = parseTime(createdAt);
  if (!d) return null;
  return formatDuration(new Date() - d);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function normalizeToken(value) {
  return String(value ?? '')
    .replace(/\s+/g, ' ')
    .trim();
}

function _dt_get(dt, key) {
  try {
    if (!dt || typeof dt.getData !== 'function') return '';
    const v = dt.getData(key);
    return v == null ? '' : String(v);
  } catch (e) {
    return '';
  }
}

function handleJobDragOver(event) {
  const dt = event && event.dataTransfer;
  const cs = _dt_get(dt, 'text/plain').trim();
  const cadRaw = _dt_get(dt, 'application/x-ventus-job-cad').trim();

  // Only highlight when dragging a callsign onto the CAD stack.
  const shouldHighlight = !!cs && !cadRaw;

  if (shouldHighlight) {
    if (dt) dt.dropEffect = 'copy';
    event.currentTarget.classList.add('drag-over');
    const h = event.currentTarget.querySelector('.drop-target-job-hint');
    if (h) h.textContent = `Assign ${cs}?`;
  } else {
    event.currentTarget.classList.remove('drag-over');
    const h = event.currentTarget.querySelector('.drop-target-job-hint');
    if (h) h.textContent = 'Drop to assign unit';
  }
}

function handleJobDragLeave(event) {
  if (!event || !event.currentTarget) return;
  event.currentTarget.classList.remove('drag-over');
  const h = event.currentTarget.querySelector('.drop-target-job-hint');
  if (h) h.textContent = 'Drop to assign unit';
}

function handleUnitDragOver(event) {
  const dt = event && event.dataTransfer;
  const cadRaw = _dt_get(dt, 'application/x-ventus-job-cad').trim();

  // Only highlight when dragging a CAD job onto the unit list.
  const shouldHighlight = !!cadRaw;

  if (shouldHighlight) {
    if (dt) dt.dropEffect = 'copy';
    event.currentTarget.classList.add('drag-over');
  } else {
    event.currentTarget.classList.remove('drag-over');
  }
}

function handleUnitDragLeave(event) {
  if (!event || !event.currentTarget) return;
  event.currentTarget.classList.remove('drag-over');
}

function getDivisionParams() {
  const p = new URLSearchParams();
  if (selectedDivision) p.set('division', selectedDivision);
  p.set('include_external', showExternalDivisions ? '1' : '0');
  return p;
}

function withDivision(url) {
  const params = getDivisionParams().toString();
  if (!params) return url;
  return `${url}${url.includes('?') ? '&' : '?'}${params}`;
}

function renderJobMapQuickPreview(job) {
  const cad = Number(job && job.cad);
  const status = String((job && job.status) || 'unknown');
  const priority = String((job && job.priority) || '').trim() || '--';
  const reason = String((job && job.reason_for_call) || '').trim() || 'No reason recorded';
  const address = String((job && (job.address || job.postcode || job.what3words)) || '').trim() || 'No location detail';
  const division = String((job && job.division) || 'general');
  const elapsed = formatOngoing(job && job.created_at) || '--';
  return `
    <div style="min-width:260px;max-width:320px;">
      <div style="font-weight:700;margin-bottom:6px;">CAD #${escapeHtml(Number.isFinite(cad) ? cad : '?')}</div>
      <div class="meta" style="margin-bottom:4px;">Priority: ${escapeHtml(priority)} • Status: ${escapeHtml(prettyStatus(status))}</div>
      <div class="meta" style="margin-bottom:4px;">Division: ${escapeHtml(division)}</div>
      <div class="meta" style="margin-bottom:6px;">Elapsed: ${escapeHtml(elapsed)}</div>
      <div style="font-size:12px;margin-bottom:4px;"><b>Reason:</b> ${escapeHtml(reason)}</div>
      <div style="font-size:12px;margin-bottom:8px;"><b>Location:</b> ${escapeHtml(address)}</div>
      <button class="btn" style="width:100%;padding:6px 8px;font-size:12px;" onclick="window.openJobDetailFromMap(${Number.isFinite(cad) ? cad : 0})">Open Full CAD Details</button>
    </div>
  `;
}

function prettyFieldLabel(key) {
  return String(key || '')
    .replaceAll('_', ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function formatDisplayValue(v) {
  if (v === undefined || v === null) return '';
  if (typeof v === 'string') return v.trim();
  if (typeof v === 'number' || typeof v === 'boolean') return String(v);
  if (Array.isArray(v)) {
    return v.map(function(item) {
      if (item === null || item === undefined) return '';
      if (typeof item === 'object') {
        const parts = Object.entries(item).map(function(entry) { return prettyFieldLabel(entry[0]) + ': ' + formatDisplayValue(entry[1]); });
        return parts.filter(Boolean).join(' · ');
      }
      return String(item);
    }).filter(Boolean).join('; ');
  }
  if (typeof v === 'object') {
    const lines = Object.entries(v).map(function(entry) {
      const key = prettyFieldLabel(entry[0]);
      const val = formatDisplayValue(entry[1]);
      if (val === '') return '';
      return key + ': ' + val;
    }).filter(Boolean);
    return lines.join(' · ');
  }
  return String(v);
}

function capitalizeWord(s) {
  const t = String(s || '').trim();
  if (!t) return '';
  return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
}

function renderIncidentDetails(triageRaw) {
  const triage = (triageRaw && typeof triageRaw === 'object') ? triageRaw : {};
  const take = (k) => triage[k];
  const row = (label, val) => {
    if (val === undefined || val === null || String(val).trim() === '') return '';
    const display = typeof val === 'object' ? formatDisplayValue(val) : String(val).trim();
    if (!display) return '';
    return `<div style="padding:4px 0;"><b>${escapeHtml(label)}:</b> ${escapeHtml(display)}</div>`;
  };
  const rowOrEmpty = (label, val) => {
    const display = (val === undefined || val === null || String(val).trim() === '') ? '—' : (typeof val === 'object' ? formatDisplayValue(val) : String(val).trim());
    return `<div style="padding:4px 0;"><b>${escapeHtml(label)}:</b> ${escapeHtml(display || '—')}</div>`;
  };

  const ageValue = (() => { const fromDob = calcAgeFromDateString(take('patient_dob')); if (fromDob != null) return String(fromDob); const direct = take('patient_age') != null ? take('patient_age') : take('age'); return (direct != null && direct !== '') ? String(Math.round(Number(direct))) : ''; })();

  const coreRows = [
    row('Reason for Call', take('reason_for_call')),
    row('Additional Details', take('additional_details')),
    row('Address', take('address')),
    row('Postcode', take('postcode')),
    row('what3words', take('what3words')),
    row('Caller Name', take('caller_name')),
    row('Caller Phone', take('caller_phone')),
    row('Patient', [take('first_name'), take('middle_name'), take('last_name')].filter(Boolean).join(' ')),
    rowOrEmpty('DOB', take('patient_dob')),
    rowOrEmpty('Age', ageValue),
    row('Gender', take('patient_gender') ? capitalizeWord(take('patient_gender')) : ''),
    row('Patient Phone', take('phone_number')),
    row('Onset', take('onset_datetime')),
    row('Form Profile', [take('form_name'), take('form_slug') ? `(${take('form_slug')})` : ''].join(' ').trim())
  ].filter(Boolean);

  const answers = (take('form_answers') && typeof take('form_answers') === 'object') ? take('form_answers') : {};
  const answerRows = Object.entries(answers).map(([k, v]) => row(prettyFieldLabel(k), v)).filter(Boolean);

  const riskFlags = (() => {
    const out = [];
    const ignored = new Set(['', 'no', 'none', 'unknown', 'false', '0', 'n/a', 'na', 'nil']);
    const pushRisk = (val) => {
      const txt = normalizeToken(formatDisplayValue(val));
      if (!txt) return;
      if (ignored.has(txt.toLowerCase())) return;
      if (!out.some((x) => x.toLowerCase() === txt.toLowerCase())) out.push(txt);
    };
    const pull = (key) => {
      const raw = take(key);
      if (raw == null || raw === '') return;
      if (Array.isArray(raw)) {
        raw.forEach((item) => {
          if (item && typeof item === 'object') {
            pushRisk(item.label || item.value || item.text || item.name || item.risk || '');
          } else {
            pushRisk(item);
          }
        });
        return;
      }
      if (typeof raw === 'object') {
        Object.values(raw).forEach(pushRisk);
        return;
      }
      const s = String(raw).trim();
      if (!s) return;
      if ((s.startsWith('[') && s.endsWith(']')) || (s.startsWith('{') && s.endsWith('}'))) {
        try {
          const parsed = JSON.parse(s);
          if (Array.isArray(parsed)) {
            parsed.forEach((item) => {
              if (item && typeof item === 'object') {
                pushRisk(item.label || item.value || item.text || item.name || item.risk || '');
              } else {
                pushRisk(item);
              }
            });
            return;
          }
        } catch (e) {}
      }
      s.split(/[\n,;|]+/).forEach(pushRisk);
    };
    ['risk_flags', 'riskFlags', 'risk_flag', 'risk'].forEach(pull);
    Object.entries(triage || {}).forEach(([k, v]) => {
      const key = String(k || '');
      if (['risk_flags', 'riskFlags', 'risk_flag', 'risk'].includes(key)) return;
      if (!/(risk|threat|hazard|violent|violence|weapon|police|safeguard|danger)/i.test(key)) return;
      const label = prettyFieldLabel(key);
      if (Array.isArray(v)) {
        v.forEach((item) => pushRisk(`${label}: ${formatDisplayValue(item)}`));
        return;
      }
      if (v && typeof v === 'object') {
        pushRisk(`${label}: ${formatDisplayValue(v)}`);
        return;
      }
      const text = normalizeToken(String(v ?? ''));
      if (!text || ignored.has(text.toLowerCase())) return;
      pushRisk(`${label}: ${text}`);
    });
    Object.entries(answers || {}).forEach(([k, v]) => {
      const key = String(k || '');
      if (!/(risk|threat|hazard|violent|weapon|police|safeguard|danger)/i.test(key)) return;
      const label = prettyFieldLabel(key);
      if (Array.isArray(v)) {
        v.forEach((item) => pushRisk(`${label}: ${formatDisplayValue(item)}`));
        return;
      }
      if (v && typeof v === 'object') {
        pushRisk(`${label}: ${formatDisplayValue(v)}`);
        return;
      }
      const text = normalizeToken(String(v ?? ''));
      if (!text || ignored.has(text.toLowerCase())) return;
      pushRisk(`${label}: ${text}`);
    });
    return out;
  })();

  const hidden = new Set([
    'reason_for_call','additional_details','address','postcode','what3words',
    'caller_name','caller_phone','first_name','middle_name','last_name',
    'patient_dob','patient_age','age','patient_gender','phone_number','onset_datetime',
    'form_name','form_slug','form_answers','incident_updates',
    'risk_flags','riskFlags','risk_flag','risk',
    'cad','call_priority','call_priority_label'
  ]);
  const rawRows = Object.entries(triage)
    .filter(([k]) => !hidden.has(String(k)))
    .map(([k, v]) => row(prettyFieldLabel(k), v))
    .filter(Boolean);

  return `
    <div>
      ${riskFlags.length ? `
      <div style="margin-bottom:10px;padding:10px;border:1px solid rgba(239,68,68,0.55);border-radius:10px;background:rgba(127,29,29,0.25);">
        <div style="font-weight:700;color:#fecaca;margin-bottom:6px;"><i class="bi bi-exclamation-triangle-fill"></i> Risk Flags - Crew Warning</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${riskFlags.map((r) => `<span class="status" style="background:rgba(239,68,68,0.25);color:#fecaca;border:1px solid rgba(248,113,113,0.6);">${escapeHtml(r)}</span>`).join('')}
        </div>
      </div>` : ''}
      <div style="font-weight:600;margin-bottom:6px;">Incident Summary</div>
      <div style="font-size:12px;color:var(--text-secondary);">${coreRows.join('') || '<i>No incident summary fields.</i>'}</div>
      <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
      <div style="font-weight:600;margin-bottom:6px;">Profile Questions</div>
      <div style="font-size:12px;color:var(--text-secondary);">${answerRows.join('') || '<i>No profile answers captured.</i>'}</div>
      ${rawRows.length ? `<hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;"><div style="font-weight:600;margin-bottom:6px;">Other Captured Data</div><div style="font-size:12px;color:var(--text-secondary);">${rawRows.join('')}</div>` : ''}
    </div>
  `;
}

function getCurrentStatusTimer(job, timingRow) {
  if (!timingRow) return '';
  const status = normalizeStatus(job.status);
  const now = new Date();
  const statusStarts = {
    received: parseTime(timingRow.received_time),
    assigned: parseTime(timingRow.assigned_time),
    mobile: parseTime(timingRow.mobile_time),
    on_scene: parseTime(timingRow.on_scene_time),
    leave_scene: parseTime(timingRow.leave_scene_time),
    at_hospital: parseTime(timingRow.at_hospital_time),
    stood_down: parseTime(timingRow.stood_down_time),
    cleared: parseTime(timingRow.cleared_time)
  };
  const started = statusStarts[status];
  if (!started) return '';
  const dur = formatDuration(now - started);
  if (!dur) return '';
  return `${prettyStatus(status)} ${dur}`;
}

function formatStatusTimesTable(job, timingRow) {
  if (!timingRow && !(job && job.created_at)) {
    return '<div class="meta"><i>No status timestamps available.</i></div>';
  }
  const order = [
    ['created_time', 'CAD Created'],
    ['assigned_time', 'Assigned'],
    ['received_time', 'Received'],
    ['mobile_time', 'Mobile'],
    ['on_scene_time', 'On Scene'],
    ['leave_scene_time', 'Leave Scene'],
    ['at_hospital_time', 'At Hospital'],
    ['cleared_time', 'Cleared'],
    ['stood_down_time', 'Stood Down']
  ];
  const points = order
    .map(([key, label]) => {
      let time = null;
      if (key === 'created_time') {
        time = parseTime(job && job.created_at);
      } else {
        time = parseTime(timingRow && timingRow[key]);
      }
      return { key, label, time };
    })
    .filter(p => p.time);
  if (points.length === 0) {
    return '<div class="meta"><i>No status timestamps available.</i></div>';
  }

  const currentStatus = normalizeStatus(job.status);
  let rows = '';
  for (let i = 0; i < points.length; i++) {
    const current = points[i];
    const next = points[i + 1];
    let stageDuration = '-';
    if (next && next.time) {
      const delta = next.time - current.time;
      stageDuration = delta >= 0 ? (formatDuration(delta) || '-') : '-';
    } else if (!['cleared', 'stood_down'].includes(currentStatus)) {
      stageDuration = formatDuration(new Date() - current.time) || '-';
    }
    rows += `
      <tr>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${current.label}</td>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${escapeHtml(current.time.toLocaleString())}</td>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${escapeHtml(stageDuration)}</td>
      </tr>
    `;
  }

  return `
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Status</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Time</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Duration</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function fetchJobsTimings(cadList) {
  const cads = (cadList || [])
    .map(c => parseInt(c, 10))
    .filter(c => Number.isInteger(c) && c > 0);
  if (cads.length === 0) return Promise.resolve({});

  const query = cads.map(c => `cad=${encodeURIComponent(c)}`).join('&');
  return fetch(`/plugin/ventus_response_module/jobs/timings?${query}`)
    .then(res => (res.ok ? res.json() : []))
    .then(rows => {
      const map = {};
      (Array.isArray(rows) ? rows : []).forEach(r => { map[r.cad] = r; });
      return map;
    })
    .catch(() => ({}));
}

function fetchJobsEligibility(cadList) {
  const cads = (cadList || [])
    .map(c => parseInt(c, 10))
    .filter(c => Number.isInteger(c) && c > 0);
  if (cads.length === 0) return Promise.resolve({});

  const query = cads.map(c => `cad=${encodeURIComponent(c)}`).join('&');
  const d = getDivisionParams().toString();
  const fullQuery = `${query}${d ? `&${d}` : ''}`;
  return fetch(`/plugin/ventus_response_module/jobs/eligibility?${fullQuery}`)
    .then(res => (res.ok ? res.json() : []))
    .then(rows => {
      const map = {};
      (Array.isArray(rows) ? rows : []).forEach(r => { map[r.cad] = r; });
      return map;
    })
    .catch(() => ({}));
}

function formatEligibilityText(eligibilityRow) {
  if (!eligibilityRow || !eligibilityRow.recommended) return 'Best units: no match';
  const top = eligibilityRow.candidates || [];
  if (!top.length) return 'Best units: no match';
  return `Best units: ${top.map(c => {
    const dist = (c.distance_km !== null && c.distance_km !== undefined) ? `${c.distance_km}km` : 'n/a';
    const skill = c.skill_match ? 'skills ok' : `missing ${((c.missing_skills || []).join(', ') || 'skills')}`;
    const breakState = c.break_blocked
      ? `break due${(c.break_due_in_minutes !== null && c.break_due_in_minutes !== undefined) ? ` (${c.break_due_in_minutes}m overdue/remaining)` : ''}`
      : (c.break_due ? `break due soon${(c.break_due_in_minutes !== null && c.break_due_in_minutes !== undefined) ? ` (${c.break_due_in_minutes}m)` : ''}` : 'break ok');
    const div = c.division ? `, ${c.division}` : '';
    const ext = c.external ? ', external' : '';
    return `${c.callsign} (${dist}, ${skill}, ${breakState}${div}${ext})`;
  }).join(' | ')}`;
}

function handleRemoteAction(msg) {
  const a = msg.action;
  const p = msg.payload || {};
  
  if (a === 'assign_job' && p.cad && p.callsign) {
    fetch(`/plugin/ventus_response_module/job/${p.cad}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ callsign: p.callsign, break_override: true })
    })
      .then(r => r.json())
      .then(data => {
        showNotification('success', 'Assigned', data.message || 'Job assigned');
        setTimeout(refreshMap, 400);
      })
      .catch(() => showNotification('danger', 'Error', 'Failed to assign job'));
  }
  
  if (a === 'close_job' && p.cad) {
    fetch(`/plugin/ventus_response_module/job/${p.cad}/close`, { method: 'POST' })
      .then(r => r.json())
      .then(data => {
        showNotification('success', 'Closed', data.message || 'Job closed');
        setTimeout(refreshMap, 400);
      })
      .catch(() => showNotification('danger', 'Error', 'Failed to close job'));
  }
  
  if (a === 'send_msg' && p.callsign && p.text) {
    fetch(`/plugin/ventus_response_module/messages/${p.callsign}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: p.text, from: 'dispatcher' })
    })
      .then(r => r.json())
      .then(() => showNotification('success', 'Sent', `Message sent to ${p.callsign}`))
      .catch(() => showNotification('danger', 'Error', 'Failed to send message'));
  }
  
  if (a === 'change_unit_status' && p.callsign && p.status) {
    fetch(`/plugin/ventus_response_module/api/mdt/${p.callsign}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

      })
      .catch(() => showNotification('danger', 'Error', 'Failed to update status'));
  }
}

function initAudioOnce() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    if (!audioCtx) audioCtx = new Ctx();
    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
  } catch (e) { }
}

function playTone(freq, durationMs, delayMs = 0, gain = 0.18) {
  initAudioOnce();
  if (!audioCtx) return;
  if (audioCtx.state !== 'running') {
    audioCtx.resume()
      .then(() => { setTimeout(() => playTone(freq, durationMs, 0, gain), Math.max(0, delayMs)); })
      .catch(() => {});
    return;
  }
  const now = audioCtx.currentTime + (delayMs / 1000);
  const osc = audioCtx.createOscillator();
  const amp = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  amp.gain.value = 0.0001;
  osc.connect(amp);
  amp.connect(audioCtx.destination);
  amp.gain.setValueAtTime(0.0001, now);
  amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
  amp.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));
  osc.start(now);
  osc.stop(now + (durationMs / 1000) + 0.02);
}

function playChime(kind) {
  initAudioOnce();
  if (!audioCtx) return;
  if (kind === 'new_job') {
    playTone(880, 120, 0, 0.22); playTone(1175, 180, 130, 0.25);
  } else if (kind === 'message') {
    playTone(740, 100, 0, 0.18); playTone(740, 100, 140, 0.18);
  } else if (kind === 'job_update') {
    playTone(660, 120, 0, 0.2); playTone(830, 120, 130, 0.22); playTone(660, 120, 260, 0.2);
  } else if (kind === 'unit_signon') {
    playTone(520, 140, 0, 0.2); playTone(780, 160, 150, 0.22);
  } else if (kind === 'unit_signoff') {
    playTone(720, 140, 0, 0.2); playTone(440, 180, 150, 0.22);
  }
}

function cancelMapPick(reason = 'cancelled') {
  const session = mapPickSession;
  mapPickSession = null;
  try {

    }
  } catch (e) {}

  } catch (e) {}
  if (reason !== 'picked') {
    try { if (session && typeof session.onCancel === 'function') session.onCancel(); } catch (e) {}
  }
}

function clampPanelToViewport(el) {

function recenterMapToNearestDivisionUnit() {
  if (!map || typeof map.getCenter !== 'function' || typeof map.setView !== 'function') return;
  const currentCenter = map.getCenter();
  if (!currentCenter) return;
  const applyFromUnits = (units) => {
    const inDivision = (Array.isArray(units) ? units : []).filter((u) => String(u && u.division || 'general') === String(selectedDivision || 'general'));
    let best = null;
    let bestDist = Number.POSITIVE_INFINITY;
    inDivision.forEach((u) => {
      const lat = Number(u && u.latitude);
      const lng = Number(u && u.longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
      const d = Math.hypot(lat - Number(currentCenter.lat), lng - Number(currentCenter.lng));
      if (d < bestDist) {
        bestDist = d;
        best = { lat, lng };
      }
    });
    if (!best) return false;
    const currentZoom = (typeof map.getZoom === 'function') ? Number(map.getZoom()) : 12;
    const targetZoom = Number.isFinite(currentZoom) ? Math.max(11, currentZoom) : 12;
    map.setView([best.lat, best.lng], targetZoom, { animate: true });
    return true;
  };

  if (applyFromUnits(unitsData)) return;
  fetch(withDivision('/plugin/ventus_response_module/units'))
    .then((r) => (r.ok ? r.json() : []))
    .then((units) => {
      if (Array.isArray(units)) unitsData = units;
      applyFromUnits(units);
    })
    .catch(() => {});
}

function getLockedSlotFromPoint(clientX, clientY) {
  const rect = panelsContainer && panelsContainer.getBoundingClientRect ? panelsContainer.getBoundingClientRect() : null;
  if (!rect || rect.width <= 0 || rect.height <= 0) return 'messages';
  const rx = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const ry = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  const leftBound = lockedLayoutMetrics.leftWidthRatio;
  const rightBound = 1 - lockedLayoutMetrics.rightWidthRatio;
  const centerBound = lockedLayoutMetrics.centerTopRatio;
  if (rx < leftBound) return 'left';
  if (rx > rightBound) return 'right';
  if (ry < centerBound) return 'map';
  return 'messages';
}

function getLockedSlotRect(slot) {
  const rect = panelsContainer && panelsContainer.getBoundingClientRect ? panelsContainer.getBoundingClientRect() : null;
  if (!rect || rect.width <= 0 || rect.height <= 0) return { left: 8, top: 8, width: 420, height: 320 };
  const gap = 10;
  const innerW = Math.max(320, rect.width - (gap * 2));
  const innerH = Math.max(260, rect.height - (gap * 2));
  const leftW = Math.max(260, Math.floor(innerW * lockedLayoutMetrics.leftWidthRatio));
  const rightW = Math.max(260, Math.floor(innerW * lockedLayoutMetrics.rightWidthRatio));
  const centerW = Math.max(360, innerW - leftW - rightW - (gap * 2));
  const workH = innerH;
  const centerTopH = Math.max(180, Math.floor(workH * lockedLayoutMetrics.centerTopRatio));
  const centerBottomH = Math.max(180, workH - centerTopH - gap);
  const leftX = gap;
  const centerX = leftX + leftW + gap;
  const rightX = centerX + centerW + gap;
  const topY = gap;
  const centerBottomY = topY + centerTopH + gap;
  if (slot === 'left') return { left: leftX, top: topY, width: leftW, height: workH };
  if (slot === 'map') return { left: centerX, top: topY, width: centerW, height: centerTopH };
  if (slot === 'messages') return { left: centerX, top: centerBottomY, width: centerW, height: centerBottomH };
  if (slot === 'right') return { left: rightX, top: topY, width: rightW, height: workH };
  return { left: centerX, top: centerBottomY, width: centerW, height: centerBottomH };
}

function layoutLockedPanels() {
  if (!cadLockedLayout) return;
  Object.values(openPanels || {}).forEach((p) => {
    if (!p || !p.element) return;
    const slot = (p.element.dataset && p.element.dataset.lockedSlot) || lockedDefaultSlotForType(p.type) || 'messages';
    const r = getLockedSlotRect(slot);
    p.element.style.left = `${Math.round(r.left)}px`;
    p.element.style.top = `${Math.round(r.top)}px`;
    p.element.style.width = `${Math.round(r.width)}px`;
    p.element.style.height = `${Math.round(r.height)}px`;
  });
}

function findPanelByLockedSlot(slot) {
  return Object.values(openPanels || {}).find((p) => p && !p.closing && p.element && p.element.dataset && p.element.dataset.lockedSlot === slot) || null;
}

function getFirstAvailableLockedSlot(preferred = null) {
  const pref = String(preferred || '').trim();
  if (pref && LOCKED_SLOT_ORDER.includes(pref) && !findPanelByLockedSlot(pref)) return pref;
  const free = LOCKED_SLOT_ORDER.find((s) => !findPanelByLockedSlot(s));
  return free || (pref && LOCKED_SLOT_ORDER.includes(pref) ? pref : LOCKED_SLOT_ORDER[0]);
}

function applyLockedSlot(panelEl, slot, allowSwap = true) {
  if (!panelEl || !slot) return;
  const previous = panelEl.dataset.lockedSlot || null;
  const occupied = findPanelByLockedSlot(slot);
  if (occupied && occupied.element !== panelEl && allowSwap) {
    const fallback = previous && previous !== slot ? previous : (LOCKED_SLOT_ORDER.find((s) => !findPanelByLockedSlot(s) || s === slot) || 'right');
    occupied.element.dataset.lockedSlot = fallback;
  }
  panelEl.dataset.lockedSlot = slot;
  saveLockedSlots();
  layoutLockedPanels();
}

function normalizeLockedSlots() {
  if (!cadLockedLayout) return;
  const panelEls = Array.from(panelsContainer.querySelectorAll('.cad-panel'));
  const used = new Set();
  panelEls.forEach((el) => {
    const type = String((el.dataset && el.dataset.panelType) || '');
    const pref = lockedDefaultSlotForType(type) || 'messages';
    const target = !used.has(pref) ? pref : (LOCKED_SLOT_ORDER.find((s) => !used.has(s)) || pref);
    el.dataset.lockedSlot = target;
    used.add(target);
  });
  saveLockedSlots();
  layoutLockedPanels();
}

window.resetPanelsToDefault = function() {
  ['map', 'jobs', 'units', 'messages', 'past_jobs', 'kpi'].forEach((type) => {
    cadLsRemove(`panel_state_${type}`, `cad_panel_state_${type}`);
  });
  if (cadLockedLayout) {
    try {
      lockedLayoutMetrics = { leftWidthRatio: 0.24, rightWidthRatio: 0.24, centerTopRatio: 0.56 };
      saveLockedLayoutMetrics();
      normalizeLockedSlots();
      showNotification('success', 'Panels reset', 'Fixed layout snap zones restored.');
    } catch (e) {}
    return;
  }
  const typeOrder = cadLockedLayout
    ? ['map', 'jobs', 'units', 'messages', 'past_jobs', 'kpi']
    : ['jobs', 'units', 'messages', 'past_jobs', 'kpi'];
  let typeIndex = 0;
  for (const type of typeOrder) {
    const entry = Object.values(openPanels).find(p => p.type === type);
    if (entry && entry.element) {
      const def = cadLockedLayout ? getLockedPanelDefaults(type) : getDefaultPanelPosition(type, typeIndex);
      entry.element.style.left = def.left + 'px';
      entry.element.style.top = def.top + 'px';
      entry.element.style.width = def.width + 'px';
      entry.element.style.height = def.height + 'px';
      try { clampPanelToViewport(entry.element); } catch (e) {}
      typeIndex++;
    }
  }
  try { showNotification('success', 'Panels reset', 'Panel positions and sizes restored to default.'); } catch (e) {}
};

function createPanel(type, title) {
  const panelId = 'panel-' + type + '-' + Date.now();
  const panelEl = document.createElement('div');
  panelEl.className = 'cad-panel';
  panelEl.id = panelId;
  panelEl.dataset.panelType = type;
  const expandToggleHtml = type === 'messages'
    ? `<button class="panel-btn expand-toggle" data-action="expand-toggle" title="Collapse"><i class="bi bi-chevron-down"></i></button>`
    : '';
  panelEl.innerHTML = `
    <div class="cad-panel-header">
      <span class="panel-title">${title}</span>
      <div class="cad-panel-controls">
        ${expandToggleHtml}
        <button class="panel-btn popout" data-action="popout" title="Pop out">
          <i class="bi bi-box-arrow-up-right"></i>
        </button>
        <button class="panel-btn close" data-action="close" title="Close">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    <div class="cad-panel-body" style="padding:16px;">
      <div style="text-align:center;color:var(--text-muted);">
        <i class="bi bi-hourglass-split" style="font-size:24px;display:block;margin-bottom:8px;"></i>
        Loading...
      </div>
    </div>
    <div class="resize-handle resize-br" data-dir="br" title="Resize"></div>
    <div class="resize-handle resize-bl" data-dir="bl" title="Resize"></div>
    <div class="resize-handle resize-tr" data-dir="tr" title="Resize"></div>
    <div class="resize-handle resize-tl" data-dir="tl" title="Resize"></div>
  `;

  panelsContainer.appendChild(panelEl);
  // make panels float over the map (absolute) to avoid affecting layout
  panelEl.style.pointerEvents = 'auto';
  panelEl.style.display = 'flex';
  panelEl.style.flexDirection = 'column';
  panelEl.style.position = 'absolute';
  panelEl.style.width = cadLockedLayout ? '460px' : '420px';
  panelEl.style.height = cadLockedLayout ? '320px' : '400px';
  panelEl.style.minWidth = '300px';
  panelEl.style.minHeight = '220px';
  panelEl.style.zIndex = '550';

  openPanels[panelId] = { id: panelId, type: type, title: title, element: panelEl };

  if (cadLockedLayout) {
    try {
      const savedSlots = getSavedLockedSlots();
      const preferredSlot = savedSlots[type] && LOCKED_SLOT_ORDER.includes(savedSlots[type])
        ? savedSlots[type]
        : (lockedDefaultSlotForType(type) || LOCKED_SLOT_ORDER[0]);
      panelEl.dataset.lockedSlot = getFirstAvailableLockedSlot(preferredSlot);
      normalizeLockedSlots();
    } catch (e) {}
  } else {
    const panelCount = Object.keys(openPanels).length;
    let posLeft, posTop;
    if (type === 'jobs') { posLeft = 40; posTop = 120; }
    else if (type === 'units') { posLeft = 480; posTop = 120; }
    else if (type === 'messages') { posLeft = 40 + (panelCount - 1) * 30; posTop = 120 + (panelCount - 1) * 40; }
    else if (type === 'kpi') { posLeft = 40 + (panelCount - 1) * 30; posTop = 120 + (panelCount - 1) * 40; }
    else { posLeft = 40 + panelCount * 30; posTop = 120 + panelCount * 40; }
    // prefer saved spawn position for this panel type
    try {
      const saved = cadLsGet(`panel_state_${type}`, `cad_panel_state_${type}`);
      if (saved) {
        const s = JSON.parse(saved);
        if (s.left) panelEl.style.left = s.left;
        else panelEl.style.left = posLeft + 'px';
        if (s.top) panelEl.style.top = s.top;
        else panelEl.style.top = posTop + 'px';
        if (s.width) panelEl.style.width = s.width;
        if (s.height) panelEl.style.height = s.height;
      } else {
        panelEl.style.left = posLeft + 'px';
        panelEl.style.top = posTop + 'px';
      }
    } catch (e) {
      panelEl.style.left = posLeft + 'px';
      panelEl.style.top = posTop + 'px';
    }
  }

  panelEl.querySelector('[data-action="popout"]').addEventListener('click', (e) => {
    e.stopPropagation();
    popoutPanel(panelId);
  });

  const expandToggleBtn = panelEl.querySelector('[data-action="expand-toggle"]');
  if (expandToggleBtn && type !== 'messages') {
    expandToggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const body = panelEl.querySelector('.cad-panel-body');
      const icon = expandToggleBtn.querySelector('i');
      if (body && body.style.display === 'none') {
        body.style.display = '';
        expandToggleBtn.title = 'Collapse';
        if (icon) { icon.className = 'bi bi-chevron-down'; }
      } else if (body) {
        body.style.display = 'none';
        expandToggleBtn.title = 'Expand';
        if (icon) { icon.className = 'bi bi-chevron-up'; }
      }
    });
  }

  panelEl.querySelector('[data-action="close"]').addEventListener('click', (e) => {
    e.stopPropagation();
    closePanel(panelId);
  });

  setupDragResize(panelId);
  loadPanelContent(panelId, type);

  // Clamp panel into viewport so it opens on-map
  try { clampPanelToViewport(panelEl); } catch (e) {}

  return panelEl;
}

function setupDragResize(panelId) {
  const panelEl = document.getElementById(panelId);
  if (!panelEl) return;

  const header = panelEl.querySelector('.cad-panel-header');
  if (!header) return;

  panelEl.addEventListener('pointerdown', () => raisePanel(panelEl));
  header.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.cad-panel-controls')) return;
    e.preventDefault();
    raisePanel(panelEl);
    header.setPointerCapture?.(e.pointerId);
    panelEl.style.opacity = '0.90';

    const startX = e.clientX;
    const startY = e.clientY;
    const baseLeft = parseInt(panelEl.style.left, 10) || 8;
    const baseTop = parseInt(panelEl.style.top, 10) || 8;

    const onMove = (ev) => {
      if (cadLockedLayout) {
        const slot = getLockedSlotFromPoint(ev.clientX, ev.clientY);
        showLockedSnapOverlay(slot);
        return;
      }
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      panelEl.style.left = (baseLeft + dx) + 'px';
      panelEl.style.top = (baseTop + dy) + 'px';
      clampPanelToViewport(panelEl);
    };

    const onUp = (ev) => {
      try { header.releasePointerCapture?.(e.pointerId); } catch (err) {}
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      panelEl.style.opacity = '1';
      if (cadLockedLayout) {
        const slot = getLockedSlotFromPoint(ev.clientX, ev.clientY);
        applyLockedSlot(panelEl, slot, true);
        hideLockedSnapOverlay();
      }
      savePanelState(panelEl);
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  // Add resize handle behavior (all corners)
  try {
    const resizeHandles = Array.from(panelEl.querySelectorAll('.resize-handle[data-dir]'));
    resizeHandles.forEach((resizeHandle) => {
      const dir = String(resizeHandle.getAttribute('data-dir') || 'br').toLowerCase();
      resizeHandle.style.touchAction = 'none';
      resizeHandle.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        raisePanel(panelEl);
        resizeHandle.setPointerCapture?.(e.pointerId);
        const startX = e.clientX, startY = e.clientY;
        const startW = panelEl.offsetWidth, startH = panelEl.offsetHeight;
        const minW = 320, minH = 220;
        const host = panelsContainer || panelEl.parentElement;
        const hostW = (host && host.clientWidth) ? host.clientWidth : window.innerWidth;
        const hostH = (host && host.clientHeight) ? host.clientHeight : window.innerHeight;
        const startLeft = parseInt(panelEl.style.left, 10) || 8;
        const startTop = parseInt(panelEl.style.top, 10) || 8;
        const maxW = Math.max(minW, hostW - startLeft - 8);
        const maxH = Math.max(minH, hostH - startTop - 8);
        const onMove = (ev) => {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (cadLockedLayout) {
            const slot = String((panelEl.dataset && panelEl.dataset.lockedSlot) || '');
            if (slot === 'left') {
              lockedLayoutMetrics.leftWidthRatio = Math.max(0.15, Math.min(0.34, lockedLayoutMetrics.leftWidthRatio + (dx / Math.max(400, hostW))));
            } else if (slot === 'right') {
              lockedLayoutMetrics.rightWidthRatio = Math.max(0.15, Math.min(0.34, lockedLayoutMetrics.rightWidthRatio - (dx / Math.max(400, hostW))));
            } else if (slot === 'map') {
              lockedLayoutMetrics.centerTopRatio = Math.max(0.3, Math.min(0.75, lockedLayoutMetrics.centerTopRatio + (dy / Math.max(300, hostH))));
            } else if (slot === 'messages') {
              lockedLayoutMetrics.centerTopRatio = Math.max(0.3, Math.min(0.75, lockedLayoutMetrics.centerTopRatio - (dy / Math.max(300, hostH))));
            }
            layoutLockedPanels();
            try {
              let sizeOverlay = document.getElementById('panel-size-overlay');
              if (!sizeOverlay) {
                sizeOverlay = document.createElement('div');
                sizeOverlay.id = 'panel-size-overlay';
                Object.assign(sizeOverlay.style, {
                  position: 'fixed', left: '0px', top: '0px', padding: '6px 8px',
                  background: 'rgba(0,0,0,0.8)', color: 'white', fontSize: '12px',
                  borderRadius: '6px', zIndex: 99999, pointerEvents: 'none', display: 'none'
                });
                document.body.appendChild(sizeOverlay);
              }
              sizeOverlay.style.display = 'block';
              sizeOverlay.textContent = 'Dock resized';
              sizeOverlay.style.left = (ev.clientX + 12) + 'px';
              sizeOverlay.style.top = (ev.clientY + 12) + 'px';
            } catch (e) {}
            return;
          }
          let nw = startW, nh = startH, nl = startLeft, nt = startTop;
          if (dir.includes('r')) nw = Math.min(maxW, Math.max(minW, startW + dx));
          if (dir.includes('l')) {
            nw = Math.min(maxW, Math.max(minW, startW - dx));
            nl = startLeft + (startW - nw);
          }
          if (dir.includes('b')) nh = Math.min(maxH, Math.max(minH, startH + dy));
          if (dir.includes('t')) {
            nh = Math.min(maxH, Math.max(minH, startH - dy));
            nt = startTop + (startH - nh);
          }
          panelEl.style.left = nl + 'px';
          panelEl.style.top = nt + 'px';
          panelEl.style.width = nw + 'px';
          panelEl.style.height = nh + 'px';
          clampPanelToViewport(panelEl);
          try {
            let sizeOverlay = document.getElementById('panel-size-overlay');
            if (!sizeOverlay) {
              sizeOverlay = document.createElement('div');
              sizeOverlay.id = 'panel-size-overlay';
              Object.assign(sizeOverlay.style, {
                position: 'fixed', left: '0px', top: '0px', padding: '6px 8px',
                background: 'rgba(0,0,0,0.8)', color: 'white', fontSize: '12px',
                borderRadius: '6px', zIndex: 99999, pointerEvents: 'none', display: 'none'
              });
              document.body.appendChild(sizeOverlay);
            }
            sizeOverlay.style.display = 'block';
            sizeOverlay.textContent = nw + ' × ' + nh;
            sizeOverlay.style.left = (ev.clientX + 12) + 'px';
            sizeOverlay.style.top = (ev.clientY + 12) + 'px';
          } catch (e) {}
        };

        const onUp = (ev) => {
          try { resizeHandle.releasePointerCapture?.(e.pointerId); } catch (err) {}
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          try {
            const sizeOverlay = document.getElementById('panel-size-overlay');
            if (sizeOverlay) sizeOverlay.style.display = 'none';
          } catch (e) {}
          if (cadLockedLayout) saveLockedLayoutMetrics();
          savePanelState(panelEl);
        };

        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    });
  } catch (e) {}
}

function loadPanelContent(panelId, type) {
  const panelEl = document.getElementById(panelId);
  if (!panelEl) return;
  const contentEl = panelEl.querySelector('.cad-panel-body');

  if (type === 'jobs') {
    const view = String(panelEl.dataset.jobsView || '').toLowerCase();
    const cad = parseInt(panelEl.dataset.jobsCad || '', 10);
    if (view === 'detail' && Number.isInteger(cad) && cad > 0) {
      loadJobDetail(cad);
      return;
    }
    loadJobsPanel(contentEl);
  }
  else if (type === 'units') loadUnitsPanel(contentEl);
  else if (type === 'map') moveMapIntoPanel(contentEl);
  else if (type === 'messages') loadMsgPanel(contentEl);
  else if (type === 'past_jobs') loadPastJobsPanel(contentEl);
  else if (type === 'kpi') loadKPIPanel(contentEl);
}

let panelRefreshTimer = null;
function isMessageComposerActive() {
  const active = document.activeElement;
  if (!active) return false;
  if (active.id === 'msgTextInput' || active.id === 'msgReplyInput') return true;
  const panel = active.closest && active.closest('.cad-panel');
  if (!panel) return false;
  return panel.dataset && panel.dataset.panelType === 'messages' && /INPUT|TEXTAREA/.test(active.tagName || '');
}
function isJobDetailEditorActive() {
  const active = document.activeElement;
  if (!active) return false;
  const panel = active.closest && active.closest('.cad-panel');
  if (!panel) return false;
  if (!(panel.dataset && panel.dataset.panelType === 'jobs')) return false;
  if (String(panel.dataset.jobsView || '').toLowerCase() !== 'detail') return false;
  return /INPUT|TEXTAREA|SELECT/.test(active.tagName || '');
}
function refreshOpenPanels(types = null) {
  const wanted = Array.isArray(types) && types.length ? new Set(types) : null;
  if (panelRefreshTimer) clearTimeout(panelRefreshTimer);
  panelRefreshTimer = setTimeout(() => {
    Object.values(openPanels).forEach((p) => {
      if (p.type === 'messages' || p.type === 'units' || p.type === 'jobs') {
        // Self-polling panels update in place; avoid full content rebuild flicker.
        return;
      }
      if (p.type === 'messages' && isMessageComposerActive()) return;
      if (p.type === 'jobs') {
        const view = String((p.element && p.element.dataset && p.element.dataset.jobsView) || '').toLowerCase();
        if (view === 'detail') {
          if (isJobDetailEditorActive()) return;
          return;
        }
      }
      if (!wanted || wanted.has(p.type)) loadPanelContent(p.id, p.type);
    });
  }, 120);
}

function syncPanelButtonStates() {
  try {
    const openTypes = new Set(Object.values(openPanels || {}).map((p) => p && p.type).filter(Boolean));
    if (btnJobs) btnJobs.classList.toggle('active', openTypes.has('jobs'));
    if (btnUnits) btnUnits.classList.toggle('active', openTypes.has('units'));
    if (btnMsgs) btnMsgs.classList.toggle('active', openTypes.has('messages'));
    if (btnPastJobs) btnPastJobs.classList.toggle('active', openTypes.has('past_jobs'));
    if (btnKPI) btnKPI.classList.toggle('active', openTypes.has('kpi'));
    if (btnLockedMap) btnLockedMap.classList.toggle('active', openTypes.has('map'));
    if (cadLockedLayout) {
      const lockedOpen = Array.from(openTypes).filter((t) => ['jobs', 'units', 'messages', 'past_jobs', 'kpi', 'map'].includes(String(t)));
      cadLsSet('locked_open_types', JSON.stringify(lockedOpen));
    }
  } catch (e) {}
}

function closePanel(panelId) {
  const panel = openPanels[panelId];
  if (!panel) return;
  panel.closing = true;
  if (panel.type === 'map') {
    try { restoreMapHome(!cadLockedLayout); } catch (e) {}
  }
  try {
    const sizeOverlay = document.getElementById('panel-size-overlay');
    if (sizeOverlay) sizeOverlay.remove();
  } catch (e) {}
  const el = panel.element;
  // fade out without touching transform to avoid teleporting
  el.style.transition = 'opacity 0.28s ease';
  el.style.opacity = '0';
  el.style.pointerEvents = 'none';
  setTimeout(() => {
    el.remove();
    try {
      if (panel.type === 'jobs' && btnJobs) btnJobs.classList.remove('active');
      else if (panel.type === 'units' && btnUnits) btnUnits.classList.remove('active');
      else if (panel.type === 'messages' && btnMsgs) btnMsgs.classList.remove('active');
      else if (panel.type === 'past_jobs' && btnPastJobs) btnPastJobs.classList.remove('active');
      else if (panel.type === 'kpi' && btnKPI) {
        btnKPI.classList.remove('active');
        cadLsSet('kpi_hidden', '1');
      }
    } catch (e) {}
    delete openPanels[panelId];
    syncPanelButtonStates();
    if (cadLockedLayout) {
      try { normalizeLockedSlots(); } catch (e) {}
    }
    if (isPopoutMode && Object.keys(openPanels).length === 0) {
      try { window.close(); } catch (e) {}
    }
    if (Object.keys(openPanels).length === 0) cadMain.classList.remove('drawer-open');
  }, 300);
}

function popoutPanel(panelId) {
  const panel = openPanels[panelId];
  if (!panel) return;
  try {
    const sizeOverlay = document.getElementById('panel-size-overlay');
    if (sizeOverlay) sizeOverlay.remove();
  } catch (e) {}
  const scope = getDivisionParams().toString();
  const url = `/plugin/ventus_response_module/cad?panel=${encodeURIComponent(panel.type)}&title=${encodeURIComponent(panel.title)}&popout=1${scope ? `&${scope}` : ''}`;
  const w = window.open(url, 'ventus-popout-' + panelId, 'width=500,height=600');
  if (!w) {
    showNotification('warning', 'Blocked', 'Browser blocked pop-out window');
    return;
  }
  closePanel(panelId);
  showNotification('success', 'Opened', `${panel.title} opened in new window`);
}

function applyMapOnlyPopoutLayout() {
  const topbar = document.querySelector('.cad-topbar');
  const rail = document.querySelector('.cad-rail');
  const panelsContainer = document.getElementById('panelsContainer');
  const mapWrap = document.querySelector('.map-wrap');
  const toast = document.getElementById('toast');
  const notifications = document.querySelector('.notifications-container');
  if (topbar) topbar.style.display = 'none';
  if (rail) rail.style.display = 'none';
  if (panelsContainer) panelsContainer.style.display = 'none';
  if (toast) toast.style.display = 'none';
  if (notifications) notifications.style.display = 'none';
  if (mapWrap) {
    mapWrap.style.display = 'block';
    mapWrap.style.position = 'fixed';
    mapWrap.style.inset = '0';
    mapWrap.style.width = '100%';
    mapWrap.style.height = '100%';
    mapWrap.style.zIndex = '1';
  }
  const cadMain = document.getElementById('cadMain');
  if (cadMain) {
    cadMain.style.display = 'block';
    cadMain.style.padding = '0';
    cadMain.style.position = 'relative';
  }
  document.body.style.overflow = 'hidden';
}

function clearAllPanelsImmediate() {
  try {
    Object.values(openPanels).forEach((p) => {
      if (p && p.type === 'map') {
        try { restoreMapHome(false); } catch (e) {}
      }
      try { p && p.element && p.element.remove(); } catch (e) {}
    });
  } catch (e) {}
  openPanels = {};
  hideLockedSnapOverlay();
  try {
    if (btnJobs) btnJobs.classList.remove('active');
    if (btnUnits) btnUnits.classList.remove('active');
    if (btnMsgs) btnMsgs.classList.remove('active');
    if (btnPastJobs) btnPastJobs.classList.remove('active');
    if (btnKPI) btnKPI.classList.remove('active');
    if (btnLockedMap) btnLockedMap.classList.remove('active');
  } catch (e) {}
}

function applyLockedLayout() {
  loadLockedLayoutMetrics();
  let currentlyOpenTypes = Object.values(openPanels || {})
    .map((p) => (p && p.type) ? String(p.type) : '')
    .filter((t) => ['jobs', 'units', 'messages', 'past_jobs', 'kpi', 'map'].includes(t));
  if (!currentlyOpenTypes.length) {
    try {
      const raw = cadLsGet('locked_open_types');
      const saved = raw ? JSON.parse(raw) : [];
      if (Array.isArray(saved)) {
        currentlyOpenTypes = saved
          .map((t) => String(t || ''))
          .filter((t) => ['jobs', 'units', 'messages', 'past_jobs', 'kpi', 'map'].includes(t));
      }
    } catch (e) {}
  }
  if (!currentlyOpenTypes.length) currentlyOpenTypes = ['jobs', 'units', 'messages'];
  if (!currentlyOpenTypes.includes('map')) currentlyOpenTypes.push('map');
  const preferredOrder = ['jobs', 'units', 'messages', 'map', 'past_jobs', 'kpi'];
  currentlyOpenTypes = preferredOrder.filter((t) => currentlyOpenTypes.includes(t)).slice(0, LOCKED_SLOT_ORDER.length);
  cadLockedLayout = true;
  cadLsSet('locked_layout', '1');
  try { document.querySelector('.cad-root')?.classList.add('locked-layout'); } catch (e) {}
  try { btnLockedLayout?.classList.add('active'); } catch (e) {}
  clearAllPanelsImmediate();
  const titleByType = {
    jobs: 'CAD Stack',
    units: 'Active Units',
    messages: 'Messages',
    past_jobs: 'Past / Cleared Jobs',
    kpi: 'Live KPI',
    map: 'Live Map',
  };
  currentlyOpenTypes.forEach((type) => {
    try { getOrCreatePanel(type, titleByType[type] || type); } catch (e) {}
  });
  normalizeLockedSlots();
  syncPanelButtonStates();
}

function removeLockedLayout() {
  cadLockedLayout = false;
  cadLsRemove('locked_layout', 'cad_locked_layout');
  try { document.querySelector('.cad-root')?.classList.remove('locked-layout'); } catch (e) {}
  try { btnLockedLayout?.classList.remove('active'); } catch (e) {}
  clearAllPanelsImmediate();
  restoreMapHome(true);
  syncPanelButtonStates();
}

function handleLockedPanelsDragOver(ev) {
  if (!cadLockedLayout) return;
  const draggingId = (() => {
    try { return ev.dataTransfer.getData('application/x-ventus-panel-id'); } catch (e) { return ''; }
  })();
  if (!draggingId) return;
  ev.preventDefault();
  const slot = getLockedSlotFromPoint(ev.clientX, ev.clientY);
  showLockedSnapOverlay(slot);
}

function handleLockedPanelsDrop(ev) {
  if (!cadLockedLayout) return;
  const draggingId = (() => {
    try { return ev.dataTransfer.getData('application/x-ventus-panel-id'); } catch (e) { return ''; }
  })();
  if (!draggingId) return;
  ev.preventDefault();
  const draggingEl = document.getElementById(draggingId);
  if (!draggingEl) return;
  const slot = getLockedSlotFromPoint(ev.clientX, ev.clientY);
  applyLockedSlot(draggingEl, slot, true);
  showLockedSnapOverlay(slot);
}

function applySinglePanelPopoutLayout(panelType) {
  const topbar = document.querySelector('.cad-topbar');

    panelsContainer.style.position = 'relative';

  }
  const fit = () => {

function renderUnitMapQuickPreview(unit) {
  const cs = String(unit && unit.callSign || '').trim() || '?';
  const status = String(unit && unit.status || 'unknown').trim() || 'unknown';
  const assignedCad = Number(unit && unit.assignedIncident);
  const standbyName = String(unit && unit.standby_name || '').trim();
  const division = String(unit && unit.division || 'general').trim();
  const breakBlocked = !!(unit && unit.break_blocked_for_new_jobs);
  const breakDue = !!(unit && unit.break_due);
  const breakDueIn = (unit && unit.break_due_in_minutes !== undefined && unit.break_due_in_minutes !== null) ? Number(unit.break_due_in_minutes) : null;
  const shiftRemaining = (unit && unit.shift_remaining_minutes !== undefined && unit.shift_remaining_minutes !== null) ? Number(unit.shift_remaining_minutes) : null;
  const onMealBreak = !!(unit && unit.meal_break_active);
  const shiftHours = (unit && unit.shift_duration_minutes != null) ? (Number(unit.shift_duration_minutes) / 60).toFixed(1) : null;
  const breakAfter = (unit && unit.break_due_after_minutes != null) ? Number(unit.break_due_after_minutes) : null;
  const crewGradesPopover = (() => {
    const raw = unit && unit.crew;
    if (!raw) return '';
    try {
      const arr = typeof raw === 'string' ? (JSON.parse(raw) || []) : (Array.isArray(raw) ? raw : []);
      const list = [];
      arr.forEach((m) => { if (m && typeof m === 'object' && (m.grade || m.role)) list.push((m.grade || m.role).trim()); });
      return list.length ? [...new Set(list)].join(', ') : '';
    } catch (e) { return ''; }
  })();
  const target = Number.isFinite(assignedCad) && assignedCad > 0
    ? `Assigned CAD #${assignedCad}`
    : (standbyName ? `Standby: ${standbyName}` : 'No target');
  return `
    <div style="min-width:220px;max-width:280px;background:var(--bg-dark,#0f172a);color:var(--text-primary,#f1f5f9);padding:8px;border-radius:8px;border:1px solid var(--border-color,#1e293b);">
      <div style="font-weight:700;margin-bottom:6px;">${escapeHtml(cs)}</div>
      <div class="meta" style="margin-bottom:4px;">Status: ${escapeHtml(prettyStatus(status))}</div>
      <div class="meta" style="margin-bottom:4px;">Division: ${escapeHtml(division)}</div>
      ${crewGradesPopover ? `<div class="meta" style="margin-bottom:4px;">Crew: ${escapeHtml(crewGradesPopover)}</div>` : ''}
      ${onMealBreak ? `<div class="meta" style="margin-bottom:4px;color:#fbbf24;">On meal break</div>` : ''}
      ${breakBlocked ? `<div class="meta" style="margin-bottom:4px;color:#fca5a5;">Break due: not job-ready</div>` : ''}
      ${(!breakBlocked && breakDue) ? `<div class="meta" style="margin-bottom:4px;color:#fde68a;">Break due soon${breakDueIn !== null ? ` (${escapeHtml(String(breakDueIn))}m)` : ''}</div>` : ''}
      ${shiftHours != null ? `<div class="meta" style="margin-bottom:4px;">${escapeHtml(shiftHours)}h shift${breakAfter != null ? ` · break after ${escapeHtml(String(breakAfter))}m` : ''}</div>` : ''}
      ${(shiftRemaining !== null) ? `<div class="meta" style="margin-bottom:4px;">Shift remaining: ${escapeHtml(String(shiftRemaining))}m</div>` : ''}
      <div class="meta" style="margin-bottom:8px;">${escapeHtml(target)}</div>
      <button type="button" class="unit-open-detail-btn" data-callsign="${escapeHtml(cs)}" style="width:100%;padding:6px 8px;font-size:12px;background:var(--primary-light,#3b82f6);color:#fff;border:none;border-radius:6px;cursor:pointer;">Open Unit Detail</button>
    </div>
  `;
}

function initMap() {
  let defaultLat = 53.9583, defaultLng = -1.0803, defaultZoom = 9;
  map = L.map('map').setView([defaultLat, defaultLng], defaultZoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  jobsLayer = L.layerGroup().addTo(map);
  unitLinksLayer = L.layerGroup().addTo(map);
  unitsLayer = L.layerGroup().addTo(map);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      map.setView([pos.coords.latitude, pos.coords.longitude], 12);
    });
  }
  map.on('click', (ev) => {
    if (!mapPickSession) return;
    const session = mapPickSession;
    cancelMapPick('picked');
    try {
      const ll = ev && ev.latlng ? ev.latlng : null;
      if (!ll) return;
      try {
        if (mapPickMarker) map.removeLayer(mapPickMarker);
        mapPickMarker = L.circleMarker([ll.lat, ll.lng], {
          radius: 8,
          color: '#22d3ee',
          fillColor: '#22d3ee',
          fillOpacity: 0.35,
          weight: 2
        }).addTo(map);
      } catch (e) {}
      if (typeof session.onPick === 'function') session.onPick(ll);
    } catch (e) {}
  });
  refreshMap();
}

let lastJobsCount = 0;
function refreshMap() {
  fetch(withDivision('/plugin/ventus_response_module/jobs')).then(r => r.json()).then(jobs => {
    jobsLayer.clearLayers();
    jobsData = jobs;
    lastJobsCount = jobs.length;
    jobCoordByCad = new Map();
    jobs.forEach(job => {
      if (job.lat && job.lng) {
        const cadInt = parseInt(job.cad, 10);
        if (Number.isFinite(cadInt)) jobCoordByCad.set(cadInt, [Number(job.lat), Number(job.lng)]);
        const marker = L.marker([job.lat, job.lng], { icon: jobIcon })
          .addTo(jobsLayer);
        if (job.is_external) marker.setOpacity(0.45);
        marker
          .bindTooltip(`CAD #${job.cad}`, { direction: "top" })
          .bindPopup(renderJobMapQuickPreview(job), { closeButton: true, autoPan: true, maxWidth: 360 });
      }
    });
    refreshOpenPanels(['jobs']);
  });

  fetch(withDivision('/plugin/ventus_response_module/units')).then(r => r.json()).then(units => {
    if (unitLinksLayer) unitLinksLayer.clearLayers();
    unitsLayer.clearLayers();
    unitsData = units;
    const nextUnits = new Set((Array.isArray(units) ? units : []).map(u => String(u.callSign || '')).filter(Boolean));
    if (unitsSnapshotInitialized) {
      nextUnits.forEach(cs => {
        if (!unitsSnapshot.has(cs)) {
          showNotification('success', 'Unit Signed On', cs);
          playChime('unit_signon');
        }
      });
      unitsSnapshot.forEach(cs => {
        if (!nextUnits.has(cs)) {
          showNotification('warning', 'Unit Signed Off', cs);
          playChime('unit_signoff');
        }
      });
    }
    unitsSnapshot = nextUnits;
    unitsSnapshotInitialized = true;
    units.forEach(unit => {
      if (unit.latitude && unit.longitude) {
        const marker = L.marker([unit.latitude, unit.longitude], { icon: unitIcon })
          .addTo(unitsLayer);
        if (unit.is_external) marker.setOpacity(0.4);
        marker
          .bindTooltip(`<div style="text-align:center;line-height:1.2;"><div>${escapeHtml(unit.callSign || '')}</div><div style="font-size:10px;opacity:0.9;">${escapeHtml(prettyStatus(unit.status || 'unknown'))}</div></div>`, {
            direction: "bottom",
            permanent: true,
            className: 'unit-map-label',
            offset: [0, 14]
          })
          .on('click', function() {
            const cs = (unit && unit.callSign) ? String(unit.callSign).trim() : '';
            if (cs && typeof window.loadUnitDetail === 'function') window.loadUnitDetail(cs);
          });

        const assignedCad = parseInt(unit.assignedIncident, 10);
        let targetPoint = null;
        let isStandby = false;
        if (Number.isFinite(assignedCad) && assignedCad > 0 && jobCoordByCad.has(assignedCad)) {
          targetPoint = jobCoordByCad.get(assignedCad);
        } else if (unit.standby_lat != null && unit.standby_lng != null) {
          targetPoint = [Number(unit.standby_lat), Number(unit.standby_lng)];
          isStandby = true;
        }
        if (targetPoint && unitLinksLayer && unitLinesVisible) {
          const line = L.polyline(
            [[Number(unit.latitude), Number(unit.longitude)], targetPoint],
            {
              color: isStandby ? '#f59e0b' : '#22c55e',
              weight: isStandby ? 2.5 : 3.5,
              opacity: 0.95,
              dashArray: isStandby ? '8 8' : null
            }
          ).addTo(unitLinksLayer);
          if (unit.is_external) line.setStyle({ opacity: 0.45 });
        }
      }
    });
    if (pendingDivisionRecenter) {
      pendingDivisionRecenter = false;
      try { recenterMapToNearestDivisionUnit(); } catch (e) {}
    }
    refreshOpenPanels(['units', 'messages']);
  });
}

function pollDispatcherAlerts() {
  fetch(withDivision('/plugin/ventus_response_module/jobs'))
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then((jobs) => {
      const activeJobs = (Array.isArray(jobs) ? jobs : []).filter(j => normalizeStatus(j.status) !== 'cleared');
      const next = new Map();
      activeJobs.forEach((j) => {
        const sig = [
          normalizeStatus(j.status),
          String(j.priority || ''),
          String(j.claimedBy || ''),
          String(j.reason_for_call || ''),
          String(j.updated_at || '')
        ].join('|');
        next.set(Number(j.cad), sig);
      });
      const scopeKey = `${String(selectedDivision || 'general')}|${showExternalDivisions ? '1' : '0'}`;
      if (lastAlertScopeKey !== scopeKey) {
        lastAlertScopeKey = scopeKey;
        jobSnapshot = next;
        jobSnapshotInitialized = true;
        return;
      }

      if (jobSnapshotInitialized) {
        next.forEach((sig, cad) => {
          const prev = jobSnapshot.get(cad);
          if (!prev) {
            showNotification('info', 'New Job', `CAD #${cad}`, { cad });
            playChime('new_job');
          } else if (prev !== sig) {
            showNotification('info', 'Job Updated', `CAD #${cad} changed`, { cad });
            playChime('job_update');
            if (activeJobCad === cad) {
              try { loadJobDetail(cad); } catch (e) {}
            }
          }
        });
      }
      jobSnapshot = next;
      jobSnapshotInitialized = true;
    })
    .catch(() => {});

  fetch('/plugin/ventus_response_module/job-comms/recent?limit=60')
    .then(r => (r.ok ? r.json() : {}))
    .then((data) => {
      const items = (data && Array.isArray(data.items)) ? data.items : (Array.isArray(data) ? data : []);
      if (!commSnapshotInitialized) {
        items.forEach((m) => { if (m && m.id != null) seenCommIds.add(Number(m.id)); });
        commSnapshotInitialized = true;
        return;
      }
      items.forEach((m) => {
        const id = Number(m && m.id);
        if (!Number.isFinite(id) || seenCommIds.has(id)) return;
        seenCommIds.add(id);
        const cad = Number(m && m.cad);
        const sender = String((m && (m.sender_user || m.sender_role)) || 'response centre');
        const text = String((m && m.message_text) || '').trim();
        const body = `CAD #${Number.isFinite(cad) ? cad : '?'} • ${sender}${text ? `: ${text.slice(0, 90)}` : ''}`;
        showNotification('info', (m && m.message_type === 'update') ? 'Incident Update' : 'Response Centre Message', body, Number.isFinite(cad) ? { cad } : null);
        playChime((m && m.message_type === 'update') ? 'job_update' : 'message');
        bumpMessageBadge(1);
        if (Number.isFinite(cad) && activeJobCad === cad) {
          try { loadJobDetail(cad); } catch (e) {}
        }
      });
      if (seenCommIds.size > 1000) {
        const keep = items.slice(-200).map(m => Number(m.id)).filter(Number.isFinite);
        seenCommIds = new Set(keep);
      }
      refreshOpenPanels(['messages']);
    })
    .catch(() => {});
}

function refreshDivisions() {
  const applyDivisionData = (data) => {
    const items = Array.isArray(data.items) && data.items.length
      ? data.items
      : (Array.isArray(data.divisions) ? data.divisions.map(d => ({ slug: d, name: d, color: '#64748b', is_default: false })) : [{ slug: 'general', name: 'General', color: '#64748b', is_default: true }]);
    const divisions = items.map(i => String(i.slug || '').trim()).filter(Boolean);
    divisionMeta = new Map(items.map(i => [String(i.slug || ''), i]));
    const defaultDiv = String(data.default || 'general');
    if (!selectedDivision || !divisions.includes(selectedDivision)) {
      selectedDivision = divisions.includes(defaultDiv) ? defaultDiv : divisions[0];
    }
    if (divisionSelect) {
      divisionSelect.innerHTML = items.map(d => `<option value="${escapeHtml(d.slug)}">${escapeHtml(d.name || d.slug)}</option>`).join('');
      divisionSelect.value = selectedDivision;
    }
    if (showExternalToggle) {
      const canShowExternal = !!(data && data.can_show_external);
      if (!canShowExternal) {
        showExternalDivisions = false;
        showExternalToggle.checked = false;
        showExternalToggle.disabled = true;
        showExternalToggle.title = 'Cross-division visibility not permitted for this account';
      } else {
        showExternalToggle.disabled = false;
        showExternalToggle.checked = !!showExternalDivisions;
        showExternalToggle.title = 'Show units/jobs outside selected division';
      }
    }
    return items;
  };

  fetch('/plugin/ventus_response_module/dispatch/divisions')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      const items = applyDivisionData(data);
      // Superuser/admin safety: if API gave only "general", try full catalog endpoint.
      const onlyGeneral = (items.length === 1 && String(items[0]?.slug || '') === 'general');
      const unrestricted = !!(data && data.access && data.access.restricted === false);
      if (onlyGeneral && unrestricted) {
        fetch('/plugin/ventus_response_module/dispatch/divisions/manage', { credentials: 'same-origin' })
          .then(r => (r.ok ? r.json() : null))
          .then(managed => {
            if (!managed || !Array.isArray(managed.items)) return;
            const activeItems = managed.items.filter(d => d && d.is_active !== false);
            if (activeItems.length > 1) {
              applyDivisionData({ items: activeItems, default: managed.default || 'general', can_show_external: true });
            }
          })
          .catch(() => {});
      }
    })
    .catch(async (err) => {
      try {
        const res = await fetch('/plugin/ventus_response_module/dispatch/my-division-access');
        if (res.ok) {
          const access = await res.json();
          const owned = Array.isArray(access?.divisions) ? access.divisions.filter(Boolean) : [];
          if (owned.length) {
            const fallbackItems = owned.map((slug) => ({ slug, name: String(slug).replaceAll('_', ' ').replace(/\b\w/g, m => m.toUpperCase()) }));
            divisionMeta = new Map(fallbackItems.map(i => [String(i.slug || ''), i]));
            if (!selectedDivision || !owned.includes(selectedDivision)) selectedDivision = owned[0];
            if (divisionSelect) {
              divisionSelect.innerHTML = fallbackItems.map(d => `<option value="${escapeHtml(d.slug)}">${escapeHtml(d.name || d.slug)}</option>`).join('');
              divisionSelect.value = selectedDivision;
            }
            return;
          }
          if (access && access.restricted === false) {
            const divRes = await fetch('/plugin/ventus_response_module/dispatch/divisions/manage', { credentials: 'same-origin' });
            if (divRes.ok) {
              const managed = await divRes.json();
              const activeItems = Array.isArray(managed?.items) ? managed.items.filter(d => d && d.is_active !== false) : [];
              if (activeItems.length) {
                applyDivisionData({ items: activeItems, default: managed.default || 'general', can_show_external: true });
                return;
              }
            }
          }
        }
      } catch (e) {}
      if (divisionSelect && !divisionSelect.options.length) {
        divisionSelect.innerHTML = '<option value="general">general</option>';
        divisionSelect.value = selectedDivision || 'general';
      }
      try { showNotification('danger', 'Divisions', `Division list failed (${(err && err.message) || 'unknown error'})`); } catch (e) {}
    });
}

if (dispatchModeSelect) {
  dispatchModeSelect.addEventListener('change', () => {
    const mode = dispatchModeSelect.value;
    fetch('/plugin/ventus_response_module/dispatch/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode })

const MAX_NOTIFICATIONS = 5;
let notifications = [];

function isPanelOpenByType(type) {
  return Object.values(openPanels || {}).some((p) => p && p.type === type);

function setRailBadge(btnId, count) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  let badge = btn.querySelector('.rail-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'rail-badge';
    btn.appendChild(badge);
  }
  const n = Number(count) || 0;
  if (n <= 0) {
    badge.style.display = 'none';
    badge.textContent = '';
    return;
  }
  badge.style.display = 'inline-block';
  badge.textContent = n > 99 ? '99+' : String(n);
}

function bumpMessageBadge(amount = 1) {
  if (isPanelOpenByType('messages')) {
    messageAlertCount = 0;
    setRailBadge('btnMsgs', 0);
    return;
  }
  messageAlertCount = Math.max(0, (Number(messageAlertCount) || 0) + (Number(amount) || 0));
  setRailBadge('btnMsgs', messageAlertCount);
}

function showNotification(type, title, body = '', options = null) {
  try {
    const container = document.getElementById('notifications');
    if (!container) return null;
    const id = 'n' + Date.now() + Math.floor(Math.random() * 1000);
    const el = document.createElement('div');
    el.className = `notification ${type}`;
    el.id = id;
    el.innerHTML = `
      <div class="notif-header">
        <span>${title}</span>
        <button class="notif-close">×</button>
      </div>
      <div class="notif-body">${body}</div>
    `;
    container.appendChild(el);

    el.querySelector('.notif-close').addEventListener('click', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      removeNotification(id);
    });
    const clickCad = options && Number.isInteger(parseInt(options.cad, 10)) ? parseInt(options.cad, 10) : null;
    const onClick = options && typeof options.onClick === 'function' ? options.onClick : null;
    if (clickCad || onClick) {
      el.classList.add('clickable');
      el.title = clickCad ? `Open CAD #${clickCad}` : 'Open';
      el.addEventListener('click', (ev) => {
        if (ev.target && ev.target.closest && ev.target.closest('.notif-close')) return;
        try {
          if (onClick) onClick();
          else if (clickCad) openJobDetailFromMap(clickCad);
        } catch (e) {}
      });
    }
    notifications.unshift(id);

    while (notifications.length > MAX_NOTIFICATIONS) {
      const old = notifications.pop();
      const node = document.getElementById(old);
      if (node) node.remove();
    }

    setTimeout(() => removeNotification(id), 5000);
    return id;
  } catch (e) { }
}

function removeNotification(id) {
  const node = document.getElementById(id);
  if (node) {
    node.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => { if (node.parentElement) node.remove(); }, 300);
  }
  notifications = notifications.filter(x => x !== id);
}

function patchListByKey(listEl, rows, emptyHtml = '') {
  if (!listEl) return;
  const nextRows = Array.isArray(rows) ? rows : [];
  if (!nextRows.length) {
    listEl.innerHTML = emptyHtml;
    return;
  }
  Array.from(listEl.children || []).forEach((el) => {
    const key = el && el.getAttribute ? el.getAttribute('data-row-key') : '';
    if (!key) {
      try { el.remove(); } catch (e) {}
    }
  });
  const existing = new Map();
  Array.from(listEl.children || []).forEach((el) => {
    const key = el && el.getAttribute ? el.getAttribute('data-row-key') : '';
    if (key) existing.set(key, el);
  });
  nextRows.forEach((row) => {
    const key = String(row && row.key ? row.key : '');
    if (!key) return;
    const html = String(row && row.html ? row.html : '');
    const hash = String(html.length) + ':' + html;
    const current = existing.get(key);
    if (current) {
      if ((current.getAttribute('data-row-hash') || '') !== hash) {
        current.outerHTML = html;
      }
      existing.delete(key);
      return;
    }
    listEl.insertAdjacentHTML('beforeend', html);
  });
  existing.forEach((el) => {
    try { el.remove(); } catch (e) {}
  });
}
