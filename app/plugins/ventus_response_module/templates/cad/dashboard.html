          <div style="display:flex;flex-direction:column;gap:6px;">
            <button class="btn" style="padding:4px 8px;font-size:11px;" onclick="event.stopPropagation();requestAssistForUnit('${escapeHtml(callsign)}', '${escapeHtml(u.division || 'general')}')">Request</button>
            <button class="btn" style="padding:4px 8px;font-size:11px;background:transparent;border:1px solid var(--border-color);" onclick="event.stopPropagation();transferUnitToMyDivision('${escapeHtml(callsign)}')">Transfer</button>
          </div>
        `
      : '';
    html += `
      <li class="panel-list-item" style="${u.is_external ? 'opacity:0.62;border-left-color:#94a3b8;' : ''};cursor:pointer;" onclick='loadUnitDetail(${JSON.stringify(callsign)})'>
        <i class="bi bi-truck-front" style="color:${statusColor};"></i>
        <span>
          <div style="font-weight:600;">${callsign}</div>
          <div class="meta">${u.station || 'Mobile'} - ${prettyStatus(u.status)}</div>
          <div class="meta">Division: ${escapeHtml(u.division || 'general')}${u.is_external ? ' (external)' : ''}</div>
          ${breakBlocked ? `<div class="meta" style="color:#fca5a5;">Break due: hold from new low-priority jobs</div>` : ''}
          ${(!breakBlocked && breakDue) ? `<div class="meta" style="color:#fde68a;">Break due soon${breakDueIn !== null ? ` (${escapeHtml(String(breakDueIn))}m)` : ''}</div>` : ''}
          ${shiftRemaining !== null ? `<div class="meta">Shift remaining: ${escapeHtml(String(shiftRemaining))}m</div>` : ''}
        </span>
        ${externalActions}
        <span class="status" style="background:${breakBlocked ? 'rgba(239,68,68,0.2)' : 'rgba(16,185,129,0.2)'};color:${breakBlocked ? '#fca5a5' : 'var(--accent-success)'};">${breakBlocked ? 'BREAK DUE' : prettyStatus(u.status)}</span>
      </li>
    `;
  });
  const unitsList = contentEl.querySelector('#unitsList');
  if (unitsList) unitsList.innerHTML = html;
}

const dispatchMsgState = {
  selectedUnit: '',
  draft: ''
};
const dispatchMsgUI = {
  collapsed: {
    inbox: false,
    conversations: false,
    assist: false,
    motd: false
  }
};

function loadMsgPanel(contentEl) {
  clearMessageBadge();
  contentEl.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr;gap:10px;">
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button class="btn" id="msgExpandAllBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Expand All</button>
        <button class="btn" id="msgCollapseAllBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Minimise All</button>
      </div>
      <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;background:rgba(2,6,23,0.45);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-weight:700;">Response Centre / Incident Inbox <span id="msgInboxCount" class="status" style="margin-left:6px;background:rgba(59,130,246,0.2);color:#bfdbfe;">0</span></div>
          <button class="btn" id="toggleInboxPanelBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Minimise</button>
        </div>
        <ul id="dispatcherInboxList" style="list-style:none;padding:0;margin:0;max-height:170px;overflow:auto;${dispatchMsgUI.collapsed.inbox ? 'display:none;' : ''}"></ul>
      </div>
      <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;background:rgba(2,6,23,0.45);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-weight:700;">Conversations <span id="msgConversationCount" class="status" style="margin-left:6px;background:rgba(16,185,129,0.2);color:#a7f3d0;">0</span></div>
          <button class="btn" id="toggleConversationsPanelBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Minimise</button>
        </div>
        <div id="conversationBlock" style="${dispatchMsgUI.collapsed.conversations ? 'display:none;' : ''}">
          <div id="msgRecipientChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
          <div id="msgsList" style="list-style:none;padding:8px;margin:0 0 10px 0;height:220px;overflow:auto;border:1px solid var(--border-color);border-radius:8px;background:rgba(0,0,0,0.16);"></div>
          <div id="msgReplyMeta" class="meta" style="margin-bottom:8px;">Select a unit to start messaging.</div>
          <textarea id="msgTextInput" rows="3" placeholder="Type message to selected unit..." style="margin-bottom:8px;resize:vertical;"></textarea>
          <div style="display:flex;gap:8px;">
            <button id="msgAckBtn" class="btn" style="flex:1;background:transparent;border:1px solid var(--border-color);"><i class="bi bi-check2-circle"></i> Acknowledge</button>
            <button id="msgSendBtn" class="btn" style="flex:1;"><i class="bi bi-send"></i> Send Reply</button>
          </div>
        </div>
      </div>
      <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;background:rgba(2,6,23,0.45);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-weight:700;">Cross-Division Assist Requests <span id="msgAssistCount" class="status" style="margin-left:6px;background:rgba(245,158,11,0.22);color:#fde68a;">0</span></div>
          <button class="btn" id="toggleAssistPanelBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Minimise</button>
        </div>
        <ul id="dispatcherAssistList" style="list-style:none;padding:0;margin:0;max-height:150px;overflow:auto;${dispatchMsgUI.collapsed.assist ? 'display:none;' : ''}"></ul>
      </div>
      <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;background:rgba(2,6,23,0.45);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-weight:700;">Dispatch Note / Message of the Day</div>
          <button class="btn" id="toggleMotdPanelBtn" type="button" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);">Minimise</button>
        </div>
        <div id="motdBlock" style="${dispatchMsgUI.collapsed.motd ? 'display:none;' : ''}">
          <div id="motdDisplay" style="font-size:12px;color:var(--text-secondary);padding:8px;border:1px dashed var(--border-color);border-radius:8px;background:rgba(0,0,0,0.2);margin-bottom:8px;">Loading note...</div>
          <button id="motdReloadBtn" class="btn" style="width:100%;background:transparent;border:1px solid var(--border-color);"><i class="bi bi-arrow-clockwise"></i> Refresh Note</button>
          <div id="motdMeta" class="meta" style="margin-top:6px;">Loading note...</div>
        </div>
      </div>
    </div>
  `;

  const toggleLabel = (btn, collapsed) => { if (btn) btn.textContent = collapsed ? 'Expand' : 'Minimise'; };
  const toggleSection = (key, blockEl, btnEl) => {
    dispatchMsgUI.collapsed[key] = !dispatchMsgUI.collapsed[key];
    if (blockEl) blockEl.style.display = dispatchMsgUI.collapsed[key] ? 'none' : '';
    toggleLabel(btnEl, dispatchMsgUI.collapsed[key]);
  };

  const inboxListEl = contentEl.querySelector('#dispatcherInboxList');
  const convoBlockEl = contentEl.querySelector('#conversationBlock');
  const assistListEl = contentEl.querySelector('#dispatcherAssistList');
  const motdBlockEl = contentEl.querySelector('#motdBlock');
  const msgExpandAllBtn = contentEl.querySelector('#msgExpandAllBtn');
  const msgCollapseAllBtn = contentEl.querySelector('#msgCollapseAllBtn');
  const msgInboxCount = contentEl.querySelector('#msgInboxCount');
  const msgConversationCount = contentEl.querySelector('#msgConversationCount');
  const msgAssistCount = contentEl.querySelector('#msgAssistCount');
  const toggleInboxBtn = contentEl.querySelector('#toggleInboxPanelBtn');
  const toggleConvoBtn = contentEl.querySelector('#toggleConversationsPanelBtn');
  const toggleAssistBtn = contentEl.querySelector('#toggleAssistPanelBtn');
  const toggleMotdBtn = contentEl.querySelector('#toggleMotdPanelBtn');
  toggleLabel(toggleInboxBtn, dispatchMsgUI.collapsed.inbox);
  toggleLabel(toggleConvoBtn, dispatchMsgUI.collapsed.conversations);
  toggleLabel(toggleAssistBtn, dispatchMsgUI.collapsed.assist);
  toggleLabel(toggleMotdBtn, dispatchMsgUI.collapsed.motd);
  toggleInboxBtn?.addEventListener('click', () => toggleSection('inbox', inboxListEl, toggleInboxBtn));
  toggleConvoBtn?.addEventListener('click', () => toggleSection('conversations', convoBlockEl, toggleConvoBtn));
  toggleAssistBtn?.addEventListener('click', () => toggleSection('assist', assistListEl, toggleAssistBtn));
  toggleMotdBtn?.addEventListener('click', () => toggleSection('motd', motdBlockEl, toggleMotdBtn));
  msgExpandAllBtn?.addEventListener('click', () => {
    dispatchMsgUI.collapsed = { inbox: false, conversations: false, assist: false, motd: false };
    if (inboxListEl) inboxListEl.style.display = '';
    if (convoBlockEl) convoBlockEl.style.display = '';
    if (assistListEl) assistListEl.style.display = '';
    if (motdBlockEl) motdBlockEl.style.display = '';
    toggleLabel(toggleInboxBtn, false);
    toggleLabel(toggleConvoBtn, false);
    toggleLabel(toggleAssistBtn, false);
    toggleLabel(toggleMotdBtn, false);
  });
  msgCollapseAllBtn?.addEventListener('click', () => {
    dispatchMsgUI.collapsed = { inbox: true, conversations: true, assist: true, motd: true };
    if (inboxListEl) inboxListEl.style.display = 'none';
    if (convoBlockEl) convoBlockEl.style.display = 'none';
    if (assistListEl) assistListEl.style.display = 'none';
    if (motdBlockEl) motdBlockEl.style.display = 'none';
    toggleLabel(toggleInboxBtn, true);
    toggleLabel(toggleConvoBtn, true);
    toggleLabel(toggleAssistBtn, true);
    toggleLabel(toggleMotdBtn, true);
  });

  const msgsList = contentEl.querySelector('#msgsList');
  const recipientChips = contentEl.querySelector('#msgRecipientChips');
  const msgReplyMeta = contentEl.querySelector('#msgReplyMeta');
  const msgTextInput = contentEl.querySelector('#msgTextInput');
  const msgSendBtn = contentEl.querySelector('#msgSendBtn');
  const msgAckBtn = contentEl.querySelector('#msgAckBtn');
  const dispatcherInboxList = contentEl.querySelector('#dispatcherInboxList');
  const dispatcherAssistList = contentEl.querySelector('#dispatcherAssistList');
  const motdDisplay = contentEl.querySelector('#motdDisplay');
  const motdMeta = contentEl.querySelector('#motdMeta');
  const motdReloadBtn = contentEl.querySelector('#motdReloadBtn');

  const setSectionCount = (el, n) => {
    if (!el) return;
    const count = Math.max(0, Number(n) || 0);
    el.textContent = count > 99 ? '99+' : String(count);
    el.style.display = count > 0 ? 'inline-block' : 'none';
  };

  msgTextInput.value = dispatchMsgState.draft || '';
  msgTextInput.addEventListener('input', () => { dispatchMsgState.draft = msgTextInput.value || ''; });

  const loadConversation = (callsign) => {
    if (!callsign) {
      msgsList.innerHTML = '<div class="meta" style="padding:8px;">Select a unit to view messages.</div>';
      return Promise.resolve();
    }
    return fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(callsign)}`)
      .then(r => r.ok ? r.json() : [])
      .then((rows) => {
        const list = Array.isArray(rows) ? rows : [];
        if (!list.length) {
          msgsList.innerHTML = '<div class="meta" style="padding:8px;">No messages yet.</div>';
          return;
        }
        msgsList.innerHTML = list.slice(-80).map((m) => {
          const from = String(m.from || '').trim();
          const outgoing = from.toLowerCase() === 'dispatcher';
          return `
            <div style="display:flex;justify-content:${outgoing ? 'flex-end' : 'flex-start'};margin-bottom:8px;">
              <div style="max-width:78%;padding:8px 10px;border-radius:10px;border:1px solid var(--border-color);background:${outgoing ? 'rgba(59,130,246,0.2)' : 'rgba(2,6,23,0.55)'};">
                <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">${escapeHtml(from || 'unknown')} | ${escapeHtml(m.timestamp ? new Date(m.timestamp).toLocaleString() : '')}</div>
                <div>${escapeHtml(m.text || '')}</div>
              </div>
            </div>
          `;
        }).join('');
        msgsList.scrollTop = msgsList.scrollHeight;
      })
      .catch(() => {
        msgsList.innerHTML = '<div class="meta" style="padding:8px;">Failed to load conversation.</div>';
      });
  };

  const sendMessage = (text) => {
    const cs = String(dispatchMsgState.selectedUnit || '').trim();
    const body = String(text || '').trim();
    if (!cs || !body) return Promise.resolve();
    return fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: body, from: 'dispatcher' })
    })
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        if (!ok) throw new Error(d.error || 'Send failed');
      });
  };

  const renderRecipientChips = (callsigns) => {
    const list = Array.isArray(callsigns) ? callsigns : [];
    if (!list.length) {
      recipientChips.innerHTML = '<span class="meta">No active units.</span>';
      dispatchMsgState.selectedUnit = '';
      msgReplyMeta.textContent = 'No active units signed on.';
      loadConversation('');
      return;
    }
    if (!dispatchMsgState.selectedUnit || !list.includes(dispatchMsgState.selectedUnit)) {
      dispatchMsgState.selectedUnit = list[0];
    }
    recipientChips.innerHTML = list.map((cs) => {
      const active = cs === dispatchMsgState.selectedUnit;
      return `<button class="btn" data-cs="${escapeHtml(cs)}" style="padding:5px 10px;${active ? '' : 'background:transparent;border:1px solid var(--border-color);'}">${escapeHtml(cs)}</button>`;
    }).join('');
    Array.from(recipientChips.querySelectorAll('button[data-cs]')).forEach((btn) => {
      btn.addEventListener('click', () => {
        dispatchMsgState.selectedUnit = btn.getAttribute('data-cs') || '';
        dispatchMsgState.draft = '';
        msgTextInput.value = '';
        msgReplyMeta.textContent = `Replying to ${dispatchMsgState.selectedUnit}`;
        renderRecipientChips(list);
        loadConversation(dispatchMsgState.selectedUnit);
      });
    });
    msgReplyMeta.textContent = `Replying to ${dispatchMsgState.selectedUnit}`;
    loadConversation(dispatchMsgState.selectedUnit);
  };

  const loadUnits = () =>
    fetch(withDivision('/plugin/ventus_response_module/units'))
      .then(r => r.ok ? r.json() : [])
      .then((units) => {
        const callsigns = (Array.isArray(units) ? units : []).map(u => String(u.callSign || '')).filter(Boolean);
        setSectionCount(msgConversationCount, callsigns.length);
        renderRecipientChips(callsigns);
      })
      .catch(() => {
        setSectionCount(msgConversationCount, 0);
        recipientChips.innerHTML = '<span class="meta">Unable to load units.</span>';
      });

  const loadDispatcherInbox = () =>
    fetch('/plugin/ventus_response_module/job-comms/recent?limit=80')
      .then(r => r.ok ? r.json() : [])
      .then(rows => {
        const list = (Array.isArray(rows) ? rows : []);
        setSectionCount(msgInboxCount, list.length);
        if (!list.length) {
          dispatcherInboxList.innerHTML = '<li style="color:var(--text-muted);padding:8px;">No incident messages yet.</li>';
          return;
        }
        dispatcherInboxList.innerHTML = list.slice(-25).reverse().map((m) => {
          const type = (m && m.message_type === 'update') ? 'Update' : 'Message';
          const who = (m && (m.sender_user || m.sender_role)) || 'unknown';
          const when = m && m.created_at ? new Date(m.created_at).toLocaleString() : '';
          const cad = Number(m && m.cad);
          return `
            <li class="panel-list-item" style="cursor:pointer;" onclick="${Number.isFinite(cad) && cad > 0 ? `loadJobDetail(${cad});` : ''}">
              <i class="bi bi-bell" style="color:var(--accent);"></i>
              <span>
                <div style="font-weight:600;">CAD #${escapeHtml(Number.isFinite(cad) ? cad : '?')} | ${escapeHtml(type)}</div>
                <div class="meta">${escapeHtml(m && m.message_text ? m.message_text : '')}</div>
                <div class="meta">${escapeHtml(who)} | ${escapeHtml(when)}</div>
              </span>
            </li>
          `;
        }).join('');
      })
      .catch(() => {
        setSectionCount(msgInboxCount, 0);
        dispatcherInboxList.innerHTML = '<li style="color:var(--text-muted);padding:8px;">Unable to load inbox.</li>';
      });

  const resolveAssistRequest = (id, decision) =>
    fetch(`/plugin/ventus_response_module/dispatch/assist-requests/${encodeURIComponent(id)}/resolve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decision, transfer_division: true })
    })
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        if (!ok) throw new Error((d && d.error) || 'Resolve failed');
        showNotification('success', 'Assist Request', `Request #${id} ${decision}d`);
        return loadAssistRequests();
      })
      .catch((e) => showNotification('danger', 'Assist Request Failed', e.message || 'Failed'));
  window.__resolveAssistReq = resolveAssistRequest;

  const loadAssistRequests = () => {
    const q = getDivisionParams().toString();
    const url = `/plugin/ventus_response_module/dispatch/assist-requests?status=pending${q ? `&${q}` : ''}`;
    return fetch(url)
      .then(r => r.ok ? r.json() : [])
      .then(rows => {
        const list = Array.isArray(rows) ? rows : [];
        setSectionCount(msgAssistCount, list.length);
        if (!list.length) {
          dispatcherAssistList.innerHTML = '<li style="color:var(--text-muted);padding:8px;">No pending assist requests.</li>';
          return;
        }
        dispatcherAssistList.innerHTML = list.slice(0, 20).map(r => {
          const id = Number(r && r.id);
          const cad = Number(r && r.cad);
          const reqFrom = String((r && r.from_division) || 'unknown');
          const reqTo = String((r && r.to_division) || 'unknown');
          const cs = String((r && r.callsign) || '');
          return `
            <li class="panel-list-item">
              <i class="bi bi-arrow-left-right" style="color:var(--accent);"></i>
              <span>
                <div style="font-weight:600;">#${escapeHtml(id)} | ${escapeHtml(cs)}</div>
                <div class="meta">${escapeHtml(reqFrom)} -> ${escapeHtml(reqTo)}${Number.isFinite(cad) && cad > 0 ? ` | CAD #${escapeHtml(cad)}` : ''}</div>
              </span>
              <div style="display:flex;flex-direction:column;gap:6px;">
                ${Number.isFinite(cad) && cad > 0 ? `<button class="btn" style="padding:4px 8px;font-size:11px;" onclick="loadJobDetail(${cad})">Open</button>` : ''}
                <button class="btn" style="padding:4px 8px;font-size:11px;" onclick="window.__resolveAssistReq(${id},'approve')">Approve</button>
                <button class="btn" style="padding:4px 8px;font-size:11px;background:transparent;border:1px solid var(--border-color);" onclick="window.__resolveAssistReq(${id},'reject')">Reject</button>
              </div>
            </li>
          `;
        }).join('');
      })
      .catch(() => {
        setSectionCount(msgAssistCount, 0);
        dispatcherAssistList.innerHTML = '<li style="color:var(--text-muted);padding:8px;">Unable to load assist requests.</li>';
      });
  };

  const loadMotd = () =>
    fetch('/plugin/ventus_response_module/dispatch/motd')
      .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
      .then(data => {
        motdDisplay.textContent = (data.text || '').trim() || 'No dispatch note set.';
        const stamp = data.updated_at ? new Date(data.updated_at).toLocaleString() : 'never';
        const by = data.updated_by || 'unknown';
        motdMeta.textContent = `Last updated ${stamp} by ${by}`;
      })
      .catch((e) => {
        motdDisplay.textContent = 'Unable to load dispatch note.';
        motdMeta.textContent = `Unable to load note (${e.message})`;
      });

  motdReloadBtn.addEventListener('click', loadMotd);
  msgAckBtn.addEventListener('click', () => {
    if (!dispatchMsgState.selectedUnit) {
      showNotification('warning', 'Acknowledge', 'Select a unit first');
      return;
    }
    sendMessage('Acknowledged. Message received.')
      .then(() => {
        showNotification('success', 'Acknowledge', `Acknowledged ${dispatchMsgState.selectedUnit}`);
        return loadConversation(dispatchMsgState.selectedUnit);
      })
      .catch((e) => showNotification('danger', 'Acknowledge', e.message || 'Failed'));
  });
  msgSendBtn.addEventListener('click', () => {
    const text = (msgTextInput.value || '').trim();
    if (!dispatchMsgState.selectedUnit || !text) {
      showNotification('warning', 'Message', 'Select a unit and enter a reply');
      return;
    }
    msgSendBtn.disabled = true;
    sendMessage(text)
      .then(() => {
        dispatchMsgState.draft = '';
        msgTextInput.value = '';
        showNotification('success', 'Message', `Sent to ${dispatchMsgState.selectedUnit}`);
        return loadConversation(dispatchMsgState.selectedUnit);
      })
      .catch((e) => showNotification('danger', 'Message', e.message || 'Failed'))
      .finally(() => { msgSendBtn.disabled = false; });
  });

  Promise.all([loadMotd(), loadUnits(), loadDispatcherInbox(), loadAssistRequests()]);
  const inboxPoll = setInterval(() => {
    if (!document.body.contains(contentEl)) { clearInterval(inboxPoll); return; }
    loadDispatcherInbox();
    loadAssistRequests();
    if (!isMessageComposerActive()) {
      loadUnits();
    }
  }, 5000);
}

// ===== ACTIONS =====
window.transferUnitToMyDivision = function(callsign) {
  if (!callsign || !selectedDivision) return;
  fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(callsign)}/transfer-division`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ division: selectedDivision })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Transfer failed');
      showNotification('success', 'Unit Transferred', `${callsign} -> ${selectedDivision}`);
      setTimeout(refreshMap, 300);
      Object.values(openPanels).forEach(p => loadPanelContent(p.id, p.type));
    })
    .catch((e) => showNotification('danger', 'Transfer Failed', e.message || 'Unable to transfer unit'));
};

window.requestAssistForUnit = function(callsign, fromDivision = 'general') {
  if (!callsign || !selectedDivision) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:7100;';
  const active = (Array.isArray(jobsData) ? jobsData : []).filter(j => normalizeStatus(j.status) !== 'cleared' && normalizeStatus(j.status) !== 'stood_down');
  const opts = ['<option value="">No CAD link</option>'].concat(active.map(j => `<option value="${escapeHtml(j.cad)}">CAD #${escapeHtml(j.cad)} - ${escapeHtml(j.reason_for_call || j.status || '')}</option>`));
  modal.innerHTML = `
    <div style="width:min(560px,92vw);background:var(--bg-panel,rgba(15,23,42,0.98));border:1px solid var(--border-color);border-radius:12px;padding:16px;">
      <div style="font-weight:700;margin-bottom:6px;">Request Cross-Division Assist</div>
      <div class="meta" style="margin-bottom:10px;">Unit <b>${escapeHtml(callsign)}</b> from <b>${escapeHtml(fromDivision || 'general')}</b> -> <b>${escapeHtml(selectedDivision)}</b></div>
      <label class="meta">Attach to CAD (optional)</label>
      <select id="assistCadSel" style="width:100%;margin:6px 0 10px 0;">${opts.join('')}</select>
      <label class="meta">Request note</label>
      <textarea id="assistNoteTxt" style="width:100%;min-height:86px;" placeholder="Reason for requesting support..."></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button id="assistCancelBtn" class="btn" style="width:100%;background:transparent;border:1px solid var(--border-color);">Cancel</button>
        <button id="assistSendBtn" class="btn" style="width:100%;"><i class="bi bi-send"></i> Send Request</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const close = () => { try { modal.remove(); } catch (e) {} };
  modal.querySelector('#assistCancelBtn')?.addEventListener('click', close);
  modal.addEventListener('click', (ev) => { if (ev.target === modal) close(); });
  modal.querySelector('#assistSendBtn')?.addEventListener('click', () => {
    const cadRaw = modal.querySelector('#assistCadSel')?.value || '';
    const note = (modal.querySelector('#assistNoteTxt')?.value || '').trim();
    const cad = cadRaw ? parseInt(cadRaw, 10) : null;
    fetch('/plugin/ventus_response_module/dispatch/assist-requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        callsign,
        from_division: fromDivision || 'general',
        to_division: selectedDivision,
        cad: Number.isInteger(cad) ? cad : null,
        note
      })
    })
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        if (!ok) throw new Error((d && d.error) || 'Request failed');
        close();
        showNotification('success', 'Assist Requested', `${callsign} requested for ${selectedDivision}`);
      })
      .catch((e) => showNotification('danger', 'Assist Request Failed', e.message || 'Failed'));
  });
};

window.loadUnitDetail = function(callsign) {
  const cs = String(callsign || '').trim();
  if (!cs) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:7200;';
  modal.innerHTML = `
    <div id="unitDetailShell" style="width:min(820px,96vw);max-height:90vh;overflow:auto;background:var(--bg-panel,rgba(15,23,42,0.98));border:1px solid var(--border-color);border-radius:12px;padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-weight:700;">Unit Detail • ${escapeHtml(cs)}</div>
        <button id="unitDetailCloseBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);padding:4px 10px;">Close</button>
      </div>
      <div id="unitDetailBody" class="meta">Loading unit detail...</div>
    </div>
  `;
  document.body.appendChild(modal);
  let unitDetailPoll = null;
  const close = () => {
    try { if (unitDetailPoll) clearInterval(unitDetailPoll); } catch (e) {}
    try {
      if (mapPickSession && String(mapPickSession.callsign || '').toUpperCase() === cs.toUpperCase()) {
        cancelMapPick('modal_close');
      }
    } catch (e) {}
    try { modal.remove(); } catch (e) {}
  };
  modal.querySelector('#unitDetailCloseBtn')?.addEventListener('click', close);
  modal.addEventListener('click', (ev) => { if (ev.target === modal) close(); });

  const bodyEl = modal.querySelector('#unitDetailBody');

  const loadAll = () => Promise.all([
    fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(cs)}/detail`).then(r => r.ok ? r.json() : Promise.reject(new Error(`Detail ${r.status}`))),
    fetch('/plugin/ventus_response_module/standby-locations').then(r => r.ok ? r.json() : []),
    fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`).then(r => r.ok ? r.json() : [])
  ]);

  const sendUnitMessage = (text) =>
    fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: String(text || '').trim(), from: 'dispatcher' })
    }).then(r => r.json().then(d => ({ ok: r.ok, d })));

  const formatAgo = (seconds) => {
    if (seconds == null || !Number.isFinite(Number(seconds))) return '--';
    const s = Math.max(0, Number(seconds));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = Math.floor(s % 60);
    if (h > 0) return `${h}h ${m}m ${sec}s`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
  };

  const render = (detail, presets, messages) => {
    const currentJob = detail.current_job || null;
    const recentJobs = Array.isArray(detail.recent_jobs) ? detail.recent_jobs : [];
    const crewRemovals = Array.isArray(detail.crew_removals) ? detail.crew_removals : [];
    const conversation = Array.isArray(messages) ? messages.slice(-40) : [];
    const presetOptions = (Array.isArray(presets) ? presets : []).map(p =>
      `<option value="${escapeHtml(JSON.stringify({ name: p.name, lat: p.lat, lng: p.lng }))}">${escapeHtml(p.name)} (${escapeHtml(p.lat)}, ${escapeHtml(p.lng)})</option>`
    ).join('');
    bodyEl.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;">
        <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;">
          <div style="font-weight:700;margin-bottom:8px;">Live Status</div>
          <div class="meta">Status: <b>${escapeHtml(prettyStatus(detail.status || '--'))}</b></div>
          <div class="meta">Division: <b>${escapeHtml(detail.division || 'general')}</b></div>
          <div class="meta">Last Ping: <b>${escapeHtml(formatAgo(detail.last_ping_seconds))}</b></div>
          <div class="meta">Last Seen: ${escapeHtml(detail.last_seen_at || '--')}</div>
          <div class="meta">Coordinates: ${detail.last_lat != null ? escapeHtml(String(detail.last_lat)) : '--'}, ${detail.last_lng != null ? escapeHtml(String(detail.last_lng)) : '--'}</div>
          <div class="meta">Crew: ${escapeHtml((Array.isArray(detail.crew) ? detail.crew.join(', ') : '') || '--')}</div>
          <div class="meta">Shift Elapsed: ${detail.shift_elapsed_minutes != null ? `${escapeHtml(String(detail.shift_elapsed_minutes))}m` : '--'}</div>
          <div class="meta">Shift Remaining: ${detail.shift_remaining_minutes != null ? `${escapeHtml(String(detail.shift_remaining_minutes))}m` : '--'}</div>
          <div class="meta">Break Policy: ${detail.break_due ? '<span style="color:#fca5a5;">Break due</span>' : (detail.near_break ? '<span style="color:#fde68a;">Break due soon</span>' : 'OK')}</div>
          <div class="meta">Break Due In: ${detail.break_due_in_minutes != null ? `${escapeHtml(String(detail.break_due_in_minutes))}m` : '--'}</div>
          ${detail.meal_break_active ? `<div class="meta" style="color:#fbbf24;">Meal break remaining: ${escapeHtml(formatAgo(detail.meal_break_remaining_seconds || 0))}</div>` : ''}
          <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-color);">
            <div style="font-size:12px;font-weight:700;opacity:0.95;margin-bottom:6px;">Crew Changes</div>
            ${crewRemovals.length ? `
              <div style="max-height:108px;overflow:auto;padding-right:4px;">
                ${crewRemovals.map((entry) => {
                  const removedUser = String((entry && entry.removed_username) || '').trim() || 'unknown';
                  const reason = String((entry && entry.removal_reason) || '').trim() || 'Other';
                  const removedAt = (entry && entry.removed_at) ? new Date(entry.removed_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--';
                  return `<div class="meta" style="margin-bottom:4px;">${escapeHtml(removedUser)} removed - ${escapeHtml(reason)} (${escapeHtml(removedAt)})</div>`;
                }).join('')}
              </div>
            ` : '<div class="meta">No crew removal events this shift.</div>'}
          </div>
          ${detail.meal_break_until ? `<div class="meta" style="color:#fbbf24;">Meal break until ${escapeHtml(detail.meal_break_until)}</div>` : ''}
        </div>
        <div style="border:1px solid var(--border-color);border-radius:10px;padding:10px;">
          <div style="font-weight:700;margin-bottom:8px;">Workload</div>
          <div class="meta">Current Job: ${currentJob ? `<b>CAD #${escapeHtml(currentJob.cad)}</b> (${escapeHtml(prettyStatus(currentJob.status || '--'))})` : '--'}</div>
          ${currentJob ? `<div class="meta">${escapeHtml(currentJob.reason_for_call || '')}</div><button id="unitOpenJobBtn" class="btn" style="margin-top:8px;width:100%;"><i class="bi bi-folder2-open"></i> Open Current CAD</button>` : ''}
          <div class="meta" style="margin-top:8px;">Jobs since sign on: <b>${escapeHtml(String(detail.jobs_since_sign_on || 0))}</b></div>
          <div style="max-height:120px;overflow:auto;margin-top:6px;border:1px dashed var(--border-color);border-radius:8px;padding:6px;">
            ${(recentJobs.length ? recentJobs.map(j => `<div class="meta" style="margin-bottom:4px;">CAD #${escapeHtml(j.cad)} • ${escapeHtml(prettyStatus(j.status || ''))} • ${escapeHtml(j.last_event || '')}</div>`).join('') : '<div class="meta">No jobs logged yet.</div>')}
          </div>
        </div>
      </div>
      <div style="margin-top:12px;border:1px solid var(--border-color);border-radius:10px;padding:10px;">
        <div style="font-weight:700;margin-bottom:8px;">Dispatch Destination / Standby Instruction</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <input id="unitStandbyName" placeholder="Location name" value="Standby ${escapeHtml(cs)}">
          <input id="unitStandbyLat" placeholder="Latitude">
          <input id="unitStandbyLng" placeholder="Longitude">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <input id="unitStandbyW3W" placeholder="what3words (optional)">
          <input id="unitStandbyAddress" placeholder="Address / location text (optional)">
        </div>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-top:8px;">
          <input id="unitLocationSearchQuery" placeholder="Search hospitals / destinations">
          <button id="unitSearchHospitalsBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">Search Hospitals</button>
          <button id="unitSearchNearbyBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">Nearby</button>
        </div>
        <div id="unitLocationSearchResults" style="max-height:150px;overflow:auto;margin-top:8px;border:1px dashed var(--border-color);border-radius:8px;padding:6px;">
          <div class="meta">Search for a destination to auto-fill coordinates.</div>
        </div>
        <input type="hidden" id="unitStandbySource" value="manual">
        <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:8px;margin-top:8px;">
          <select id="unitStandbyPreset"><option value="">Preset standby locations...</option>${presetOptions}</select>
          <button id="unitPickOnMapBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">Pick on Map</button>
          <button id="unitUseMapCenterBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">Use Map Center</button>
          <button id="unitSetStandbyBtn" class="btn"><i class="bi bi-send"></i> Send Instruction</button>
        </div>
        <div class="meta" style="margin-top:6px;">Instructions are delivered to MDT via dedicated dispatch-instruction endpoint and retained as standby destination.</div>
      </div>
      <div style="margin-top:12px;border:1px solid var(--border-color);border-radius:10px;padding:10px;">
        <div style="font-weight:700;margin-bottom:8px;">Unit Messaging</div>
        <div id="unitConversationList" style="max-height:180px;overflow:auto;border:1px solid var(--border-color);border-radius:8px;padding:8px;background:rgba(0,0,0,0.18);margin-bottom:8px;">
          ${conversation.length ? conversation.map((m) => {
            const from = String(m && m.from ? m.from : '').trim() || 'unknown';
            const outgoing = from.toLowerCase() === 'dispatcher';
            const when = m && m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
            const text = String(m && m.text ? m.text : '');
            return `
              <div style="display:flex;justify-content:${outgoing ? 'flex-end' : 'flex-start'};margin-bottom:8px;">
                <div style="max-width:85%;padding:8px 10px;border-radius:10px;border:1px solid var(--border-color);background:${outgoing ? 'rgba(59,130,246,0.2)' : 'rgba(2,6,23,0.55)'};">
                  <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">${escapeHtml(from)} | ${escapeHtml(when)}</div>
                  <div>${escapeHtml(text)}</div>
                </div>
              </div>
            `;
          }).join('') : '<div class="meta">No messages yet.</div>'}
        </div>
        <textarea id="unitMsgText" rows="3" placeholder="Type message to ${escapeHtml(cs)}..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button id="unitAckBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">Acknowledge</button>
          <button id="unitSendMsgBtn" class="btn"><i class="bi bi-send"></i> Send Message</button>
        </div>
      </div>
      <div style="margin-top:12px;border:1px solid var(--border-color);border-radius:10px;padding:10px;">
        <div style="font-weight:700;margin-bottom:8px;">Controls</div>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;">
          <input id="unitMealMins" type="number" min="5" max="180" value="30" placeholder="Meal break minutes">
          <button id="unitMealStartBtn" class="btn" style="background:rgba(245,158,11,0.18);border:1px solid #f59e0b;">Start Meal Break</button>
          <button id="unitMealStopBtn" class="btn" style="background:transparent;border:1px solid var(--border-color);">End Meal Break</button>
        </div>
        <button id="unitForceSignoffBtn" class="btn" style="margin-top:8px;width:100%;background:rgba(220,38,38,0.18);border:1px solid #dc2626;"><i class="bi bi-box-arrow-right"></i> Force Sign Off Unit</button>
      </div>
    `;

    const setLatLng = (lat, lng) => {
      bodyEl.querySelector('#unitStandbyLat').value = (lat != null ? String(lat) : '');
      bodyEl.querySelector('#unitStandbyLng').value = (lng != null ? String(lng) : '');
    };
    const setSource = (source) => {
      const sourceEl = bodyEl.querySelector('#unitStandbySource');
      if (sourceEl) sourceEl.value = String(source || 'manual');
    };
    const setStandbyNameFromAddress = (rawName) => {
      const name = String(rawName || '').trim();
      if (!name) return;
      const first = name.split(',')[0].trim();
      bodyEl.querySelector('#unitStandbyName').value = first || name;
      bodyEl.querySelector('#unitStandbyAddress').value = name;
    };
    const renderLocationSearchResults = (items) => {
      const listEl = bodyEl.querySelector('#unitLocationSearchResults');
      if (!listEl) return;
      const rows = Array.isArray(items) ? items : [];
      if (!rows.length) {
        listEl.innerHTML = '<div class="meta">No matching locations found.</div>';
        return;
      }
      listEl.innerHTML = rows.map((item, idx) => {
        const name = String(item && item.name ? item.name : '').trim() || 'Unknown location';
        const lat = (item && item.lat != null) ? Number(item.lat) : null;
        const lng = (item && item.lng != null) ? Number(item.lng) : null;
        const distance = (item && item.distance_m != null && Number.isFinite(Number(item.distance_m)))
          ? `${Math.round(Number(item.distance_m))}m`
          : '--';
        const kind = String(item && item.type ? item.type : 'location');
        return `
          <button class="btn unit-location-result" type="button" data-idx="${idx}" style="width:100%;text-align:left;background:transparent;border:1px solid var(--border-color);margin-bottom:6px;padding:6px 8px;">
            <div style="font-weight:600;">${escapeHtml(name)}</div>
            <div class="meta">${escapeHtml(kind)} | ${escapeHtml(distance)} | ${lat != null && lng != null ? `${escapeHtml(String(lat))}, ${escapeHtml(String(lng))}` : 'No coords'}</div>
          </button>
        `;
      }).join('');
      Array.from(listEl.querySelectorAll('.unit-location-result')).forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-idx') || '-1', 10);
          const item = rows[idx];
          if (!item) return;
          const lat = (item.lat != null) ? Number(item.lat) : null;
          const lng = (item.lng != null) ? Number(item.lng) : null;
          if (Number.isFinite(lat) && Number.isFinite(lng)) {
            setLatLng(Number(lat).toFixed(6), Number(lng).toFixed(6));
          }
          setStandbyNameFromAddress(item.name);
          setSource('location_search');
          showNotification('success', 'Destination', `${cs} destination selected`);
        });
      });
    };
    const searchLocations = (searchType, presetTerm = '') => {
      const queryEl = bodyEl.querySelector('#unitLocationSearchQuery');
      const queryRaw = String(queryEl?.value || '').trim();
      const q = queryRaw || String(presetTerm || '').trim();
      if (!q) {
        showNotification('warning', 'Search', 'Enter a destination search term');
        return;
      }
      const mapCenter = (map && map.getCenter) ? map.getCenter() : null;
      const params = new URLSearchParams();
      params.set('q', q);
      params.set('type', searchType === 'hospital' ? 'hospital' : 'general');
      if (mapCenter && Number.isFinite(Number(mapCenter.lat)) && Number.isFinite(Number(mapCenter.lng))) {
        params.set('lat', String(Number(mapCenter.lat)));
        params.set('lng', String(Number(mapCenter.lng)));
      }
      const listEl = bodyEl.querySelector('#unitLocationSearchResults');
      if (listEl) listEl.innerHTML = '<div class="meta">Searching...</div>';
      fetch(`/plugin/ventus_response_module/location-search?${params.toString()}`)
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`))))
        .then((data) => {
          renderLocationSearchResults(data && data.items ? data.items : []);
        })
        .catch((e) => {
          if (listEl) listEl.innerHTML = '<div class="meta">Unable to search destinations right now.</div>';
          showNotification('danger', 'Search Failed', e.message || 'Unable to search');
        });
    };
    const setModalPickState = (active) => {
      const shell = modal.querySelector('#unitDetailShell');
      if (!shell) return;
      if (active) {
        modal.style.background = 'transparent';
        shell.style.opacity = '0.35';
        shell.style.pointerEvents = 'none';
      } else {
        modal.style.background = 'rgba(0,0,0,0.55)';
        shell.style.opacity = '1';
        shell.style.pointerEvents = '';
      }
    };
    const standby = (detail && typeof detail.standby === 'object' && detail.standby) ? detail.standby : null;
    if (standby) {
      if (standby.name) bodyEl.querySelector('#unitStandbyName').value = standby.name;
      if (standby.lat != null && standby.lng != null) setLatLng(standby.lat, standby.lng);
      if (standby.what3words) bodyEl.querySelector('#unitStandbyW3W').value = standby.what3words;
      if (standby.address) bodyEl.querySelector('#unitStandbyAddress').value = standby.address;
      setSource(standby.source || 'manual');
    } else if (detail.last_lat != null && detail.last_lng != null) {
      setLatLng(detail.last_lat, detail.last_lng);
    }

    bodyEl.querySelector('#unitOpenJobBtn')?.addEventListener('click', () => {
      if (currentJob && currentJob.cad) {
        close();
        loadJobDetail(currentJob.cad);
      }
    });
    bodyEl.querySelector('#unitStandbyPreset')?.addEventListener('change', (ev) => {
      const raw = ev.target.value || '';
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        bodyEl.querySelector('#unitStandbyName').value = p.name || '';
        setLatLng(p.lat, p.lng);
        bodyEl.querySelector('#unitStandbyAddress').value = p.name || '';
        setSource('preset');
      } catch (e) {}
    });
    bodyEl.querySelector('#unitSearchHospitalsBtn')?.addEventListener('click', () => {
      searchLocations('hospital');
    });
    bodyEl.querySelector('#unitSearchNearbyBtn')?.addEventListener('click', () => {
      const qEl = bodyEl.querySelector('#unitLocationSearchQuery');
      if (qEl && !String(qEl.value || '').trim()) qEl.value = 'hospital';
      searchLocations('hospital', 'hospital');
    });
    bodyEl.querySelector('#unitLocationSearchQuery')?.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter') return;
      ev.preventDefault();
      searchLocations('hospital');
    });
    bodyEl.querySelector('#unitPickOnMapBtn')?.addEventListener('click', () => {
      setModalPickState(true);
      const started = beginMapPick({
        callsign: cs,
        onPick: (ll) => {
          try {
            setLatLng(Number(ll.lat).toFixed(6), Number(ll.lng).toFixed(6));
            setSource('map_click');
            showNotification('success', 'Map Pick', `${cs} destination selected`);
          } finally {
            setModalPickState(false);
          }
        },
        onCancel: () => {
          setModalPickState(false);
        }
      });
      if (!started) setModalPickState(false);
    });
    bodyEl.querySelector('#unitUseMapCenterBtn')?.addEventListener('click', () => {
      try {
        const c = map && map.getCenter ? map.getCenter() : null;
        if (!c) return;
        setLatLng(Number(c.lat).toFixed(6), Number(c.lng).toFixed(6));
        setSource('map_click');
        showNotification('info', 'Destination', `Using map center for ${cs}`);
      } catch (e) {}
    });
    bodyEl.querySelector('#unitStandbyW3W')?.addEventListener('input', () => {
      const hasW3W = String(bodyEl.querySelector('#unitStandbyW3W').value || '').trim().length > 0;
      if (hasW3W) setSource('what3words');
    });
    bodyEl.querySelector('#unitStandbyAddress')?.addEventListener('input', () => {
      const hasAddress = String(bodyEl.querySelector('#unitStandbyAddress').value || '').trim().length > 0;
      const hasW3W = String(bodyEl.querySelector('#unitStandbyW3W')?.value || '').trim().length > 0;
      if (!hasW3W && hasAddress) setSource('address');
    });
    bodyEl.querySelector('#unitSetStandbyBtn')?.addEventListener('click', () => {
      const name = (bodyEl.querySelector('#unitStandbyName').value || '').trim() || `Standby ${cs}`;
      const rawLat = parseFloat(bodyEl.querySelector('#unitStandbyLat').value || '');
      const rawLng = parseFloat(bodyEl.querySelector('#unitStandbyLng').value || '');
      const what3words = String(bodyEl.querySelector('#unitStandbyW3W').value || '').trim();
      const address = String(bodyEl.querySelector('#unitStandbyAddress').value || '').trim();
      const lat = Number.isFinite(rawLat) ? rawLat : null;
      const lng = Number.isFinite(rawLng) ? rawLng : null;
      let source = String(bodyEl.querySelector('#unitStandbySource').value || 'manual').trim().toLowerCase();
      if (lat == null || lng == null) {
        if (what3words) source = 'what3words';
        else if (address) source = 'address';
      }
      fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(cs)}/destination`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, lat, lng, what3words, address, source })
      }).then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed to send');
          showNotification('success', 'Instruction Sent', `${cs} -> ${name}`);
          refreshMap();
          refreshOpenPanels(['units']);
        })
        .catch((e) => showNotification('danger', 'Destination', e.message || 'Failed'));
    });
    bodyEl.querySelector('#unitAckBtn')?.addEventListener('click', () => {
      sendUnitMessage('Acknowledged. Please continue as planned.')
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed');
          showNotification('success', 'Message', `Acknowledged ${cs}`);
          return loadAll().then(([detail2, presets2, messages2]) => render(detail2, presets2, messages2));
        })
        .catch((e) => showNotification('danger', 'Message', e.message || 'Failed'));
    });
    bodyEl.querySelector('#unitSendMsgBtn')?.addEventListener('click', () => {
      const text = (bodyEl.querySelector('#unitMsgText').value || '').trim();
      if (!text) {
        showNotification('warning', 'Message', 'Enter message text');
        return;
      }
      sendUnitMessage(text)
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed');
          bodyEl.querySelector('#unitMsgText').value = '';
          showNotification('success', 'Message', `Sent to ${cs}`);
          return loadAll().then(([detail2, presets2, messages2]) => render(detail2, presets2, messages2));
        })
        .catch((e) => showNotification('danger', 'Message', e.message || 'Failed'));
    });
    bodyEl.querySelector('#unitMealStartBtn')?.addEventListener('click', () => {
      const minutes = parseInt(bodyEl.querySelector('#unitMealMins').value || '30', 10);
      fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(cs)}/meal-break`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'start', minutes })
      }).then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed');
          showNotification('success', 'Meal Break', `${cs} set to meal break`);
          return loadAll().then(([detail2, presets2, messages2]) => render(detail2, presets2, messages2));
        })
        .catch((e) => showNotification('danger', 'Meal Break', e.message || 'Failed'));
    });
    bodyEl.querySelector('#unitMealStopBtn')?.addEventListener('click', () => {
      fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(cs)}/meal-break`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'stop' })
      }).then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed');
          showNotification('success', 'Meal Break', `${cs} returned to on_standby`);
          return loadAll().then(([detail2, presets2, messages2]) => render(detail2, presets2, messages2));
        })
        .catch((e) => showNotification('danger', 'Meal Break', e.message || 'Failed'));
    });
    bodyEl.querySelector('#unitForceSignoffBtn')?.addEventListener('click', () => {
      if (!confirm(`Force sign off ${cs}?`)) return;
      fetch(`/plugin/ventus_response_module/unit/${encodeURIComponent(cs)}/force-signoff`, { method: 'POST' })
        .then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error((d && d.error) || 'Failed');
          showNotification('warning', 'Unit Signed Off', cs);
          close();
          refreshMap();
          refreshOpenPanels(['units']);
        })
        .catch((e) => showNotification('danger', 'Force Sign Off', e.message || 'Failed'));
    });
  };

  loadAll()
    .then(([detail, presets, messages]) => render(detail, presets, messages))
    .catch((e) => {
      bodyEl.innerHTML = `<div style="color:var(--text-muted);">Failed to load unit detail: ${escapeHtml(e.message || 'error')}</div>`;
    });

  unitDetailPoll = setInterval(() => {
    if (!document.body.contains(modal)) { try { clearInterval(unitDetailPoll); } catch (e) {} return; }
    if (mapPickSession && String(mapPickSession.callsign || '').toUpperCase() === cs.toUpperCase()) return;
    const active = document.activeElement;
    const editing = !!(active && modal.contains(active) && /INPUT|TEXTAREA|SELECT/.test(active.tagName || ''));
    if (editing) return;
    loadAll()
      .then(([detail, presets, messages]) => render(detail, presets, messages))
      .catch(() => {});
  }, 5000);
};

function openAssignUnitsModal(options = {}) {
  const existingModal = document.getElementById('assignUnitsModal');
  if (existingModal) {
    try {
      const firstCb = existingModal.querySelector('.assign-unit-cb');
      if (firstCb) firstCb.focus();
    } catch (e) {}
    return;
  }
  if (assignModalLoading) return;
  assignModalLoading = true;
  const title = options.title || 'Assign Units';
  const suggested = Array.isArray(options.suggested) ? options.suggested : [];
  const onConfirm = typeof options.onConfirm === 'function' ? options.onConfirm : null;

  fetch(withDivision('/plugin/ventus_response_module/units'))
    .then(r => r.json())
    .then(units => {
      const list = Array.isArray(units) ? units : [];
      const modal = document.createElement('div');
      modal.id = 'assignUnitsModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:7000;';

      const suggestedSet = new Set(suggested.map(x => String(x || '').trim()).filter(Boolean));
      const rows = list.map(u => {
        const cs = String(u.callSign || '').trim();
        if (!cs) return '';
        const checked = suggestedSet.has(cs) ? 'checked' : '';
        const breakText = u.break_blocked_for_new_jobs
          ? '<span style="font-size:11px;color:#fca5a5;">Break due</span>'
          : ((u.break_due && u.break_due_in_minutes != null) ? `<span style="font-size:11px;color:#fde68a;">Break soon (${escapeHtml(String(u.break_due_in_minutes))}m)</span>` : '');
        return `
          <label style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border-color);border-radius:8px;background:${u.is_external ? 'rgba(148,163,184,0.18)' : 'rgba(2,6,23,0.65)'};cursor:pointer;">
            <input type="checkbox" class="assign-unit-cb" value="${escapeHtml(cs)}" ${checked}>
            <span style="font-weight:600;">${escapeHtml(cs)}</span>
            <span style="font-size:12px;color:var(--text-muted);">${escapeHtml(prettyStatus(u.status || 'unknown'))}</span>
            ${breakText}
            <span style="font-size:11px;color:var(--text-muted);margin-left:auto;">${escapeHtml(u.division || 'general')}${u.is_external ? ' external' : ''}</span>
          </label>
        `;
      }).join('');

      modal.innerHTML = `
        <div style="width:min(560px,92vw);max-height:84vh;overflow:auto;background:var(--bg-panel,rgba(15,23,42,0.98));border:1px solid var(--border-color);border-radius:12px;padding:16px;">
          <div style="font-weight:700;margin-bottom:10px;">${escapeHtml(title)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Select one or more units for this CAD.</div>
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);margin-bottom:10px;">
            <input type="checkbox" id="assignTransferDivision" checked>
            Transfer selected units into <b>${escapeHtml(selectedDivision || 'general')}</b>
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#fde68a;margin-bottom:10px;">
            <input type="checkbox" id="assignBreakOverride">
            Override meal-break lockout for selected units (dispatcher override)
          </label>
          <div style="display:flex;flex-direction:column;gap:8px;">${rows || '<div style="color:var(--text-muted);">No units available</div>'}</div>
          <div style="display:flex;gap:8px;margin-top:14px;">
            <button id="assignUnitsCancel" class="btn" style="width:100%;background:transparent;border:1px solid var(--border-color);">Cancel</button>
            <button id="assignUnitsConfirm" class="btn" style="width:100%;"><i class="bi bi-person-check"></i> Assign Selected</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      const close = () => { try { modal.remove(); } catch (e) { } };
      modal.querySelector('#assignUnitsCancel')?.addEventListener('click', close);
      modal.addEventListener('click', (ev) => { if (ev.target === modal) close(); });
      modal.querySelector('#assignUnitsConfirm')?.addEventListener('click', () => {
        const confirmBtn = modal.querySelector('#assignUnitsConfirm');
        if (confirmBtn && confirmBtn.disabled) return;
        const selected = Array.from(modal.querySelectorAll('.assign-unit-cb:checked')).map(cb => cb.value);
        if (!selected.length) {
          showNotification('warning', 'Assign', 'Select at least one unit');
          return;
        }
        if (confirmBtn) {
          confirmBtn.disabled = true;
          confirmBtn.textContent = 'Assigning...';
        }
        const transferDivision = !!modal.querySelector('#assignTransferDivision')?.checked;
        const breakOverride = !!modal.querySelector('#assignBreakOverride')?.checked;
        close();
        if (onConfirm) onConfirm({ callsigns: selected, transferDivision, breakOverride });
      });
      assignModalLoading = false;
    })
    .catch(() => {
      assignModalLoading = false;
      showNotification('danger', 'Assign', 'Failed to load units');
    });
}

window.assignJobWithSuggestion = function(cad, suggestedCallsign = '') {
  const hint = (suggestedCallsign || '').trim();
  openAssignUnitsModal({
    title: `Assign Units to CAD #${cad}`,
    suggested: hint ? [hint] : [],
    onConfirm: ({ callsigns, transferDivision, breakOverride }) => {
      fetch(`/plugin/ventus_response_module/job/${cad}/assign`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ callsigns, division: selectedDivision, transfer_division: transferDivision, break_override: breakOverride })
      })
        .then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) {
            const blocked = Array.isArray(d && d.blocked_for_break) ? d.blocked_for_break : [];
            if (blocked.length) {
              const msg = blocked.map(x => `${x.callsign}${x.break_due_in_minutes != null ? ` (${x.break_due_in_minutes}m)` : ''}`).join(', ');
              throw new Error(`Meal-break lockout: ${msg}. Tick override to continue.`);
            }
            throw new Error((d && d.error) || 'Assign failed');
          }
          showNotification('success', 'Assigned', `CAD #${cad} -> ${callsigns.join(', ')}`);
          setTimeout(refreshMap, 400);
          try { loadJobDetail(cad); } catch (e) { }
          if (Array.isArray(d.blocked_for_break) && d.blocked_for_break.length) {
            const blockedText = d.blocked_for_break.map(x => x.callsign).join(', ');
            showNotification('warning', 'Break Hold', `Not assigned due break policy: ${blockedText}`);
          }
          if (Array.isArray(d.break_override_used) && d.break_override_used.length) {
            const ovText = d.break_override_used.map(x => x.callsign).join(', ');
            showNotification('warning', 'Break Override', `Override used: ${ovText}`);
          }
        })
        .catch((e) => showNotification('danger', 'Assign', (e && e.message) ? e.message : 'Failed to assign'));
    }
  });
};

window.loadJobDetail = function(cad) {
  activeJobCad = parseInt(cad, 10) || null;
  if (panelRefreshTimer) {
    clearTimeout(panelRefreshTimer);
    panelRefreshTimer = null;
  }
  const panel = Object.values(openPanels).find(p => p.type === 'jobs')?.element;
  if (!panel) return;
  panel.dataset.jobsView = 'detail';
  panel.dataset.jobsCad = String(activeJobCad || '');

  const contentEl = panel.querySelector('.cad-panel-body');
  contentEl.innerHTML = '<div style="text-align:center;padding:20px;">Loading...</div>';

  Promise.all([
    fetch(`/plugin/ventus_response_module/job/${cad}`).then(res => res.json()),
    fetchJobsTimings([cad]),
    fetch(`/plugin/ventus_response_module/job/${cad}/comms`).then(res => (res.ok ? res.json() : [])),
    fetch(`/plugin/ventus_response_module/job/${cad}/system-log`).then(res => (res.ok ? res.json() : { events: [] }))
  ])
    .then(([job, timingsMap, comms, systemLog]) => {
      let triage = job.triage_data || {};
      let incidentDetailsHtml = renderIncidentDetails(triage);
      const statusTimesTable = formatStatusTimesTable(job, timingsMap[cad]);
      const assignedUnits = Array.isArray(job.assigned_units) ? job.assigned_units : [];
      const assignedUnitsHtml = assignedUnits.length
        ? assignedUnits.map((cs) => `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border:1px solid var(--border-color);border-radius:8px;margin-bottom:6px;">
              <span>${escapeHtml(cs)}</span>
              <button class="btn" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);" onclick='event.stopPropagation();standDownUnitFromJob(${job.cad}, ${JSON.stringify(cs)})'>Stand Down</button>
            </div>
          `).join('')
        : '<div class="meta">None</div>';
      const crewOptions = assignedUnits.map((cs) => `<option value="${escapeHtml(cs)}">${escapeHtml(cs)}</option>`).join('');
      const commItems = Array.isArray(comms) ? comms.slice(-8).reverse() : [];
      const commHtml = commItems.length
        ? commItems.map((m) => {
            const t = m && m.created_at ? new Date(m.created_at).toLocaleString() : '';
            const by = m && (m.sender_user || m.sender_role) ? (m.sender_user || m.sender_role) : 'unknown';
            const typeBadge = (m && m.message_type === 'update')
              ? '<span class="badge bg-warning text-dark" style="margin-right:6px;">Update</span>'
              : '<span class="badge bg-info text-dark" style="margin-right:6px;">Message</span>';
            return `<div style="padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:6px;background:rgba(0,0,0,0.15);"><div class="meta" style="margin-bottom:4px;">${typeBadge}${escapeHtml(t)} by ${escapeHtml(by)}</div><div>${escapeHtml(m && m.message_text ? m.message_text : '')}</div></div>`;
          }).join('')
        : '<div class="meta"><i>No response centre messages yet.</i></div>';
      const eventsRaw = Array.isArray(systemLog && systemLog.events) ? systemLog.events : [];
      const compactEvents = [];
      eventsRaw.forEach((ev) => {
        const e = ev && typeof ev === 'object' ? ev : {};
        const key = `${String(e.type || '')}|${String(e.actor || '')}|${String(e.message || '')}`;
        const prev = compactEvents.length ? compactEvents[compactEvents.length - 1] : null;
        if (prev && prev._dedupKey === key) return;
        compactEvents.push({
          _dedupKey: key,
          time: e.time,
          actor: String(e.actor || 'system'),
          source: String(e.source || 'system'),
          message: String(e.message || '').trim()
        });
      });
      const systemHtml = compactEvents.length
        ? compactEvents.slice(-60).reverse().map((ev) => {
            const t = ev.time ? new Date(ev.time).toLocaleString() : '-';
            return `<div style="padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:6px;background:rgba(0,0,0,0.12);"><div class="meta" style="margin-bottom:4px;">${escapeHtml(t)} | ${escapeHtml(ev.source)} | ${escapeHtml(ev.actor)}</div><div>${escapeHtml(ev.message || '-')}</div></div>`;
          }).join('')
        : '<div class="meta"><i>No system events logged.</i></div>';

      contentEl.innerHTML = `
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
            <div style="font-weight:600;">Status: ${prettyStatus(job.status)}</div>
            <div style="display:flex;gap:8px;">
              <button class="btn" style="padding:7px 10px;" onclick="assignJob(${job.cad})"><i class="bi bi-person-check"></i> Assign Unit(s)</button>
              <button class="btn" style="padding:7px 10px;background:transparent;border:1px solid var(--border-color);" onclick="openJobDetailPopout(${job.cad})"><i class="bi bi-box-arrow-up-right"></i> Popout</button>
            </div>
          </div>
          <div class="meta" style="margin-bottom:8px;">Division: ${escapeHtml(job.division || 'general')}</div>
          ${job.break_override_active ? `<div class="meta" style="margin-bottom:8px;"><span class="status" style="background:rgba(239,68,68,0.22);color:#fecaca;">Break Override Used</span> ${escapeHtml((job.break_override_last_units || []).join(', '))}${job.break_override_last_at ? ` - ${escapeHtml(new Date(job.break_override_last_at).toLocaleString())}` : ''}${job.break_override_last_by ? ` - by ${escapeHtml(job.break_override_last_by)}` : ''}</div>` : ''}
          <div style="margin-bottom:8px;">
            <div class="meta" style="margin-bottom:4px;">Assigned Units</div>
            ${assignedUnitsHtml}
          </div>
          <hr style="border:none;border-top:1px solid var(--border-color);margin:8px 0;">
          ${incidentDetailsHtml}
          <hr style="border:none;border-top:1px solid var(--border-color);margin:10px 0;">
          <div class="meta" style="margin-bottom:8px;"><i class="bi bi-info-circle"></i> Incident details are maintained by Response Centre.</div>
          <hr style="border:none;border-top:1px solid var(--border-color);margin:10px 0;">
          <div style="font-weight:600;margin-bottom:6px;">Status Times</div>
          ${statusTimesTable}
          <hr style="border:none;border-top:1px solid var(--border-color);margin:8px 0;">
          <div style="font-weight:600;margin-bottom:6px;">System Log</div>
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">${systemHtml}</div>
          <hr style="border:none;border-top:1px solid var(--border-color);margin:8px 0;">
          <div style="font-weight:600;margin-bottom:6px;">Response Centre Comms</div>
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">${commHtml}</div>
          <textarea id="jobCommMsg_${job.cad}" style="width:100%;min-height:56px;margin-bottom:8px;" placeholder="Message to call taker for this CAD"></textarea>
          <button class="btn" style="width:100%;padding:8px;margin-bottom:8px;" onclick="sendDispatcherJobMessage(${job.cad})"><i class="bi bi-send"></i> Send Message to Response Centre</button>
          <hr style="border:none;border-top:1px solid var(--border-color);margin:8px 0;">
          <div style="font-weight:600;margin-bottom:6px;">Crew Comms</div>
          ${assignedUnits.length ? `
            <select id="jobCrewCallsign_${job.cad}" style="width:100%;margin-bottom:8px;">${crewOptions}</select>
            <div id="jobCrewCommsList_${job.cad}" style="max-height:180px;overflow:auto;border:1px solid var(--border-color);border-radius:8px;padding:8px;background:rgba(0,0,0,0.16);margin-bottom:8px;"></div>
            <textarea id="jobCrewMsg_${job.cad}" style="width:100%;min-height:56px;margin-bottom:8px;" placeholder="Message to selected crew unit"></textarea>
            <button class="btn" style="width:100%;padding:8px;margin-bottom:8px;" onclick="sendDispatcherCrewMessage(${job.cad})"><i class="bi bi-send"></i> Send Message to Crew</button>
          ` : '<div class="meta" style="margin-bottom:8px;"><i>No assigned units to message yet.</i></div>'}
        </div>
      `;
      if (assignedUnits.length) {
        const sel = document.getElementById(`jobCrewCallsign_${job.cad}`);
        const refreshCrewThread = () => {
          const cs = String(sel?.value || '').trim();
          const target = document.getElementById(`jobCrewCommsList_${job.cad}`);
          if (!cs || !target) return;
          target.innerHTML = '<div class="meta">Loading crew conversation...</div>';
          fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`)
            .then(r => r.ok ? r.json() : [])
            .then((rows) => {
              const list = Array.isArray(rows) ? rows.slice(-30) : [];
              if (!list.length) {
                target.innerHTML = '<div class="meta">No messages with this unit yet.</div>';
                return;
              }
              target.innerHTML = list.map((m) => {
                const from = String(m && m.from ? m.from : '').trim() || 'unknown';
                const outgoing = from.toLowerCase() === 'dispatcher';
                const when = m && m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
                const text = String(m && m.text ? m.text : '');
                return `
                  <div style="display:flex;justify-content:${outgoing ? 'flex-end' : 'flex-start'};margin-bottom:8px;">
                    <div style="max-width:82%;padding:8px 10px;border-radius:10px;border:1px solid var(--border-color);background:${outgoing ? 'rgba(59,130,246,0.2)' : 'rgba(2,6,23,0.55)'};">
                      <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">${escapeHtml(from)} | ${escapeHtml(when)}</div>
                      <div>${escapeHtml(text)}</div>
                    </div>
                  </div>
                `;
              }).join('');
              target.scrollTop = target.scrollHeight;
            })
            .catch(() => { target.innerHTML = '<div class="meta">Unable to load crew conversation.</div>'; });
        };
        sel?.addEventListener('change', refreshCrewThread);
        refreshCrewThread();
      }
    })
    .catch(() => {
      contentEl.innerHTML = '<div style="color:var(--text-muted);padding:16px;">Failed to load details.</div>';
    });
};

window.assignJob = function(cad) {
  window.assignJobWithSuggestion(cad, '');
};

window.openJobDetailFromMap = function(cad) {
  const parsed = parseInt(cad, 10);
  if (!Number.isInteger(parsed) || parsed <= 0) return;
  try { map && map.closePopup && map.closePopup(); } catch (e) {}
  try {
    getOrCreatePanel('jobs', 'CAD STACK');
  } catch (e) {}
  setTimeout(() => {
    try { window.loadJobDetail(parsed); } catch (e) {}
  }, 80);
};

window.openJobDetailPopout = function(cad) {
  const parsed = parseInt(cad, 10);
  if (!Number.isInteger(parsed) || parsed <= 0) return;
  const scope = getDivisionParams().toString();
  const url = `/plugin/ventus_response_module/cad?panel=jobs&title=${encodeURIComponent(`CAD #${parsed}`)}&popout=1&cad=${parsed}${scope ? `&${scope}` : ''}`;
  const w = window.open(url, 'ventus-cad-job-' + parsed, 'width=560,height=760');
  if (!w) {
    showNotification('warning', 'Blocked', 'Browser blocked pop-out window');
  }
};

window.sendDispatcherJobMessage = function(cad) {
  const input = document.getElementById(`jobCommMsg_${cad}`);
  const text = (input?.value || '').trim();
  if (!text) return;
  fetch(`/plugin/ventus_response_module/job/${cad}/comms`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'message', text, sender_portal: 'dispatch' })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Message failed');
      if (input) input.value = '';
      showNotification('success', 'Message Sent', `CAD #${cad}`);
      try { loadJobDetail(cad); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Send Failed', e.message || 'Failed to send'));
};

window.sendDispatcherCrewMessage = function(cad) {
  const csEl = document.getElementById(`jobCrewCallsign_${cad}`);
  const msgEl = document.getElementById(`jobCrewMsg_${cad}`);
  const callsign = String(csEl?.value || '').trim();
  const text = String(msgEl?.value || '').trim();
  if (!callsign || !text) {
    showNotification('warning', 'Crew Message', 'Select a crew unit and enter a message');
    return;
  }
  fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(callsign)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, from: 'dispatcher', sender_portal: 'dispatch' })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Message failed');
      if (msgEl) msgEl.value = '';
      showNotification('success', 'Crew Message Sent', `${callsign}`);
      try { loadJobDetail(cad); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Send Failed', e.message || 'Failed to send'));
};

window.standDownUnitFromJob = function(cad, callsign) {
  const cs = String(callsign || '').trim();
  if (!cs) return;
  if (!confirm(`Stand down ${cs} from CAD #${cad}?`)) return;
  fetch(`/plugin/ventus_response_module/job/${cad}/unassign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ callsign: cs, reason: 'dispatcher_unassign' })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Stand down failed');
      showNotification('success', 'Unit Stood Down', `${cs} from CAD #${cad}`);
      try { loadJobDetail(cad); } catch (e) {}
      try { refreshMap(); } catch (e) {}
      try { refreshOpenPanels(['jobs', 'units', 'messages']); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Stand Down Failed', e.message || 'Failed'));
};

window.closeJob = function(cad) {
  if (!confirm('Close this job?')) return;

  fetch(`/plugin/ventus_response_module/job/${cad}/close`, { method: 'POST' })
    .then(r => r.json())
    .then(() => {
      showNotification('success', 'Closed');
      setTimeout(refreshMap, 400);
    })
    .catch(() => showNotification('danger', 'Error'));
};

window.sendMessage = function() {
  showNotification('info', 'Messages', 'Use the messages panel controls');
};

// ===== INITIALIZATION =====
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  pollDispatcherAlerts();
  initAudioOnce();
  document.addEventListener('click', initAudioOnce, { passive: true });
  document.addEventListener('keydown', initAudioOnce);

  // Optional deep-link / popout mode.
  try {
    const params = new URLSearchParams(window.location.search);
    const autoPanel = String(params.get('panel') || '').trim().toLowerCase();
    const autoTitle = String(params.get('title') || '').trim();
    isPopoutMode = String(params.get('popout') || '').trim().toLowerCase() === '1';
    const autoCad = parseInt(params.get('cad') || '', 10);
    const panelTitles = {
      jobs: 'CAD Stack',
      units: 'Active Units',
      messages: 'Messages',
      past_jobs: 'Past / Cleared Jobs'
    };
    if (isPopoutMode && autoPanel && panelTitles[autoPanel]) {
      setTimeout(() => {
        togglePanelByType(autoPanel, autoTitle || panelTitles[autoPanel], autoPanel === 'jobs' ? btnJobs : (autoPanel === 'units' ? btnUnits : (autoPanel === 'past_jobs' ? btnPastJobs : btnMsgs)));
        applySinglePanelPopoutLayout(autoPanel);
        if (Number.isInteger(autoCad) && autoCad > 0) {
          setTimeout(() => {
            try { loadJobDetail(autoCad); } catch (e) {}
          }, 350);
        }
      }, 120);
      return;
    }
    if (autoPanel && panelTitles[autoPanel]) {
      setTimeout(() => {
        togglePanelByType(autoPanel, autoTitle || panelTitles[autoPanel], autoPanel === 'jobs' ? btnJobs : (autoPanel === 'units' ? btnUnits : (autoPanel === 'past_jobs' ? btnPastJobs : btnMsgs)));
        if (autoPanel === 'jobs' && Number.isInteger(autoCad) && autoCad > 0) {
          setTimeout(() => {
            try { loadJobDetail(autoCad); } catch (e) {}
          }, 350);
        }
      }, 180);
    }
  } catch (e) {}

  btnJobs?.addEventListener('click', () => {
    togglePanelByType('jobs','CAD Stack', btnJobs);
  });

  btnUnits?.addEventListener('click', () => {
    togglePanelByType('units','Active Units', btnUnits);
  });

  btnMsgs?.addEventListener('click', () => {
    togglePanelByType('messages','Messages', btnMsgs);
  });

  btnPastJobs?.addEventListener('click', () => {
    togglePanelByType('past_jobs', 'Past / Cleared Jobs', btnPastJobs);
  });

  btnKPI?.addEventListener('click', () => {
    if (!kpiStatsPanel) return;
    const hidden = kpiStatsPanel.style.display === 'none';
    if (hidden) {
      kpiStatsPanel.style.display = 'flex';
      try { localStorage.removeItem('cad_kpi_hidden'); } catch (e) {}
      btnKPI.classList.add('active');
    } else {
      kpiStatsPanel.style.display = 'none';
      try { localStorage.setItem('cad_kpi_hidden', '1'); } catch (e) {}
      btnKPI.classList.remove('active');
    }
  });

  try {
    const hidden = !!(kpiStatsPanel && kpiStatsPanel.style.display === 'none');
    if (btnKPI && !hidden) btnKPI.classList.add('active');
  } catch (e) {}
});

function togglePanelByType(type, title, btn) {
  try {
    const existing = Object.values(openPanels).find(p => p.type === type);
    if (existing) {
      if (existing.poppedOut && existing.popoutWindow && !existing.popoutWindow.closed) {
        try { existing.popoutWindow.focus(); } catch (e) {}
        if (btn) btn.classList.add('active');
      } else {
        closePanel(existing.id);
        if (btn) btn.classList.remove('active');
      }
      return;
    }
    const panel = getOrCreatePanel(type, title);
    if (btn) btn.classList.add('active');
    if (type === 'messages') clearMessageBadge();
  } catch (e) { }
}

window.addEventListener('resize', () => {
  Object.values(openPanels).forEach((p) => {
    try { clampPanelToViewport(p.element); } catch (e) {}
  });
});
</script>

{% endblock %}
