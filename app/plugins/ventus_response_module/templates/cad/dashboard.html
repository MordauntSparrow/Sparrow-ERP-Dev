  panel.dataset.jobsCad = '';
  const contentEl = panel.querySelector('.cad-panel-body');
  if (!contentEl) return;
  loadJobsPanel(contentEl);
};

const CLOSE_CAD_STATUSES = ['cleared', 'stood_down', 'received', 'assigned', 'mobile', 'on_scene', 'leave_scene', 'at_hospital'];

window.closeCadFromDetail = function(cad) {
  const modal = document.createElement('div');
  modal.id = 'closeCadModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:7000;';
  const statusOptions = CLOSE_CAD_STATUSES.map(s => `<option value="${escapeHtml(s)}" ${s === 'cleared' ? 'selected' : ''}>${escapeHtml(prettyStatus(s))}</option>`).join('');
  modal.innerHTML = `
    <div style="width:min(420px,92vw);background:var(--bg-panel,rgba(15,23,42,0.98));border:1px solid var(--border-color);border-radius:12px;padding:16px;">
      <div style="font-weight:700;margin-bottom:10px;">Close CAD #${escapeHtml(String(cad))}</div>
      <div style="margin-bottom:10px;">
        <label style="display:block;font-weight:600;margin-bottom:6px;">Status</label>
        <select id="closeCadStatus" style="width:100%;padding:8px 12px;background:var(--input-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:13px;">
          ${statusOptions}
        </select>
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-weight:600;margin-bottom:6px;">Notes</label>
        <textarea id="closeCadNotes" rows="3" placeholder="Optional notes…" style="width:100%;padding:8px 12px;background:var(--input-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:13px;resize:vertical;box-sizing:border-box;"></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="closeCadModalCancel" class="btn" style="flex:1;background:transparent;border:1px solid var(--border-color);">Cancel</button>
        <button id="closeCadModalConfirm" class="btn" style="flex:1;background:rgba(239,68,68,0.25);border:1px solid #ef4444;color:#fecaca;"><i class="bi bi-x-circle"></i> Close CAD</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const closeModal = () => { try { modal.remove(); } catch (e) {} };
  modal.querySelector('#closeCadModalCancel')?.addEventListener('click', closeModal);
  modal.addEventListener('click', (ev) => { if (ev.target === modal) closeModal(); });
  modal.querySelector('#closeCadModalConfirm')?.addEventListener('click', () => {
    const statusEl = modal.querySelector('#closeCadStatus');
    const notesEl = modal.querySelector('#closeCadNotes');
    const forceStatus = (statusEl?.value || 'cleared').trim();
    const notes = (notesEl?.value || '').trim();
    const confirmBtn = modal.querySelector('#closeCadModalConfirm');
    if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Closing…'; }
    closeModal();
    fetch(`/plugin/ventus_response_module/job/${cad}/close`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        force_status: forceStatus,
        outcome: forceStatus,
        private_notes: notes,
        public_notes: notes ? `Closed by dispatcher: ${notes}` : ''
      })
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        showNotification('success', 'Closed', data.message || 'CAD closed');
        backToJobStack();
        setTimeout(refreshMap, 400);
      })
      .catch((e) => showNotification('danger', 'Error', e.message || 'Failed to close CAD'));
  });
};

window.loadJobDetail = function(cad, opts) {
  const cadNum = parseInt(cad, 10) || null;
  const wasAlreadyViewingThisJob = (activeJobCad === cadNum);
  const scrollToComms = !!(opts && opts.scrollToComms);
  activeJobCad = cadNum;
  if (panelRefreshTimer) {
    clearTimeout(panelRefreshTimer);
    panelRefreshTimer = null;
  }
  const panel = Object.values(openPanels).find(p => p.type === 'jobs')?.element;
  if (!panel) return;
  panel.dataset.jobsView = 'detail';
  panel.dataset.jobsCad = String(activeJobCad || '');

  const contentEl = panel.querySelector('.cad-panel-body');
  contentEl.innerHTML = '<div style="text-align:center;padding:20px;">Loading...</div>';

  Promise.allSettled([
    fetch(withDivision(`/plugin/ventus_response_module/job/${cad}`)).then(res => res.json()),
    fetchJobsTimings([cad]),
    fetch(withDivision(`/plugin/ventus_response_module/job/${cad}/comms`)).then(res => (res.ok ? res.json() : [])),
    fetch(withDivision(`/plugin/ventus_response_module/job/${cad}/system-log`)).then(res => (res.ok ? res.json() : { events: [] }))
  ])
    .then((settled) => {
      const read = (idx, fallback) => {
        const item = settled[idx];
        return (item && item.status === 'fulfilled') ? item.value : fallback;
      };
      const job = read(0, null);
      const timingsMap = read(1, {});
      const comms = read(2, []);
      const systemLog = read(3, { events: [] });
      if (!job || typeof job !== 'object' || job.error || !job.cad) {
        throw new Error((job && job.error) ? String(job.error) : 'Job details unavailable');
      }
      let triage = job.triage_data || {};
      let incidentDetailsHtml = renderIncidentDetails(triage);
      const statusTimesTable = formatStatusTimesTable(job, timingsMap[cad]);
      const assignedUnits = Array.isArray(job.assigned_units) ? job.assigned_units : [];
      const assignedStateByCallsign = new Map(
        (Array.isArray(job.assigned_unit_states) ? job.assigned_unit_states : [])
          .map((s) => [String((s && s.callsign) || ''), s || {}])
      );
      const assignedUnitsHtml = assignedUnits.length
        ? assignedUnits.map((cs) => `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border:1px solid var(--border-color);border-radius:8px;margin-bottom:6px;">
              <span>
                ${escapeHtml(cs)}
                ${(() => {
                  const st = assignedStateByCallsign.get(String(cs)) || {};
                  if (st && st.responding) return '';
                  const alert = String((st && st.alert) || '').toLowerCase();
                  const txt = alert === 'signed_off' ? 'SIGNED OFF' : 'NO SIGNAL';
                  return ` <span class="status" style="margin-left:8px;background:rgba(239,68,68,0.26);color:#fecaca;border:1px solid rgba(239,68,68,0.65);animation:cad-alert-pulse 1.2s ease-in-out infinite;">${txt}</span>`;
                })()}
              </span>
              <button class="btn" style="padding:4px 8px;background:transparent;border:1px solid var(--border-color);" onclick='event.stopPropagation();standDownUnitFromJob(${job.cad}, ${JSON.stringify(cs)})'>Stand Down</button>
            </div>
          `).join('')
        : '<div class="meta">None</div>';
      const commItems = Array.isArray(comms) ? comms.slice(-20) : [];
      const commHtml = commItems.length
        ? commItems.map((m) => {
            const t = m && m.created_at ? new Date(m.created_at).toLocaleString() : '';
            const by = m && (m.sender_user || m.sender_role) ? (m.sender_user || m.sender_role) : 'unknown';
            const isUpdate = m && m.message_type === 'update';
            const typeLabel = isUpdate ? 'Update' : 'Message';
            const bg = isUpdate ? 'rgba(245,158,11,0.12)' : 'rgba(59,130,246,0.12)';
            const border = isUpdate ? '1px solid rgba(245,158,11,0.4)' : '1px solid rgba(59,130,246,0.4)';
            return `<div style="padding:8px 10px;border:${border};border-radius:8px;margin-bottom:8px;background:${bg};"><div class="meta" style="margin-bottom:4px;">${escapeHtml(t)} · ${escapeHtml(by)} · <span style="font-weight:600;color:${isUpdate ? '#fde68a' : '#bfdbfe'};">${escapeHtml(typeLabel)}</span></div><div>${escapeHtml(m && m.message_text ? m.message_text : '')}</div></div>`;
          }).join('')
        : '<div class="meta"><i>No updates or messages yet.</i></div>';
      const eventsRaw = Array.isArray(systemLog && systemLog.events) ? systemLog.events : [];
      const compactEvents = [];
      eventsRaw.forEach((ev) => {
        const e = ev && typeof ev === 'object' ? ev : {};
        const key = `${String(e.type || '')}|${String(e.actor || '')}|${String(e.message || '')}`;
        const prev = compactEvents.length ? compactEvents[compactEvents.length - 1] : null;
        if (prev && prev._dedupKey === key) return;
        compactEvents.push({
          _dedupKey: key,
          time: e.time,
          actor: String(e.actor || 'system'),
          source: String(e.source || 'system'),
          message: String(e.message || '').trim()
        });
      });
      const systemHtml = compactEvents.length
        ? compactEvents.slice(-60).reverse().map((ev) => {
            const t = ev.time ? new Date(ev.time).toLocaleString() : '-';
            return `<div style="padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:6px;background:rgba(0,0,0,0.12);"><div class="meta" style="margin-bottom:4px;">${escapeHtml(t)} | ${escapeHtml(ev.source)} | ${escapeHtml(ev.actor)}</div><div>${escapeHtml(ev.message || '-')}</div></div>`;
          }).join('')
        : '<div class="meta"><i>No system events logged.</i></div>';

      const ageFromDob = triage && triage.patient_dob ? calcAgeFromDateString(triage.patient_dob) : null;
      const ageDirect = triage && (triage.patient_age != null || triage.age != null)
        ? (Number(triage.patient_age) || Number(triage.age))
        : null;
      const patientAgeDisplay = (ageFromDob != null ? String(ageFromDob) : (ageDirect != null && !Number.isNaN(ageDirect) ? String(Math.round(ageDirect)) : ''));
      const priorityVal = String(job.priority || (triage && triage.call_priority) || '').trim();
      const priorityDetailClass = priorityVal === 'P1'
        ? 'background:rgba(239,68,68,0.22);color:#fecaca;'
        : priorityVal === 'P2'
          ? 'background:rgba(245,158,11,0.22);color:#fde68a;'
          : priorityVal === 'P3'
            ? 'background:rgba(59,130,246,0.22);color:#bfdbfe;'
            : 'background:rgba(34,197,94,0.2);color:#bbf7d0;';
      const priorityBadge = priorityVal ? `<span class="status" style="margin-left:8px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;${priorityDetailClass}">${escapeHtml(priorityVal)}</span>` : '';
      const cadForDrop = job.cad;
      contentEl.innerHTML = `
        <div class="job-detail-drop-target" data-cad="${cadForDrop}"
             ondragover="event.preventDefault();event.stopPropagation();if(event.dataTransfer){event.dataTransfer.dropEffect='copy';}event.currentTarget.classList.add('drag-over');var h=event.currentTarget.querySelector('.job-detail-drop-hint');if(h){try{var c=event.dataTransfer.getData('text/plain');h.textContent=c?'Assign '+c+'?':'Drop to assign unit';}catch(e){h.textContent='Drop to assign unit';}}"
             ondragenter="event.preventDefault();event.currentTarget.classList.add('drag-over');var h=event.currentTarget.querySelector('.job-detail-drop-hint');if(h){try{var c=event.dataTransfer.getData('text/plain');h.textContent=c?'Assign '+c+'?':'Drop to assign unit';}catch(e){h.textContent='Drop to assign unit';}}"
             ondragleave="event.preventDefault();if(!event.currentTarget.contains(event.relatedTarget)){event.currentTarget.classList.remove('drag-over');}"
             ondrop="event.preventDefault();event.stopPropagation();event.currentTarget.classList.remove('drag-over');var cs=event.dataTransfer.getData('text/plain');if(cs&&window.assignUnitToJobDirect){window.assignUnitToJobDirect(parseInt(event.currentTarget.dataset.cad,10),cs);}">
          <div class="job-detail-drop-hint" aria-live="polite">Drop to assign unit</div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <button class="btn" style="padding:6px 10px;background:transparent;border:1px solid var(--border-color);" onclick="backToJobStack()" title="Back to Stack"><i class="bi bi-arrow-left"></i></button>
              <div style="font-weight:700;">CAD #${escapeHtml(String(job.cad))}${priorityBadge}</div>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn" style="padding:7px 10px;" onclick="assignJob(${job.cad})"><i class="bi bi-person-check"></i> Assign Unit(s)</button>
              <button class="btn" style="padding:7px 10px;background:transparent;border:1px solid var(--border-color);" onclick="openJobDetailPopout(${job.cad})" title="Pop out"><i class="bi bi-box-arrow-up-right"></i></button>
            </div>
          </div>
          <div style="font-weight:700;margin-bottom:8px;">Status: ${prettyStatus(job.status)} · Division: ${escapeHtml(job.division || 'general')}</div>
          ${patientAgeDisplay ? `<div class="meta" style="margin-bottom:8px;"><strong>Patient age:</strong> ${escapeHtml(patientAgeDisplay)}</div>` : ''}
          ${job.break_override_active ? `<div class="meta" style="margin-bottom:8px;"><span class="status" style="background:rgba(239,68,68,0.22);color:#fecaca;">Break Override Used</span> ${escapeHtml((job.break_override_last_units || []).join(', '))}${job.break_override_last_at ? ` - ${escapeHtml(new Date(job.break_override_last_at).toLocaleString())}` : ''}${job.break_override_last_by ? ` - by ${escapeHtml(job.break_override_last_by)}` : ''}</div>` : ''}
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <div style="margin-bottom:8px;">
            <div style="font-weight:600;margin-bottom:6px;">Attached Units</div>
            ${assignedUnitsHtml}
          </div>
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          ${incidentDetailsHtml}
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <div class="meta" style="margin-bottom:8px;"><i class="bi bi-info-circle"></i> Incident details are maintained by Response Centre.</div>
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <div style="font-weight:600;margin-bottom:6px;">Status Times</div>
          ${statusTimesTable}
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <div id="jobResponseCommsSection">
            <div style="font-weight:600;margin-bottom:6px;">Updates &amp; Messages</div>
            <div style="font-size:12px;color:var(--text-secondary);max-height:240px;overflow-y:auto;margin-bottom:12px;">${commHtml}</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;">
              <select id="jobCommType_${job.cad}" style="width:auto;min-width:160px;padding:6px 10px;">
                <option value="update">Update to CAD</option>
                <option value="message">Message to TO</option>
              </select>
            </div>
            <textarea id="jobCommMsg_${job.cad}" style="width:100%;min-height:56px;margin-bottom:8px;box-sizing:border-box;" placeholder="Type your message or update…"></textarea>
            <button class="btn" style="width:100%;padding:8px;" onclick="sendDispatcherJobComms(${job.cad})"><i class="bi bi-send"></i> Send</button>
          </div>
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <div style="margin-bottom:8px;">
            <button type="button" id="jobSystemLogBtn_${job.cad}" class="btn" style="width:100%;padding:6px 10px;background:transparent;border:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;gap:8px;" onclick="window.toggleJobSystemLog(${job.cad})" aria-expanded="false">
              <span>System log</span>
              <i class="bi bi-chevron-down" aria-hidden="true"></i>
            </button>
            <div id="jobSystemLog_${job.cad}" style="display:none;font-size:12px;color:var(--text-secondary);margin-top:8px;max-height:200px;overflow-y:auto;">${systemHtml}</div>
          </div>
          <hr style="border:none;border-top:2px solid var(--border-light);margin:10px 0;">
          <button class="btn" style="width:100%;padding:10px 12px;background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#fecaca;" onclick="closeCadFromDetail(${job.cad})" title="Close this CAD"><i class="bi bi-x-circle"></i> Close CAD</button>
        </div>
      `;
      if ((wasAlreadyViewingThisJob || scrollToComms) && contentEl) {
        requestAnimationFrame(() => {
          const commsSection = contentEl.querySelector('#jobResponseCommsSection');
          if (commsSection) commsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    })
    .catch((e) => {
      contentEl.innerHTML = `<div style="color:var(--text-muted);padding:16px;">Failed to load details.${e && e.message ? ` ${escapeHtml(String(e.message))}` : ''}</div>`;
    });
};

window.openJobFromInbox = function(cad) {
  const num = parseInt(cad, 10);
  if (!Number.isFinite(num) || num <= 0) return;
  const existing = Object.values(openPanels || {}).find(p => p && p.type === 'jobs');
  if (!existing) {
    getOrCreatePanel('jobs', 'CAD Stack');
    if (typeof btnJobs !== 'undefined' && btnJobs) btnJobs.classList.add('active');
    setTimeout(() => loadJobDetail(num, { scrollToComms: true }), 180);
  } else {
    loadJobDetail(num, { scrollToComms: true });
  }
};

window.assignJob = function(cad) {
  window.assignJobWithSuggestion(cad, '');
};

window.assignUnitToJobDirect = function(cad, callsign) {
  const cs = String(callsign || '').trim();
  if (!Number.isInteger(cad) || cad <= 0 || !cs) return;
  fetch(`/plugin/ventus_response_module/job/${cad}/assign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ callsigns: [cs], division: selectedDivision, transfer_division: false, break_override: false })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) {
        const blocked = Array.isArray(d && d.blocked_for_break) ? d.blocked_for_break : [];
        if (blocked.length) {
          showNotification('warning', 'Break lockout', 'Unit on break hold. Use Assign button to override.');
          openAssignUnitsModal({
            title: `Assign Units to CAD #${cad}`,
            suggested: [cs],
            onConfirm: ({ callsigns, transferDivision, breakOverride }) => {
              fetch(`/plugin/ventus_response_module/job/${cad}/assign`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ callsigns: callsigns || [cs], division: selectedDivision, transfer_division: transferDivision, break_override: breakOverride })
              })
                .then(r2 => r2.json().then(d2 => ({ ok: r2.ok, d: d2 })))
                .then(({ ok: ok2, d: d2 }) => {
                  if (!ok2) throw new Error((d2 && d2.error) || 'Assign failed');
                  showNotification('success', 'Assigned', `CAD #${cad} -> ${(callsigns || [cs]).join(', ')}`);
                  setTimeout(refreshMap, 400);
                  try { loadJobDetail(cad); } catch (e) {}
                })
                .catch((e) => showNotification('danger', 'Assign', (e && e.message) || 'Failed'));
            }
          });
          return;
        }
        throw new Error((d && d.error) || 'Assign failed');
      }
      showNotification('success', 'Assigned', `CAD #${cad} -> ${cs}`);
      setTimeout(refreshMap, 400);
      try { loadJobDetail(cad); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Assign', (e && e.message) || 'Failed to assign'));
};

window.openJobDetailFromMap = function(cad) {
  const parsed = parseInt(cad, 10);
  if (!Number.isInteger(parsed) || parsed <= 0) return;
  try { map && map.closePopup && map.closePopup(); } catch (e) {}
  try {
    getOrCreatePanel('jobs', 'CAD STACK');
  } catch (e) {}
  setTimeout(() => {
    try { window.loadJobDetail(parsed); } catch (e) {}
  }, 80);
};

window.openJobDetailPopout = function(cad) {
  const parsed = parseInt(cad, 10);
  if (!Number.isInteger(parsed) || parsed <= 0) return;
  const scope = getDivisionParams().toString();
  const url = `/plugin/ventus_response_module/cad?panel=jobs&title=${encodeURIComponent(`CAD #${parsed}`)}&popout=1&cad=${parsed}${scope ? `&${scope}` : ''}`;
  const w = window.open(url, 'ventus-cad-job-' + parsed, 'width=560,height=760');
  if (!w) {
    showNotification('warning', 'Blocked', 'Browser blocked pop-out window');
  }
};

window.toggleJobSystemLog = function(cad) {
  const el = document.getElementById('jobSystemLog_' + cad);
  const btn = document.getElementById('jobSystemLogBtn_' + cad);
  if (!el || !btn) return;
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  btn.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
  const icon = btn.querySelector('i');
  if (icon) {
    icon.classList.toggle('bi-chevron-down', !isHidden);
    icon.classList.toggle('bi-chevron-up', isHidden);
  }
};

window.sendDispatcherJobComms = function(cad) {
  const input = document.getElementById(`jobCommMsg_${cad}`);
  const typeEl = document.getElementById(`jobCommType_${cad}`);
  const text = (input?.value || '').trim();
  if (!text) return;
  const msgType = (typeEl && typeEl.value === 'update') ? 'update' : 'message';
  fetch(`/plugin/ventus_response_module/job/${cad}/comms`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: msgType, text, sender_portal: 'dispatch' })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Send failed');
      if (input) input.value = '';
      showNotification('success', msgType === 'update' ? 'Update added to CAD' : 'Message sent to TO', `CAD #${cad}`);
      try { loadJobDetail(cad); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Send Failed', e.message || 'Failed to send'));
};

window.sendDispatcherJobMessage = function(cad) {
  const typeEl = document.getElementById(`jobCommType_${cad}`);
  if (typeEl) typeEl.value = 'message';
  window.sendDispatcherJobComms(cad);
};

window.standDownUnitFromJob = function(cad, callsign) {
  const cs = String(callsign || '').trim();
  if (!cs) return;
  if (!confirm(`Stand down ${cs} from CAD #${cad}?`)) return;
  fetch(`/plugin/ventus_response_module/job/${cad}/unassign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ callsign: cs, reason: 'dispatcher_unassign' })
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) throw new Error((d && d.error) || 'Stand down failed');
      showNotification('success', 'Unit Stood Down', `${cs} from CAD #${cad}`);
      try { loadJobDetail(cad); } catch (e) {}
      try { refreshMap(); } catch (e) {}
      try { refreshOpenPanels(['jobs', 'units', 'messages']); } catch (e) {}
    })
    .catch((e) => showNotification('danger', 'Stand Down Failed', e.message || 'Failed'));
};

window.closeJob = function(cad) {
  if (!confirm('Close this job?')) return;

  fetch(`/plugin/ventus_response_module/job/${cad}/close`, { method: 'POST' })
    .then(r => r.json())
    .then(() => {
      showNotification('success', 'Closed');
      setTimeout(refreshMap, 400);
    })
    .catch(() => showNotification('danger', 'Error'));
};

window.sendMessage = function() {
  showNotification('info', 'Messages', 'Use the messages panel controls');
};

// ===== INITIALIZATION =====
document.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const urlPanel = String(urlParams.get('panel') || '').trim().toLowerCase();
  const urlPopout = String(urlParams.get('popout') || '').trim().toLowerCase() === '1';
  const mapOnlyPopout = urlPopout && urlPanel === 'map';
  if (urlPopout && urlPanel === 'map') {
    const div = urlParams.get('division');
    if (div) selectedDivision = String(div).trim() || selectedDivision;
    const ext = urlParams.get('include_external');
    if (ext !== null && ext !== undefined) showExternalDivisions = String(ext).trim() === '1';
    applyMapOnlyPopoutLayout();
  }
  initMap();
  pollDispatcherAlerts();
  initAudioOnce();
  document.addEventListener('click', initAudioOnce, { passive: true });
  document.addEventListener('keydown', initAudioOnce);

  if (cadLockedLayout && !mapOnlyPopout) {
    applyLockedLayout();
  }

  document.body.addEventListener('click', function(ev) {
    const btn = ev.target && ev.target.closest && ev.target.closest('.unit-open-detail-btn');
    if (btn && typeof window.loadUnitDetail === 'function') {
      const cs = btn.getAttribute('data-callsign');
      if (cs) { ev.preventDefault(); window.loadUnitDetail(cs); }
    }
  });

  // Optional deep-link / popout mode (disabled for locked layout).
  if (!cadLockedLayout) {
    try {
      const params = new URLSearchParams(window.location.search);
      const autoPanel = String(params.get('panel') || '').trim().toLowerCase();
      const autoTitle = String(params.get('title') || '').trim();
      isPopoutMode = String(params.get('popout') || '').trim().toLowerCase() === '1';
      const autoCad = parseInt(params.get('cad') || '', 10);
      const panelTitles = {
        jobs: 'CAD Stack',
        units: 'Active Units',
        messages: 'Messages',
        past_jobs: 'Past / Cleared Jobs',
        kpi: 'Live KPI'
      };
      if (isPopoutMode && autoPanel && panelTitles[autoPanel]) {
        setTimeout(() => {
          togglePanelByType(autoPanel, autoTitle || panelTitles[autoPanel], autoPanel === 'jobs' ? btnJobs : (autoPanel === 'units' ? btnUnits : (autoPanel === 'past_jobs' ? btnPastJobs : (autoPanel === 'kpi' ? btnKPI : btnMsgs))));
          applySinglePanelPopoutLayout(autoPanel);
          if (Number.isInteger(autoCad) && autoCad > 0) {
            setTimeout(() => {
              try { loadJobDetail(autoCad); } catch (e) {}
            }, 350);
          }
        }, 120);
        return;
      }
      if (autoPanel && panelTitles[autoPanel]) {
        setTimeout(() => {
          togglePanelByType(autoPanel, autoTitle || panelTitles[autoPanel], autoPanel === 'jobs' ? btnJobs : (autoPanel === 'units' ? btnUnits : (autoPanel === 'past_jobs' ? btnPastJobs : (autoPanel === 'kpi' ? btnKPI : btnMsgs))));
          if (autoPanel === 'jobs' && Number.isInteger(autoCad) && autoCad > 0) {
            setTimeout(() => {
              try { loadJobDetail(autoCad); } catch (e) {}
            }, 350);
          }
        }, 180);
      }
    } catch (e) {}
  }

  btnJobs?.addEventListener('click', () => {
    togglePanelByType('jobs','CAD Stack', btnJobs);
  });

  btnUnits?.addEventListener('click', () => {
    togglePanelByType('units','Active Units', btnUnits);
  });

  btnMsgs?.addEventListener('click', () => {
    togglePanelByType('messages','Messages', btnMsgs);
  });

  btnPastJobs?.addEventListener('click', () => {
    togglePanelByType('past_jobs', 'Past / Cleared Jobs', btnPastJobs);
  });

  btnResetPanels?.addEventListener('click', () => {
    if (typeof window.resetPanelsToDefault === 'function') window.resetPanelsToDefault();
  });

  btnLockedLayout?.addEventListener('click', () => {
    if (cadLockedLayout) removeLockedLayout();
    else applyLockedLayout();
  });
  btnLockedMap?.addEventListener('click', () => {
    if (!cadLockedLayout) return;
    togglePanelByType('map', 'Live Map', btnLockedMap);
  });

  btnKPI?.addEventListener('click', () => {
    togglePanelByType('kpi', 'Live KPI', btnKPI);
  });

  const btnPopoutMap = document.getElementById('btnPopoutMap');
  if (btnPopoutMap) {
    btnPopoutMap.addEventListener('click', () => {
      if (cadLockedLayout) {
        return;
      }
      const scope = getDivisionParams().toString();
      const url = `/plugin/ventus_response_module/cad?panel=map&title=Map&popout=1${scope ? `&${scope}` : ''}`;
      const w = window.open(url, 'ventus-map-popout', 'width=900,height=700');
      if (w) showNotification('success', 'Map', 'Map opened in new window');
      else showNotification('warning', 'Blocked', 'Browser blocked pop-out window');
    });
  }

  try {
    const kpiOpen = Object.values(openPanels || {}).some(p => p && p.type === 'kpi');
    if (btnKPI && kpiOpen) btnKPI.classList.add('active');
    else if (!cadLsGet('kpi_hidden', 'cad_kpi_hidden')) {
      setTimeout(() => togglePanelByType('kpi', 'Live KPI', btnKPI), 400);
    }
  } catch (e) {}
});

function togglePanelByType(type, title, btn) {
  try {
    const existing = Object.values(openPanels).find(p => p.type === type);
    if (existing) {
      if (existing.poppedOut && existing.popoutWindow && !existing.popoutWindow.closed) {
        try { existing.popoutWindow.focus(); } catch (e) {}
        if (btn) btn.classList.add('active');
      } else {
        closePanel(existing.id);
        if (btn) btn.classList.remove('active');
        if (type === 'kpi') cadLsSet('kpi_hidden', '1');
      }
      return;
    }
    if (cadLockedLayout) {
      const openCount = Object.values(openPanels || {}).filter((p) => p && !p.closing).length;
      if (openCount >= LOCKED_SLOT_ORDER.length) {
        showNotification('warning', 'Fixed layout', `Maximum ${LOCKED_SLOT_ORDER.length} panels in fixed view. Close one panel first.`);
        return;
      }
    }
    const panel = getOrCreatePanel(type, title);
    if (btn) btn.classList.add('active');
    if (type === 'messages') clearMessageBadge();
    if (type === 'kpi') cadLsRemove('kpi_hidden', 'cad_kpi_hidden');
  } catch (e) { }
}

window.addEventListener('resize', () => {
  if (cadLockedLayout) {
    try { layoutLockedPanels(); } catch (e) {}
    return;
  }
  Object.values(openPanels).forEach((p) => {
    try { clampPanelToViewport(p.element); } catch (e) {}
  });
});
</script>
