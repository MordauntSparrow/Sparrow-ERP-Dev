{% extends "cad/ventus_admin_base.html" %}

{% block content %}
<div class="map-wrap">
  <div id="map"></div>
</div>

<!-- Panels container: allows multiple open sidebar panels and popouts -->
<div class="cad-panels" id="panelsContainer" aria-live="polite"></div>

<!-- KPI/Stats Topbar -->
<div id="kpiStatsPanel" style="position:fixed;top:80px;right:20px;z-index:2000;display:flex;gap:10px;align-items:flex-start;padding:10px;flex-wrap:wrap;max-width:780px;">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <span id="kpiActiveJobs"></span>
    <span id="kpiUnitsAvail"></span>
    <span id="kpiClearedToday"></span>
    <span id="kpiAvgResp"></span>
  </div>
  <div style="flex-basis:100%;height:1px;background:var(--border-color);opacity:0.6;"></div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px;">
    <span id="kpiAvgWaitAssign"></span>
    <span id="kpiAvgMobileScene"></span>
    <span id="kpiAvgOnScene"></span>
    <span id="kpiAvgLeaveHosp"></span>
    <span id="kpiAvgAtHosp"></span>
  </div>
  <button id="kpiClose" class="panel-btn close" title="Close KPI" style="margin-left:6px;padding:6px 8px;border-radius:6px;">&times;</button>
  <div class="resize-handle" title="Resize KPI"></div>
</div>

<!-- Toast notifications -->
<div id="toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:none;z-index:5000;"></div>

<!-- Notification stack (bottom-right) -->
<div id="notifications" class="notifications-container" aria-live="polite"></div>

<style>
.leaflet-tooltip.unit-map-label {
  background: rgba(15, 23, 42, 0.88);
  color: #e2e8f0;
  border: 1px solid rgba(148, 163, 184, 0.45);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(2, 6, 23, 0.35);
  pointer-events: none;
}
:root[data-theme="light"] .leaflet-tooltip.unit-map-label {
  background: rgba(248, 250, 252, 0.95);
  color: #0f172a;
  border-color: rgba(100, 116, 139, 0.45);
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.15);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== GLOBALS =====
let map, jobsLayer, unitsLayer, unitLinksLayer;
let jobsData = [], unitsData = [];
let jobCoordByCad = new Map();
let openPanels = {};
let currentMsgCallsign = null;
let activeJobCad = null;
let jobSnapshot = new Map();
let jobSnapshotInitialized = false;
let seenCommIds = new Set();
let commSnapshotInitialized = false;
let unitsSnapshot = new Set();
let unitsSnapshotInitialized = false;
let panelZCounter = 560;
// Optional sounds disabled by default to avoid CDN/autoplay errors in console.
let soundNewJob = null;
let soundUrgent = null;
let audioCtx = null;
let mapPickSession = null;
let mapPickMarker = null;
let selectedDivision = 'general';
let showExternalDivisions = true;
let divisionMeta = new Map();
let isPopoutMode = false;
let assignModalLoading = false;
let unitLinesVisible = true;
let messageAlertCount = 0;

// BroadcastChannel / Socket.IO
let socket = null;
let bc = null;
try {
  if (typeof io !== 'undefined') socket = io();
} catch (e) { console.warn('Socket.IO failed', e); }
try { bc = new BroadcastChannel('ventus_cad'); } catch (e) { console.warn('BroadcastChannel unavailable', e); }

function normalizeStatus(status) {
  return String(status || '').trim().toLowerCase();
}

function prettyStatus(status) {
  const raw = String(status || '').trim();
  if (!raw) return 'Unknown';
  return raw
    .replaceAll('_', ' ')
    .replace(/\s+/g, ' ')
    .toLowerCase()
    .replace(/\b\w/g, (m) => m.toUpperCase());
}

function parseTime(value) {
  if (!value) return null;
  const d = new Date(value);
  return Number.isNaN(d.getTime()) ? null : d;
}

function calcAgeFromDateString(value) {
  const d = parseTime(value);
  if (!d) return null;
  const now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const md = now.getMonth() - d.getMonth();
  if (md < 0 || (md === 0 && now.getDate() < d.getDate())) age -= 1;
  return age >= 0 ? age : null;
}

function formatDuration(ms) {
  if (!Number.isFinite(ms) || ms < 0) return null;
  const totalMinutes = Math.floor(ms / 60000);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  if (hours > 0) return `${hours}h ${minutes}m`;
  return `${minutes}m`;
}

function formatOngoing(createdAt) {
  if (!createdAt) return null;
  const d = parseTime(createdAt);
  if (!d) return null;
  return formatDuration(new Date() - d);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function getDivisionParams() {
  const p = new URLSearchParams();
  if (selectedDivision) p.set('division', selectedDivision);
  p.set('include_external', showExternalDivisions ? '1' : '0');
  return p;
}

function withDivision(url) {
  const params = getDivisionParams().toString();
  if (!params) return url;
  return `${url}${url.includes('?') ? '&' : '?'}${params}`;
}

function renderJobMapQuickPreview(job) {
  const cad = Number(job && job.cad);
  const status = String((job && job.status) || 'unknown');
  const priority = String((job && job.priority) || '').trim() || '--';
  const reason = String((job && job.reason_for_call) || '').trim() || 'No reason recorded';
  const address = String((job && (job.address || job.postcode || job.what3words)) || '').trim() || 'No location detail';
  const division = String((job && job.division) || 'general');
  const elapsed = formatOngoing(job && job.created_at) || '--';
  return `
    <div style="min-width:260px;max-width:320px;">
      <div style="font-weight:700;margin-bottom:6px;">CAD #${escapeHtml(Number.isFinite(cad) ? cad : '?')}</div>
      <div class="meta" style="margin-bottom:4px;">Priority: ${escapeHtml(priority)} • Status: ${escapeHtml(prettyStatus(status))}</div>
      <div class="meta" style="margin-bottom:4px;">Division: ${escapeHtml(division)}</div>
      <div class="meta" style="margin-bottom:6px;">Elapsed: ${escapeHtml(elapsed)}</div>
      <div style="font-size:12px;margin-bottom:4px;"><b>Reason:</b> ${escapeHtml(reason)}</div>
      <div style="font-size:12px;margin-bottom:8px;"><b>Location:</b> ${escapeHtml(address)}</div>
      <button class="btn" style="width:100%;padding:6px 8px;font-size:12px;" onclick="window.openJobDetailFromMap(${Number.isFinite(cad) ? cad : 0})">Open Full CAD Details</button>
    </div>
  `;
}

function prettyFieldLabel(key) {
  return String(key || '')
    .replaceAll('_', ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function renderIncidentDetails(triageRaw) {
  const triage = (triageRaw && typeof triageRaw === 'object') ? triageRaw : {};
  const take = (k) => triage[k];
  const row = (label, val) => {
    if (val === undefined || val === null || String(val).trim() === '') return '';
    return `<div style="padding:4px 0;"><b>${escapeHtml(label)}:</b> ${escapeHtml(val)}</div>`;
  };

  const coreRows = [
    row('Reason for Call', take('reason_for_call')),
    row('Additional Details', take('additional_details')),
    row('Address', take('address')),
    row('Postcode', take('postcode')),
    row('what3words', take('what3words')),
    row('Caller Name', take('caller_name')),
    row('Caller Phone', take('caller_phone')),
    row('Patient', [take('first_name'), take('middle_name'), take('last_name')].filter(Boolean).join(' ')),
    row('DOB', take('patient_dob')),
    row('Age', calcAgeFromDateString(take('patient_dob'))),
    row('Gender', take('patient_gender')),
    row('Patient Phone', take('phone_number')),
    row('Onset', take('onset_datetime')),
    row('Form Profile', [take('form_name'), take('form_slug') ? `(${take('form_slug')})` : ''].join(' ').trim())
  ].filter(Boolean);

  const answers = (take('form_answers') && typeof take('form_answers') === 'object') ? take('form_answers') : {};
  const answerRows = Object.entries(answers).map(([k, v]) => row(prettyFieldLabel(k), typeof v === 'object' ? JSON.stringify(v) : v)).filter(Boolean);

  const updates = Array.isArray(take('incident_updates')) ? take('incident_updates') : [];
  const updateRows = updates.length
    ? updates.slice(-8).reverse().map((u) => {
        const t = u && u.time ? new Date(u.time).toLocaleString() : '';
        const by = (u && u.by) ? ` by ${u.by}` : '';
        const text = (u && u.text) ? u.text : '';
        return `<div style="padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:6px;background:rgba(0,0,0,0.15);"><div class="meta" style="margin-bottom:4px;">${escapeHtml(t)}${escapeHtml(by)}</div><div>${escapeHtml(text)}</div></div>`;
      }).join('')
    : '<div class="meta"><i>No controller updates logged.</i></div>';

  const hidden = new Set([
    'reason_for_call','additional_details','address','postcode','what3words',
    'caller_name','caller_phone','first_name','middle_name','last_name',
    'patient_dob','patient_gender','phone_number','onset_datetime',
    'form_name','form_slug','form_answers','incident_updates'
  ]);
  const rawRows = Object.entries(triage)
    .filter(([k]) => !hidden.has(String(k)))
    .map(([k, v]) => row(prettyFieldLabel(k), typeof v === 'object' ? JSON.stringify(v) : v))
    .filter(Boolean);

  return `
    <div>
      <div style="font-weight:600;margin-bottom:6px;">Incident Summary</div>
      <div style="font-size:12px;color:var(--text-secondary);">${coreRows.join('') || '<i>No incident summary fields.</i>'}</div>
      <hr style="border:none;border-top:1px solid var(--border-color);margin:10px 0;">
      <div style="font-weight:600;margin-bottom:6px;">Profile Questions</div>
      <div style="font-size:12px;color:var(--text-secondary);">${answerRows.join('') || '<i>No profile answers captured.</i>'}</div>
      <hr style="border:none;border-top:1px solid var(--border-color);margin:10px 0;">
      <div style="font-weight:600;margin-bottom:6px;">Incident Updates</div>
      <div style="font-size:12px;color:var(--text-secondary);">${updateRows}</div>
      ${rawRows.length ? `<hr style="border:none;border-top:1px solid var(--border-color);margin:10px 0;"><div style="font-weight:600;margin-bottom:6px;">Other Captured Data</div><div style="font-size:12px;color:var(--text-secondary);">${rawRows.join('')}</div>` : ''}
    </div>
  `;
}

function getCurrentStatusTimer(job, timingRow) {
  if (!timingRow) return '';
  const status = normalizeStatus(job.status);
  const now = new Date();
  const statusStarts = {
    received: parseTime(timingRow.received_time),
    assigned: parseTime(timingRow.assigned_time),
    mobile: parseTime(timingRow.mobile_time),
    on_scene: parseTime(timingRow.on_scene_time),
    leave_scene: parseTime(timingRow.leave_scene_time),
    at_hospital: parseTime(timingRow.at_hospital_time),
    stood_down: parseTime(timingRow.stood_down_time),
    cleared: parseTime(timingRow.cleared_time)
  };
  const started = statusStarts[status];
  if (!started) return '';
  const dur = formatDuration(now - started);
  if (!dur) return '';
  return `${status.replaceAll('_', ' ')} ${dur}`;
}

function formatStatusTimesTable(job, timingRow) {
  if (!timingRow) {
    return '<div class="meta"><i>No status timestamps available.</i></div>';
  }
  const order = [
    ['received_time', 'Received'],
    ['assigned_time', 'Assigned'],
    ['mobile_time', 'Mobile'],
    ['on_scene_time', 'On Scene'],
    ['leave_scene_time', 'Leave Scene'],
    ['at_hospital_time', 'At Hospital'],
    ['cleared_time', 'Cleared'],
    ['stood_down_time', 'Stood Down']
  ];
  const points = order
    .map(([key, label]) => ({ key, label, time: parseTime(timingRow[key]) }))
    .filter(p => p.time);
  if (points.length === 0) {
    return '<div class="meta"><i>No status timestamps available.</i></div>';
  }

  const currentStatus = normalizeStatus(job.status);
  let rows = '';
  for (let i = 0; i < points.length; i++) {
    const current = points[i];
    const next = points[i + 1];
    let stageDuration = '-';
    if (next && next.time) {
      stageDuration = formatDuration(next.time - current.time) || '-';
    } else if (!['cleared', 'stood_down'].includes(currentStatus)) {
      stageDuration = formatDuration(new Date() - current.time) || '-';
    }
    rows += `
      <tr>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${current.label}</td>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${escapeHtml(current.time.toLocaleString())}</td>
        <td style="padding:6px;border-bottom:1px solid var(--border-color);">${escapeHtml(stageDuration)}</td>
      </tr>
    `;
  }

  return `
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Status</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Time</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border-color);">Duration</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function fetchJobsTimings(cadList) {
  const cads = (cadList || [])
    .map(c => parseInt(c, 10))
    .filter(c => Number.isInteger(c) && c > 0);
  if (cads.length === 0) return Promise.resolve({});

  const query = cads.map(c => `cad=${encodeURIComponent(c)}`).join('&');
  return fetch(`/plugin/ventus_response_module/jobs/timings?${query}`)
    .then(res => (res.ok ? res.json() : []))
    .then(rows => {
      const map = {};
      (Array.isArray(rows) ? rows : []).forEach(r => { map[r.cad] = r; });
      return map;
    })
    .catch(() => ({}));
}

function fetchJobsEligibility(cadList) {
  const cads = (cadList || [])
    .map(c => parseInt(c, 10))
    .filter(c => Number.isInteger(c) && c > 0);
  if (cads.length === 0) return Promise.resolve({});

  const query = cads.map(c => `cad=${encodeURIComponent(c)}`).join('&');
  const d = getDivisionParams().toString();
  const fullQuery = `${query}${d ? `&${d}` : ''}`;
  return fetch(`/plugin/ventus_response_module/jobs/eligibility?${fullQuery}`)
    .then(res => (res.ok ? res.json() : []))
    .then(rows => {
      const map = {};
      (Array.isArray(rows) ? rows : []).forEach(r => { map[r.cad] = r; });
      return map;
    })
    .catch(() => ({}));
}

function formatEligibilityText(eligibilityRow) {
  if (!eligibilityRow || !eligibilityRow.recommended) return 'Best units: no match';
  const top = eligibilityRow.candidates || [];
  if (!top.length) return 'Best units: no match';
  return `Best units: ${top.map(c => {
    const dist = (c.distance_km !== null && c.distance_km !== undefined) ? `${c.distance_km}km` : 'n/a';
    const skill = c.skill_match ? 'skills ok' : `missing ${((c.missing_skills || []).join(', ') || 'skills')}`;
    const breakState = c.break_blocked
      ? `break due${(c.break_due_in_minutes !== null && c.break_due_in_minutes !== undefined) ? ` (${c.break_due_in_minutes}m overdue/remaining)` : ''}`
      : (c.break_due ? `break due soon${(c.break_due_in_minutes !== null && c.break_due_in_minutes !== undefined) ? ` (${c.break_due_in_minutes}m)` : ''}` : 'break ok');
    const div = c.division ? `, ${c.division}` : '';
    const ext = c.external ? ', external' : '';
    return `${c.callsign} (${dist}, ${skill}, ${breakState}${div}${ext})`;
  }).join(' | ')}`;
}

function emitPanelAction(action, payload) {
  const msg = { type: 'panel_action', action, payload };
  try {
    if (socket) socket.emit('panel_message', { channel: 'ventus_cad', message: msg });
    else if (bc) bc.postMessage(msg);
  } catch (e) { }
}

function handleRemoteAction(msg) {
  const a = msg.action;
  const p = msg.payload || {};
  
  if (a === 'assign_job' && p.cad && p.callsign) {
    fetch(`/plugin/ventus_response_module/job/${p.cad}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ callsign: p.callsign, break_override: true })
    })
      .then(r => r.json())
      .then(data => {
        showNotification('success', 'Assigned', data.message || 'Job assigned');
        setTimeout(refreshMap, 400);
      })
      .catch(() => showNotification('danger', 'Error', 'Failed to assign job'));
  }
  
  if (a === 'close_job' && p.cad) {
    fetch(`/plugin/ventus_response_module/job/${p.cad}/close`, { method: 'POST' })
      .then(r => r.json())
      .then(data => {
        showNotification('success', 'Closed', data.message || 'Job closed');
        setTimeout(refreshMap, 400);
      })
      .catch(() => showNotification('danger', 'Error', 'Failed to close job'));
  }
  
  if (a === 'send_msg' && p.callsign && p.text) {
    fetch(`/plugin/ventus_response_module/messages/${p.callsign}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: p.text, from: 'dispatcher' })
    })
      .then(r => r.json())
      .then(() => showNotification('success', 'Sent', `Message sent to ${p.callsign}`))
      .catch(() => showNotification('danger', 'Error', 'Failed to send message'));
  }
  
  if (a === 'change_unit_status' && p.callsign && p.status) {
    fetch(`/plugin/ventus_response_module/api/mdt/${p.callsign}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: p.status, callSign: p.callsign })
    })
      .then(r => r.json())
      .then(() => {
        showNotification('success', 'Updated', `${p.callsign}: ${p.status}`);
      })
      .catch(() => showNotification('danger', 'Error', 'Failed to update status'));
  }
}

function initAudioOnce() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    if (!audioCtx) audioCtx = new Ctx();
    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
  } catch (e) { }
}

function playTone(freq, durationMs, delayMs = 0, gain = 0.18) {
  initAudioOnce();
  if (!audioCtx) return;
  if (audioCtx.state !== 'running') {
    audioCtx.resume()
      .then(() => { setTimeout(() => playTone(freq, durationMs, 0, gain), Math.max(0, delayMs)); })
      .catch(() => {});
    return;
  }
  const now = audioCtx.currentTime + (delayMs / 1000);
  const osc = audioCtx.createOscillator();
  const amp = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  amp.gain.value = 0.0001;
  osc.connect(amp);
  amp.connect(audioCtx.destination);
  amp.gain.setValueAtTime(0.0001, now);
  amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
  amp.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));
  osc.start(now);
  osc.stop(now + (durationMs / 1000) + 0.02);
}

function playChime(kind) {
  initAudioOnce();
  if (!audioCtx) return;
  if (kind === 'new_job') {
    playTone(880, 120, 0, 0.22); playTone(1175, 180, 130, 0.25);
  } else if (kind === 'message') {
    playTone(740, 100, 0, 0.18); playTone(740, 100, 140, 0.18);
  } else if (kind === 'job_update') {
    playTone(660, 120, 0, 0.2); playTone(830, 120, 130, 0.22); playTone(660, 120, 260, 0.2);
  } else if (kind === 'unit_signon') {
    playTone(520, 140, 0, 0.2); playTone(780, 160, 150, 0.22);
  } else if (kind === 'unit_signoff') {
    playTone(720, 140, 0, 0.2); playTone(440, 180, 150, 0.22);
  }
}

if (socket) {
  socket.on('panel_message', function(payload) {
    try { if (payload && payload.message && payload.message.type === 'panel_action') handleRemoteAction(payload.message); } catch (e) { }
  });
  socket.on('mdt_event', function(ev) {
    try {
      if (ev && ev.type === 'jobs_updated') {
        setTimeout(refreshMap, 300);
        showNotification('info', 'Updated', 'Activity updated');
        refreshOpenPanels(['jobs']);
      } else if (ev && ev.type === 'units_updated') {
        setTimeout(refreshMap, 220);
        refreshOpenPanels(['units']);
      } else if (ev && ev.type === 'unit_signon') {
        const cs = String(ev.callsign || '').trim();
        if (cs) {
          showNotification('success', 'Unit Signed On', cs);
          playChime('unit_signon');
        }
        setTimeout(refreshMap, 220);
        refreshOpenPanels(['units', 'messages']);
      } else if (ev && ev.type === 'unit_signoff') {
        const cs = String(ev.callsign || '').trim();
        if (cs) {
          showNotification('warning', 'Unit Signed Off', cs);
          playChime('unit_signoff');
        }
        setTimeout(refreshMap, 220);
        refreshOpenPanels(['units', 'messages']);
      } else if (ev && ev.type === 'message_posted') {
        const from = String(ev.from || '').trim();
        const to = String(ev.to || '').trim();
        const txt = String(ev.text || '').trim();
        showNotification('info', 'Message', `${from || 'sender'} -> ${to || 'recipient'}${txt ? `: ${txt.slice(0, 90)}` : ''}`);
        playChime('message');
        bumpMessageBadge(1);
        refreshOpenPanels(['messages']);
      } else if (ev && ev.type === 'job_update') {
        const cad = parseInt(ev.cad, 10);
        const text = String(ev.text || '').trim();
        showNotification('info', 'Incident Update', cad ? `CAD #${cad}${text ? `: ${text}` : ''}` : (text || 'New incident update'), Number.isInteger(cad) && cad > 0 ? { cad } : null);
        playChime('job_update');
        bumpMessageBadge(1);
        if (Number.isInteger(cad) && cad > 0 && activeJobCad === cad) {
          setTimeout(() => {
            try { loadJobDetail(cad); } catch (e) {}
          }, 200);
        }
        refreshOpenPanels(['jobs', 'messages']);
      } else if (ev && ev.type === 'status_update') {
        const cad = parseInt(ev.cad, 10);
        const st = String(ev.status || '').trim();
        if (Number.isInteger(cad) && cad > 0) {
          showNotification('info', 'Status Updated', `CAD #${cad}${st ? ` -> ${st}` : ''}`, { cad });
          playChime('job_update');
        }
        setTimeout(refreshMap, 220);
        refreshOpenPanels(['jobs', 'units']);
      } else if (ev && ev.type === 'unit_division_transferred') {
        const cs = String(ev.callsign || '').trim();
        const to = String(ev.to_division || '').trim();
        if (cs && to) {
          showNotification('info', 'Unit Transferred', `${cs} -> ${to}`);
          setTimeout(refreshMap, 250);
          refreshOpenPanels(['units', 'messages']);
        }
      } else if (ev && ev.type === 'assist_request_created') {
        const cs = String(ev.callsign || '').trim();
        const from = String(ev.from_division || '').trim();
        const to = String(ev.to_division || '').trim();
        showNotification('info', 'Assist Request', `${cs || 'Unit'} ${from ? `${from} -> ` : ''}${to || ''}`);
        playChime('message');
        bumpMessageBadge(1);
        refreshOpenPanels(['messages']);
      } else if (ev && ev.type === 'assist_request_resolved') {
        const cs = String(ev.callsign || '').trim();
        const decision = String(ev.decision || '').trim();
        showNotification('success', 'Assist Resolved', `${cs || 'Unit'} ${decision || 'updated'}`);
        setTimeout(refreshMap, 300);
        refreshOpenPanels(['messages', 'units']);
      }
    } catch (e) { }
  });
}

function cancelMapPick(reason = 'cancelled') {
  const session = mapPickSession;
  mapPickSession = null;
  try {
    if (session && session._escHandler) {
      document.removeEventListener('keydown', session._escHandler);
    }
  } catch (e) {}
  try {
    if (map && map.getContainer) map.getContainer().style.cursor = '';
  } catch (e) {}
  if (reason !== 'picked') {
    try { if (session && typeof session.onCancel === 'function') session.onCancel(); } catch (e) {}
  }
}

function beginMapPick(options = {}) {
  if (!map) {
    showNotification('warning', 'Map Pick', 'Map is not ready yet');
    return false;
  }
  cancelMapPick('replaced');
  mapPickSession = options || {};
  try {
    if (map.getContainer) map.getContainer().style.cursor = 'crosshair';
  } catch (e) {}
  const escHandler = (ev) => {
    if (ev.key === 'Escape') {
      cancelMapPick('escape');
      showNotification('warning', 'Map Pick', 'Cancelled');
    }
  };
  mapPickSession._escHandler = escHandler;
  document.addEventListener('keydown', escHandler);
  showNotification('info', 'Map Pick', 'Click map to choose destination (Esc to cancel)');
  return true;
}

// ===== PANEL CREATION =====
function getOrCreatePanel(type, title) {
  const existingPanel = Object.values(openPanels).find(p => p.type === type);
  if (existingPanel) {
    existingPanel.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return existingPanel.element;
  }
  return createPanel(type, title);
}

function clampPanelToViewport(el) {
  if (!el) return;
  const host = panelsContainer || el.parentElement;
  const hostW = (host && host.clientWidth) ? host.clientWidth : window.innerWidth;
  const hostH = (host && host.clientHeight) ? host.clientHeight : window.innerHeight;
  const w = el.offsetWidth || 420;
  const h = el.offsetHeight || 400;
  const left = parseInt(el.style.left, 10) || 0;
  const top = parseInt(el.style.top, 10) || 0;
  const maxX = Math.max(8, hostW - w - 8);
  const maxY = Math.max(8, hostH - h - 8);
  const nx = Math.min(maxX, Math.max(8, left));
  const ny = Math.min(maxY, Math.max(8, top));
  el.style.left = nx + 'px';
  el.style.top = ny + 'px';
}

function raisePanel(panelEl) {
  if (!panelEl) return;
  panelZCounter += 1;
  panelEl.style.zIndex = String(panelZCounter);
}

function savePanelState(panelEl) {
  if (!panelEl) return;
  try {
    const key = 'cad_panel_state_' + (panelEl.dataset.panelType || 'panel');
    const state = {
      left: panelEl.style.left,
      top: panelEl.style.top,
      width: panelEl.style.width,
      height: panelEl.style.height
    };
    localStorage.setItem(key, JSON.stringify(state));
  } catch (e) {}
}

function createPanel(type, title) {
  const panelId = 'panel-' + type + '-' + Date.now();
  const panelEl = document.createElement('div');
  panelEl.className = 'cad-panel';
  panelEl.id = panelId;
  panelEl.dataset.panelType = type;
  panelEl.innerHTML = `
    <div class="cad-panel-header">
      <span class="panel-title">${title}</span>
      <div class="cad-panel-controls">
        <button class="panel-btn popout" data-action="popout" title="Pop out">
          <i class="bi bi-box-arrow-up-right"></i>
        </button>
        <button class="panel-btn close" data-action="close" title="Close">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    <div class="cad-panel-body" style="padding:16px;">
      <div style="text-align:center;color:var(--text-muted);">
        <i class="bi bi-hourglass-split" style="font-size:24px;display:block;margin-bottom:8px;"></i>
        Loading...
      </div>
    </div>
    <div class="resize-handle" title="Resize"></div>
  `;

  panelsContainer.appendChild(panelEl);
  // make panels float over the map (absolute) to avoid affecting layout
  panelEl.style.pointerEvents = 'auto';
  panelEl.style.position = 'absolute';
  panelEl.style.display = 'flex';
  panelEl.style.flexDirection = 'column';
  panelEl.style.width = '420px';
  panelEl.style.height = '400px';
  panelEl.style.minWidth = '360px';
  panelEl.style.minHeight = '280px';
  panelEl.style.zIndex = '550';

  openPanels[panelId] = { id: panelId, type: type, title: title, element: panelEl };

  // smart initial positioning
  const panelCount = Object.keys(openPanels).length;
  let posLeft, posTop;
  if (type === 'jobs') { posLeft = 40; posTop = 120; }
  else if (type === 'units') { posLeft = 480; posTop = 120; }
  else if (type === 'messages') { posLeft = 40 + (panelCount - 1) * 30; posTop = 120 + (panelCount - 1) * 40; }
  else { posLeft = 40 + panelCount * 30; posTop = 120 + panelCount * 40; }
  // prefer saved spawn position for this panel type
  try {
    const savedKey = 'cad_panel_state_' + type;
    const saved = localStorage.getItem(savedKey);
    if (saved) {
      const s = JSON.parse(saved);
      if (s.left) panelEl.style.left = s.left;
      else panelEl.style.left = posLeft + 'px';
      if (s.top) panelEl.style.top = s.top;
      else panelEl.style.top = posTop + 'px';
      if (s.width) panelEl.style.width = s.width;
      if (s.height) panelEl.style.height = s.height;
    } else {
      panelEl.style.left = posLeft + 'px';
      panelEl.style.top = posTop + 'px';
    }
  } catch (e) {
    panelEl.style.left = posLeft + 'px';
    panelEl.style.top = posTop + 'px';
  }

  panelEl.querySelector('[data-action="popout"]').addEventListener('click', (e) => {
    e.stopPropagation();
    popoutPanel(panelId);
  });

  panelEl.querySelector('[data-action="close"]').addEventListener('click', (e) => {
    e.stopPropagation();
    closePanel(panelId);
  });

  setupDragResize(panelId);
  loadPanelContent(panelId, type);

  // Clamp panel into viewport so it opens on-map
  try { clampPanelToViewport(panelEl); } catch (e) {}

  return panelEl;
}

function setupDragResize(panelId) {
  const panelEl = document.getElementById(panelId);
  if (!panelEl) return;

  const header = panelEl.querySelector('.cad-panel-header');
  if (!header) return;

  panelEl.addEventListener('pointerdown', () => raisePanel(panelEl));
  header.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.cad-panel-controls')) return;
    e.preventDefault();
    raisePanel(panelEl);
    header.setPointerCapture?.(e.pointerId);
    panelEl.style.opacity = '0.90';

    const startX = e.clientX;
    const startY = e.clientY;
    const baseLeft = parseInt(panelEl.style.left, 10) || 8;
    const baseTop = parseInt(panelEl.style.top, 10) || 8;

    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      panelEl.style.left = (baseLeft + dx) + 'px';
      panelEl.style.top = (baseTop + dy) + 'px';
      clampPanelToViewport(panelEl);
    };

    const onUp = (ev) => {
      try { header.releasePointerCapture?.(e.pointerId); } catch (err) {}
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      panelEl.style.opacity = '1';
      savePanelState(panelEl);
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  // Add resize handle behavior (bottom-right)
  try {
    const resizeHandle = panelEl.querySelector('.resize-handle');
    if (resizeHandle) {
      resizeHandle.style.touchAction = 'none';
      resizeHandle.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        raisePanel(panelEl);
        resizeHandle.setPointerCapture?.(e.pointerId);
        const startX = e.clientX, startY = e.clientY;
        const startW = panelEl.offsetWidth, startH = panelEl.offsetHeight;
        const minW = 320, minH = 220;
        const host = panelsContainer || panelEl.parentElement;
        const hostW = (host && host.clientWidth) ? host.clientWidth : window.innerWidth;
        const hostH = (host && host.clientHeight) ? host.clientHeight : window.innerHeight;
        const startLeft = parseInt(panelEl.style.left, 10) || 8;
        const startTop = parseInt(panelEl.style.top, 10) || 8;
        const maxW = Math.max(minW, hostW - startLeft - 8);
        const maxH = Math.max(minH, hostH - startTop - 8);
        const onMove = (ev) => {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          const nw = Math.min(maxW, Math.max(minW, startW + dx));
          const nh = Math.min(maxH, Math.max(minH, startH + dy));
          panelEl.style.width = nw + 'px';
          panelEl.style.height = nh + 'px';
          clampPanelToViewport(panelEl);
          try {
            let sizeOverlay = document.getElementById('panel-size-overlay');
            if (!sizeOverlay) {
              sizeOverlay = document.createElement('div');
              sizeOverlay.id = 'panel-size-overlay';
              Object.assign(sizeOverlay.style, {
                position: 'fixed', left: '0px', top: '0px', padding: '6px 8px',
                background: 'rgba(0,0,0,0.8)', color: 'white', fontSize: '12px',
                borderRadius: '6px', zIndex: 99999, pointerEvents: 'none', display: 'none'
              });
              document.body.appendChild(sizeOverlay);
            }
            sizeOverlay.style.display = 'block';
            sizeOverlay.textContent = nw + ' × ' + nh;
            sizeOverlay.style.left = (ev.clientX + 12) + 'px';
            sizeOverlay.style.top = (ev.clientY + 12) + 'px';
          } catch (e) {}
        };

        const onUp = (ev) => {
          try { resizeHandle.releasePointerCapture?.(e.pointerId); } catch (err) {}
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          try {
            const sizeOverlay = document.getElementById('panel-size-overlay');
            if (sizeOverlay) sizeOverlay.style.display = 'none';
          } catch (e) {}
          savePanelState(panelEl);
        };

        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    }
  } catch (e) {}
}

function loadPanelContent(panelId, type) {
  const panelEl = document.getElementById(panelId);
  if (!panelEl) return;
  const contentEl = panelEl.querySelector('.cad-panel-body');

  if (type === 'jobs') {
    const view = String(panelEl.dataset.jobsView || '').toLowerCase();
    const cad = parseInt(panelEl.dataset.jobsCad || '', 10);
    if (view === 'detail' && Number.isInteger(cad) && cad > 0) {
      loadJobDetail(cad);
      return;
    }
    loadJobsPanel(contentEl);
  }
  else if (type === 'units') loadUnitsPanel(contentEl);
  else if (type === 'messages') loadMsgPanel(contentEl);
  else if (type === 'past_jobs') loadPastJobsPanel(contentEl);
}

let panelRefreshTimer = null;
function isMessageComposerActive() {
  const active = document.activeElement;
  if (!active) return false;
  if (active.id === 'msgTextInput' || active.id === 'msgReplyInput') return true;
  const panel = active.closest && active.closest('.cad-panel');
  if (!panel) return false;
  return panel.dataset && panel.dataset.panelType === 'messages' && /INPUT|TEXTAREA/.test(active.tagName || '');
}
function isJobDetailEditorActive() {
  const active = document.activeElement;
  if (!active) return false;
  const panel = active.closest && active.closest('.cad-panel');
  if (!panel) return false;
  if (!(panel.dataset && panel.dataset.panelType === 'jobs')) return false;
  if (String(panel.dataset.jobsView || '').toLowerCase() !== 'detail') return false;
  return /INPUT|TEXTAREA|SELECT/.test(active.tagName || '');
}
function refreshOpenPanels(types = null) {
  const wanted = Array.isArray(types) && types.length ? new Set(types) : null;
  if (panelRefreshTimer) clearTimeout(panelRefreshTimer);
  panelRefreshTimer = setTimeout(() => {
    Object.values(openPanels).forEach((p) => {
      if (p.type === 'messages' && isMessageComposerActive()) return;
      if (p.type === 'jobs') {
        const view = String((p.element && p.element.dataset && p.element.dataset.jobsView) || '').toLowerCase();
        if (view === 'detail') {
          if (isJobDetailEditorActive()) return;
          return;
        }
      }
      if (!wanted || wanted.has(p.type)) loadPanelContent(p.id, p.type);
    });
  }, 120);
}

function closePanel(panelId) {
  const panel = openPanels[panelId];
  if (!panel) return;
  try {
    const sizeOverlay = document.getElementById('panel-size-overlay');
    if (sizeOverlay) sizeOverlay.remove();
  } catch (e) {}
  const el = panel.element;
  // fade out without touching transform to avoid teleporting
  el.style.transition = 'opacity 0.28s ease';
  el.style.opacity = '0';
  el.style.pointerEvents = 'none';
  setTimeout(() => {
    el.remove();
    try {
      if (panel.type === 'jobs' && btnJobs) btnJobs.classList.remove('active');
      else if (panel.type === 'units' && btnUnits) btnUnits.classList.remove('active');
      else if (panel.type === 'messages' && btnMsgs) btnMsgs.classList.remove('active');
      else if (panel.type === 'past_jobs' && btnPastJobs) btnPastJobs.classList.remove('active');
    } catch (e) {}
    delete openPanels[panelId];
    if (isPopoutMode && Object.keys(openPanels).length === 0) {
      try { window.close(); } catch (e) {}
    }
    if (Object.keys(openPanels).length === 0) cadMain.classList.remove('drawer-open');
  }, 300);
}

function popoutPanel(panelId) {
  const panel = openPanels[panelId];
  if (!panel) return;
  try {
    const sizeOverlay = document.getElementById('panel-size-overlay');
    if (sizeOverlay) sizeOverlay.remove();
  } catch (e) {}
  const scope = getDivisionParams().toString();
  const url = `/plugin/ventus_response_module/cad?panel=${encodeURIComponent(panel.type)}&title=${encodeURIComponent(panel.title)}&popout=1${scope ? `&${scope}` : ''}`;
  const w = window.open(url, 'ventus-popout-' + panelId, 'width=500,height=600');
  if (!w) {
    showNotification('warning', 'Blocked', 'Browser blocked pop-out window');
    return;
  }
  closePanel(panelId);
  showNotification('success', 'Opened', `${panel.title} opened in new window`);
}

function renderUnitMapQuickPreview(unit) {
  const cs = String(unit && unit.callSign || '').trim() || '?';
  const status = String(unit && unit.status || 'unknown').trim() || 'unknown';
  const assignedCad = Number(unit && unit.assignedIncident);
  const standbyName = String(unit && unit.standby_name || '').trim();
  const division = String(unit && unit.division || 'general').trim();
  const breakBlocked = !!(unit && unit.break_blocked_for_new_jobs);
  const breakDue = !!(unit && unit.break_due);
  const breakDueIn = (unit && unit.break_due_in_minutes !== undefined && unit.break_due_in_minutes !== null) ? Number(unit.break_due_in_minutes) : null;
  const shiftRemaining = (unit && unit.shift_remaining_minutes !== undefined && unit.shift_remaining_minutes !== null) ? Number(unit.shift_remaining_minutes) : null;
  const target = Number.isFinite(assignedCad) && assignedCad > 0
    ? `Assigned CAD #${assignedCad}`
    : (standbyName ? `Standby: ${standbyName}` : 'No target');
  return `
    <div style="min-width:220px;max-width:280px;">
      <div style="font-weight:700;margin-bottom:6px;">${escapeHtml(cs)}</div>
      <div class="meta" style="margin-bottom:4px;">Status: ${escapeHtml(prettyStatus(status))}</div>
      <div class="meta" style="margin-bottom:4px;">Division: ${escapeHtml(division)}</div>
      ${breakBlocked ? `<div class="meta" style="margin-bottom:4px;color:#fca5a5;">Break due: not job-ready</div>` : ''}
      ${(!breakBlocked && breakDue) ? `<div class="meta" style="margin-bottom:4px;color:#fde68a;">Break due soon${breakDueIn !== null ? ` (${escapeHtml(String(breakDueIn))}m)` : ''}</div>` : ''}
      ${(shiftRemaining !== null) ? `<div class="meta" style="margin-bottom:4px;">Shift remaining: ${escapeHtml(String(shiftRemaining))}m</div>` : ''}
      <div class="meta" style="margin-bottom:8px;">${escapeHtml(target)}</div>
      <button class="btn" style="width:100%;padding:6px 8px;font-size:12px;" onclick="loadUnitDetail(${JSON.stringify(cs)})">Open Unit Detail</button>
    </div>
  `;
}

function initMap() {
  let defaultLat = 53.9583, defaultLng = -1.0803, defaultZoom = 9;
  map = L.map('map').setView([defaultLat, defaultLng], defaultZoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  jobsLayer = L.layerGroup().addTo(map);
  unitLinksLayer = L.layerGroup().addTo(map);
  unitsLayer = L.layerGroup().addTo(map);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      map.setView([pos.coords.latitude, pos.coords.longitude], 12);
    });
  }
  map.on('click', (ev) => {
    if (!mapPickSession) return;
    const session = mapPickSession;
    cancelMapPick('picked');
    try {
      const ll = ev && ev.latlng ? ev.latlng : null;
      if (!ll) return;
      try {
        if (mapPickMarker) map.removeLayer(mapPickMarker);
        mapPickMarker = L.circleMarker([ll.lat, ll.lng], {
          radius: 8,
          color: '#22d3ee',
          fillColor: '#22d3ee',
          fillOpacity: 0.35,
          weight: 2
        }).addTo(map);
      } catch (e) {}
      if (typeof session.onPick === 'function') session.onPick(ll);
    } catch (e) {}
  });
  refreshMap();
}

let lastJobsCount = 0;
function refreshMap() {
  fetch(withDivision('/plugin/ventus_response_module/jobs')).then(r => r.json()).then(jobs => {
    jobsLayer.clearLayers();
    jobsData = jobs;
    if (jobs.length > lastJobsCount) {
      const newest = jobs[0] || {};
      const newestCad = parseInt(newest.cad, 10);
      showNotification('info', 'New Job', `CAD #${newest.cad || '??'}`, Number.isInteger(newestCad) && newestCad > 0 ? { cad: newestCad } : null);
      playChime('new_job');
      try {
        if (soundNewJob && typeof soundNewJob.play === 'function') {
          const p = soundNewJob.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        }
      } catch (e) { }
    }
    lastJobsCount = jobs.length;
    jobCoordByCad = new Map();
    jobs.forEach(job => {
      if (job.lat && job.lng) {
        const cadInt = parseInt(job.cad, 10);
        if (Number.isFinite(cadInt)) jobCoordByCad.set(cadInt, [Number(job.lat), Number(job.lng)]);
        const marker = L.marker([job.lat, job.lng], { icon: jobIcon })
          .addTo(jobsLayer);
        if (job.is_external) marker.setOpacity(0.45);
        marker
          .bindTooltip(`CAD #${job.cad}`, { direction: "top" })
          .bindPopup(renderJobMapQuickPreview(job), { closeButton: true, autoPan: true, maxWidth: 360 });
      }
    });
    refreshOpenPanels(['jobs']);
  });

  fetch(withDivision('/plugin/ventus_response_module/units')).then(r => r.json()).then(units => {
    if (unitLinksLayer) unitLinksLayer.clearLayers();
    unitsLayer.clearLayers();
    unitsData = units;
    const nextUnits = new Set((Array.isArray(units) ? units : []).map(u => String(u.callSign || '')).filter(Boolean));
    if (unitsSnapshotInitialized) {
      nextUnits.forEach(cs => {
        if (!unitsSnapshot.has(cs)) {
          showNotification('success', 'Unit Signed On', cs);
          playChime('unit_signon');
        }
      });
      unitsSnapshot.forEach(cs => {
        if (!nextUnits.has(cs)) {
          showNotification('warning', 'Unit Signed Off', cs);
          playChime('unit_signoff');
        }
      });
    }
    unitsSnapshot = nextUnits;
    unitsSnapshotInitialized = true;
    units.forEach(unit => {
      if (unit.latitude && unit.longitude) {
        const marker = L.marker([unit.latitude, unit.longitude], { icon: unitIcon })
          .addTo(unitsLayer);
        if (unit.is_external) marker.setOpacity(0.4);
        marker
          .bindTooltip(`<div style="text-align:center;line-height:1.2;"><div>${escapeHtml(unit.callSign || '')}</div><div style="font-size:10px;opacity:0.9;">${escapeHtml(prettyStatus(unit.status || 'unknown'))}</div></div>`, {
            direction: "bottom",
            permanent: true,
            className: 'unit-map-label',
            offset: [0, 14]
          })
          .bindPopup(renderUnitMapQuickPreview(unit), { closeButton: true, autoPan: true, maxWidth: 300 });

        const assignedCad = parseInt(unit.assignedIncident, 10);
        let targetPoint = null;
        let isStandby = false;
        if (Number.isFinite(assignedCad) && assignedCad > 0 && jobCoordByCad.has(assignedCad)) {
          targetPoint = jobCoordByCad.get(assignedCad);
        } else if (unit.standby_lat != null && unit.standby_lng != null) {
          targetPoint = [Number(unit.standby_lat), Number(unit.standby_lng)];
          isStandby = true;
        }
        if (targetPoint && unitLinksLayer && unitLinesVisible) {
          const line = L.polyline(
            [[Number(unit.latitude), Number(unit.longitude)], targetPoint],
            {
              color: isStandby ? '#f59e0b' : '#22c55e',
              weight: isStandby ? 2.5 : 3.5,
              opacity: 0.95,
              dashArray: isStandby ? '8 8' : null
            }
          ).addTo(unitLinksLayer);
          if (unit.is_external) line.setStyle({ opacity: 0.45 });
        }
      }
    });
    refreshOpenPanels(['units', 'messages']);
  });
}

function pollDispatcherAlerts() {
  fetch(withDivision('/plugin/ventus_response_module/jobs'))
    .then(r => (r.ok ? r.json() : []))
    .then((jobs) => {
      const activeJobs = (Array.isArray(jobs) ? jobs : []).filter(j => normalizeStatus(j.status) !== 'cleared');
      const next = new Map();
      activeJobs.forEach((j) => {
        const sig = [
          normalizeStatus(j.status),
          String(j.priority || ''),
          String(j.claimedBy || ''),
          String(j.reason_for_call || ''),
          String(j.updated_at || '')
        ].join('|');
        next.set(Number(j.cad), sig);
      });

      if (jobSnapshotInitialized) {
        next.forEach((sig, cad) => {
          const prev = jobSnapshot.get(cad);
          if (!prev) {
            showNotification('info', 'New Job', `CAD #${cad}`, { cad });
            playChime('new_job');
          } else if (prev !== sig) {
            showNotification('info', 'Job Updated', `CAD #${cad} changed`, { cad });
            playChime('job_update');
            if (activeJobCad === cad) {
              try { loadJobDetail(cad); } catch (e) {}
            }
          }
        });
      }
      jobSnapshot = next;
      jobSnapshotInitialized = true;
    })
    .catch(() => {});

  fetch('/plugin/ventus_response_module/job-comms/recent?limit=60')
    .then(r => (r.ok ? r.json() : []))
    .then((rows) => {
      const items = Array.isArray(rows) ? rows : [];
      if (!commSnapshotInitialized) {
        items.forEach((m) => { if (m && m.id != null) seenCommIds.add(Number(m.id)); });
        commSnapshotInitialized = true;
        return;
      }
      items.forEach((m) => {
        const id = Number(m && m.id);
        if (!Number.isFinite(id) || seenCommIds.has(id)) return;
        seenCommIds.add(id);
        const cad = Number(m && m.cad);
        const sender = String((m && (m.sender_user || m.sender_role)) || 'response centre');
        const text = String((m && m.message_text) || '').trim();
        const body = `CAD #${Number.isFinite(cad) ? cad : '?'} • ${sender}${text ? `: ${text.slice(0, 90)}` : ''}`;
        showNotification('info', (m && m.message_type === 'update') ? 'Incident Update' : 'Response Centre Message', body, Number.isFinite(cad) ? { cad } : null);
        playChime((m && m.message_type === 'update') ? 'job_update' : 'message');
        bumpMessageBadge(1);
        if (Number.isFinite(cad) && activeJobCad === cad) {
          try { loadJobDetail(cad); } catch (e) {}
        }
      });
      if (seenCommIds.size > 1000) {
        const keep = items.slice(-200).map(m => Number(m.id)).filter(Number.isFinite);
        seenCommIds = new Set(keep);
      }
      refreshOpenPanels(['messages']);
    })
    .catch(() => {});
}

function refreshDivisions() {
  const applyDivisionData = (data) => {
    const items = Array.isArray(data.items) && data.items.length
      ? data.items
      : (Array.isArray(data.divisions) ? data.divisions.map(d => ({ slug: d, name: d, color: '#64748b', is_default: false })) : [{ slug: 'general', name: 'General', color: '#64748b', is_default: true }]);
    const divisions = items.map(i => String(i.slug || '').trim()).filter(Boolean);
    divisionMeta = new Map(items.map(i => [String(i.slug || ''), i]));
    const defaultDiv = String(data.default || 'general');
    if (!selectedDivision || !divisions.includes(selectedDivision)) {
      selectedDivision = divisions.includes(defaultDiv) ? defaultDiv : divisions[0];
    }
    if (divisionSelect) {
      divisionSelect.innerHTML = items.map(d => `<option value="${escapeHtml(d.slug)}">${escapeHtml(d.name || d.slug)}</option>`).join('');
      divisionSelect.value = selectedDivision;
    }
    if (showExternalToggle) {
      const canShowExternal = !!(data && data.can_show_external);
      if (!canShowExternal) {
        showExternalDivisions = false;
        showExternalToggle.checked = false;
        showExternalToggle.disabled = true;
        showExternalToggle.title = 'Cross-division visibility not permitted for this account';
      } else {
        showExternalToggle.disabled = false;
        showExternalToggle.checked = !!showExternalDivisions;
        showExternalToggle.title = 'Show units/jobs outside selected division';
      }
    }
    return items;
  };

  fetch('/plugin/ventus_response_module/dispatch/divisions')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      const items = applyDivisionData(data);
      // Superuser/admin safety: if API gave only "general", try full catalog endpoint.
      const onlyGeneral = (items.length === 1 && String(items[0]?.slug || '') === 'general');
      const unrestricted = !!(data && data.access && data.access.restricted === false);
      if (onlyGeneral && unrestricted) {
        fetch('/plugin/ventus_response_module/dispatch/divisions/manage', { credentials: 'same-origin' })
          .then(r => (r.ok ? r.json() : null))
          .then(managed => {
            if (!managed || !Array.isArray(managed.items)) return;
            const activeItems = managed.items.filter(d => d && d.is_active !== false);
            if (activeItems.length > 1) {
              applyDivisionData({ items: activeItems, default: managed.default || 'general', can_show_external: true });
            }
          })
          .catch(() => {});
      }
    })
    .catch(async (err) => {
      try {
        const res = await fetch('/plugin/ventus_response_module/dispatch/my-division-access');
        if (res.ok) {
          const access = await res.json();
          const owned = Array.isArray(access?.divisions) ? access.divisions.filter(Boolean) : [];
          if (owned.length) {
            const fallbackItems = owned.map((slug) => ({ slug, name: String(slug).replaceAll('_', ' ').replace(/\b\w/g, m => m.toUpperCase()) }));
            divisionMeta = new Map(fallbackItems.map(i => [String(i.slug || ''), i]));
            if (!selectedDivision || !owned.includes(selectedDivision)) selectedDivision = owned[0];
            if (divisionSelect) {
              divisionSelect.innerHTML = fallbackItems.map(d => `<option value="${escapeHtml(d.slug)}">${escapeHtml(d.name || d.slug)}</option>`).join('');
              divisionSelect.value = selectedDivision;
            }
            return;
          }
          if (access && access.restricted === false) {
            const divRes = await fetch('/plugin/ventus_response_module/dispatch/divisions/manage', { credentials: 'same-origin' });
            if (divRes.ok) {
              const managed = await divRes.json();
              const activeItems = Array.isArray(managed?.items) ? managed.items.filter(d => d && d.is_active !== false) : [];
              if (activeItems.length) {
                applyDivisionData({ items: activeItems, default: managed.default || 'general', can_show_external: true });
                return;
              }
            }
          }
        }
      } catch (e) {}
      if (divisionSelect && !divisionSelect.options.length) {
        divisionSelect.innerHTML = '<option value="general">general</option>';
        divisionSelect.value = selectedDivision || 'general';
      }
      try { showNotification('danger', 'Divisions', `Division list failed (${(err && err.message) || 'unknown error'})`); } catch (e) {}
    });
}

function showToast(msg, duration = 2500) {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, duration);
}

const MAX_NOTIFICATIONS = 5;
let notifications = [];

function isPanelOpenByType(type) {
  return Object.values(openPanels || {}).some((p) => p && p.type === type);
}

function setRailBadge(btnId, count) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  let badge = btn.querySelector('.rail-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'rail-badge';
    btn.appendChild(badge);
  }
  const n = Number(count) || 0;
  if (n <= 0) {
    badge.style.display = 'none';
    badge.textContent = '';
    return;
  }
  badge.style.display = 'inline-block';
  badge.textContent = n > 99 ? '99+' : String(n);
}

function bumpMessageBadge(amount = 1) {
  if (isPanelOpenByType('messages')) {
    messageAlertCount = 0;
    setRailBadge('btnMsgs', 0);
    return;
  }
  messageAlertCount = Math.max(0, (Number(messageAlertCount) || 0) + (Number(amount) || 0));
  setRailBadge('btnMsgs', messageAlertCount);
}

function clearMessageBadge() {
  messageAlertCount = 0;
  setRailBadge('btnMsgs', 0);
}

function showNotification(type, title, body = '', options = null) {
  try {
    const container = document.getElementById('notifications');
    if (!container) return null;
    const id = 'n' + Date.now() + Math.floor(Math.random() * 1000);
    const el = document.createElement('div');
    el.className = `notification ${type}`;
    el.id = id;
    el.innerHTML = `
      <div class="notif-header">
        <span>${title}</span>
        <button class="notif-close">×</button>
      </div>
      <div class="notif-body">${body}</div>
    `;
    container.appendChild(el);

    el.querySelector('.notif-close').addEventListener('click', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      removeNotification(id);
    });
    const clickCad = options && Number.isInteger(parseInt(options.cad, 10)) ? parseInt(options.cad, 10) : null;
    const onClick = options && typeof options.onClick === 'function' ? options.onClick : null;
    if (clickCad || onClick) {
      el.classList.add('clickable');
      el.title = clickCad ? `Open CAD #${clickCad}` : 'Open';
      el.addEventListener('click', (ev) => {
        if (ev.target && ev.target.closest && ev.target.closest('.notif-close')) return;
        try {
          if (onClick) onClick();
          else if (clickCad) openJobDetailFromMap(clickCad);
        } catch (e) {}
      });
    }
    notifications.unshift(id);

    while (notifications.length > MAX_NOTIFICATIONS) {
      const old = notifications.pop();
      const node = document.getElementById(old);
      if (node) node.remove();
    }

    setTimeout(() => removeNotification(id), 5000);
    return id;
  } catch (e) { }
}

function removeNotification(id) {
  const node = document.getElementById(id);
  if (node) {
    node.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => { if (node.parentElement) node.remove(); }, 300);
  }
  notifications = notifications.filter(x => x !== id);
}

function renderJobsList(jobs, contentEl, timingsMap = {}, eligibilityMap = {}) {
  let html = '';
  jobs.forEach(job => {
    const currentTimer = getCurrentStatusTimer(job, timingsMap[job.cad]);
    const ongoing = formatOngoing(job.created_at || (timingsMap[job.cad] && timingsMap[job.cad].received_time));
    const priority = String(job.priority || '').trim();
    const priorityClass = priority === 'P1'
      ? 'background:rgba(239,68,68,0.22);color:#fecaca;'
      : priority === 'P2'
        ? 'background:rgba(245,158,11,0.22);color:#fde68a;'
        : priority === 'P3'
          ? 'background:rgba(59,130,246,0.22);color:#bfdbfe;'
          : 'background:rgba(34,197,94,0.2);color:#bbf7d0;';
    const eligibility = formatEligibilityText(eligibilityMap[job.cad]);
    const suggested = (eligibilityMap[job.cad] && eligibilityMap[job.cad].recommended && eligibilityMap[job.cad].recommended.callsign)
      ? String(eligibilityMap[job.cad].recommended.callsign)
      : '';
    html += `
      <li class="panel-list-item" style="${job.is_external ? 'opacity:0.62;border-left-color:#94a3b8;' : ''}" onclick="loadJobDetail(${job.cad})">
        <i class="bi bi-geo-alt" style="color:var(--accent);"></i>
        <span>
          <div style="font-weight:500;">CAD #${job.cad}</div>
          <div class="meta">${job.reason_for_call || 'No reason'} - ${prettyStatus(job.status)}</div>
          <div class="meta">Division: ${escapeHtml(job.division || 'general')}${job.is_external ? ' (external)' : ''}</div>
          ${job.break_override_active ? `<div class="meta"><span class="status" style="background:rgba(239,68,68,0.22);color:#fecaca;">Break Override Used</span></div>` : ''}
          ${job.break_override_active ? `<div class="meta" style="font-size:11px;color:#fca5a5;">${escapeHtml((job.break_override_last_units || []).join(', '))}${job.break_override_last_at ? ` - ${escapeHtml(new Date(job.break_override_last_at).toLocaleString())}` : ''}</div>` : ''}
          ${priority ? `<div class="meta"><span class="status" style="${priorityClass}">${escapeHtml(priority)}</span></div>` : ''}
          ${ongoing ? `<div class="meta" style="font-size:11px;color:#fcd34d;">Ongoing: ${escapeHtml(ongoing)}</div>` : ''}
          ${currentTimer ? `<div class="meta" style="font-size:11px;color:#93c5fd;">Current: ${escapeHtml(currentTimer)}</div>` : ''}
          <div class="meta" style="font-size:11px;color:#a7f3d0;cursor:${suggested ? 'pointer' : 'default'};text-decoration:${suggested ? 'underline' : 'none'};" onclick='event.stopPropagation();${suggested ? `assignJobWithSuggestion(${job.cad}, ${JSON.stringify(suggested)})` : ""}'>${escapeHtml(eligibility)}${suggested ? ' (click to prefill assign)' : ''}</div>
        </span>
        <span class="status" style="background:rgba(59,130,246,0.2);color:var(--primary-light);">${prettyStatus(job.status)}</span>
      </li>
    `;
  });
  const jobsList = contentEl.querySelector('#jobsList');
  if (jobsList) jobsList.innerHTML = html;
}
