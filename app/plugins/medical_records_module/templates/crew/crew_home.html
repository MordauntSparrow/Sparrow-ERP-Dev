{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <h1 class="mb-4">Crew Patient Lookup</h1>
  <!-- Search Form -->
  <form id="patientSearchForm">
    <div class="row mb-3">
      <div class="col-md-4">
        <div class="form-outline">
          <input type="date" id="date_of_birth" name="date_of_birth" class="form-control" placeholder="YYYY-MM-DD" required>
          <label class="form-label" for="date_of_birth">Date of Birth</label>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-outline">
          <input type="text" id="postcode" name="postcode" class="form-control" placeholder="Postcode" required>
          <label class="form-label" for="postcode">Postcode</label>
        </div>
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="submit" class="btn btn-primary">Search</button>
      </div>
    </div>
  </form>

  <!-- Placeholder for patient records table -->
  <div id="patientRecordsTable" class="mt-4">
    <!-- AJAX response will populate this table -->
  </div>
</div>

<!-- Modal -->
<div class="modal fade"
id="pinModal"
tabindex="-1"
aria-labelledby="pinModalLabel"
aria-hidden="true"
data-mdb-backdrop="static"
data-mdb-keyboard="false">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
 <div class="modal-header">
   <h5 class="modal-title" id="pinModalLabel">Enter Your Personal PIN</h5>
 </div>
 <div class="modal-body">
   <div class="form-outline mb-3">
     <input
       type="password"
       id="personalPinInput"
       class="form-control"
       maxlength="6"
       placeholder="6-digit PIN"
       required
     >
     <label class="form-label" for="personalPinInput">Personal PIN</label>
   </div>
   <div id="pinError" class="text-danger" style="display:none;"></div>
 </div>
 <div class="modal-footer">
   <button type="button" id="verifyPinButton" class="btn btn-primary">Verify PIN</button>
 </div>
</div>
</div>
</div>

<!-- MDB / Bootstrap JS -->
<script
src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.3.1/mdb.min.js"
></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
const pinModalEl = document.getElementById("pinModal");
const pinModal = new mdb.Modal(pinModalEl);

// Show the modal as soon as the page loads
pinModal.show();

// On modal show, modify the backdrop with !important
pinModalEl.addEventListener("show.mdb.modal", function() {
 setTimeout(function() {
   const backdrop = document.querySelector(".modal-backdrop.show");
   if (backdrop) {
     // Force heavy overlay + blur with !important
     backdrop.style.setProperty("background-color", "rgba(0,0,0,0.98)", "important");
     backdrop.style.setProperty("backdrop-filter", "blur(50px)", "important");
     backdrop.style.setProperty("-webkit-backdrop-filter", "blur(50px)", "important");
   }
 }, 10);
});

// Example PIN verification
document.getElementById("verifyPinButton").addEventListener("click", function() {
 const pinValue = document.getElementById("personalPinInput").value.trim();
 if (pinValue.length !== 6) {
   document.getElementById("pinError").innerText = "Enter a 6-digit PIN.";
   document.getElementById("pinError").style.display = "block";
   return;
 }

 // Replace with your verification logic
 fetch("{{ url_for('medical_records_internal.verify_pin') }}", {
   method: "POST",
   headers: { "Content-Type": "application/json" },
   body: JSON.stringify({ personal_pin: pinValue })
 })
 .then(response => response.json().then(data => ({ status: response.status, data })))
 .then(obj => {
   if (obj.status !== 200) {
     document.getElementById("pinError").innerText = obj.data.error || "Invalid PIN.";
     document.getElementById("pinError").style.display = "block";
   } else {
     pinModal.hide();
   }
 })
 .catch(error => {
   console.error("Error verifying PIN:", error);
 });
});
});


  // Patient search form submission remains as before.
  document.getElementById('patientSearchForm').addEventListener('submit', function(e){
    e.preventDefault();
    var dob = document.getElementById('date_of_birth').value;
    var postcode = document.getElementById('postcode').value;
    // Assuming the personal PIN has already been verified
    fetch("{{ url_for('medical_records_internal.crew_search') }}?date_of_birth=" + encodeURIComponent(dob) + "&postcode=" + encodeURIComponent(postcode))
      .then(response => response.json())
      .then(data => {
         if(data.error){
            alert(data.error);
         } else {
            var tableHtml = "<table class='table table-striped'><thead><tr>" +
                            "<th>Customer Number</th><th>Name</th><th>Age</th><th>Gender</th><th>Action</th></tr></thead><tbody>";
            data.patients.forEach(function(patient){
               tableHtml += `<tr>
                  <td>${patient.id}</td>
                  <td>${patient.first_name} ${patient.last_name}</td>
                  <td>${patient.age}</td>
                  <td>${patient.gender}</td>
                  <td>
                     <button class="btn btn-primary btn-sm view-record-btn" data-customer="${patient.id}">
                        View Record
                     </button>
                  </td>
               </tr>`;
            });
            tableHtml += "</tbody></table>";
            document.getElementById('patientRecordsTable').innerHTML = tableHtml;

            // Attach event listeners for the "View Record" buttons.
            var viewButtons = document.querySelectorAll('.view-record-btn');
            viewButtons.forEach(function(btn){
              btn.addEventListener('click', function(){
                var customerNumber = this.getAttribute('data-customer');
                window.location.href = "{{ url_for('medical_records_internal.view_patient_record', id='') }}" + customerNumber;
              });
            });
         }
      })
      .catch(error => console.error("Error fetching patient records:", error));
  });
</script>
{% endblock %}
