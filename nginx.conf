# Admin via subdomain (for paid plan/custom domains)
server {
    listen 80;
    server_name ~^control-centre\..+$;

    location / {
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Website and admin via path (works on free plan)
server {
    listen 80 default_server;
    server_name _;

    location /admin {
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
