server {
    listen 80;
    server_name _;

    location /admin {
    proxy_pass http://127.0.0.1:82/;  # Note the trailing slash!
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    rewrite ^/admin/?(.*)$ /$1 break;
}

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
