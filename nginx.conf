# /etc/nginx/sites-available/default

# Admin: control-centre.{domain}
server {
    listen 80;
    server_name ~^control-centre\..+$;
    # Allow ACME challenge path for Let's Encrypt, otherwise redirect to HTTPS
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect other HTTP requests to HTTPS for admin control centre
    location / {
        return 301 https://$host$request_uri;
    }
}

# TLS-enabled admin server (replace cert paths with your certs)
server {
    listen 443 ssl http2;
    server_name ~^control-centre\..+$;

    ssl_certificate /etc/ssl/certs/control-centre.crt; # REPLACE
    ssl_certificate_key /etc/ssl/private/control-centre.key; # REPLACE
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Minimal CSP - tighten per your application assets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' wss: https:;" always;

    # Admin app (Flask + Socket.IO) - ensure websocket proxying headers
    location / {
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

# Website: all other domains/subdomains (with /admin path proxy support)
server {
    listen 80 default_server;
    server_name _;

    # This block proxies /admin and /admin/* to the admin backend,
    # and strips the /admin prefix so /admin/login becomes /login for Flask.
    location ~ ^/admin(/.*)?$ {
        proxy_pass http://127.0.0.1:82$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else goes to website
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
