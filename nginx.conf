# Admin via subdomain (for paid plan/custom domains)
server {
    listen 80;
    server_name ~^control-centre\..+$;

    location / {
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Website and admin via path (works on free plan)
server {
    listen 80 default_server;
    server_name _;

    # Robust rewrite for /admin and /admin/anything
    location ~ ^/admin($|/.*) {
        rewrite ^/admin($|/.*) $1 break;
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
