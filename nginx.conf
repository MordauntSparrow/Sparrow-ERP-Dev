# Website and admin via path (works on free plan)
server {
    listen 80 default_server;
    server_name _;

    # This block proxies /admin and /admin/* to the admin backend,
    # and strips the /admin prefix so /admin/login becomes /login for Flask.
    location ~ ^/admin(/.*)?$ {
        proxy_pass http://127.0.0.1:82$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else goes to website
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
